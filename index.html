<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Makom — Tanach Geographic Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700;900&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap');

/* ── TOKENS ── */
:root {
  --ink:       #1a1208;
  --ink-mid:   #3a2a10;
  --gold:      #c8962a;
  --gold-lt:   #e8c76a;
  --gold-dim:  rgba(200,150,42,0.25);
  --parch:     #f7f0e0;
  --parch-mid: #f0e6c8;
  --parch-dk:  #e8ddb8;
  --stone:     #8a7a5a;
  --stone-lt:  #b8a882;
  --night:     #0f0b04;
  --night-mid: #1a1208;
  --blue:      #2a4a6a;
  --blue-lt:   #a8c8e8;
  --radius:    3px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; font-family: 'Spectral', Georgia, serif; background: var(--night); color: var(--ink); }

/* ── LAYOUT ── */
.app  { display: grid; grid-template-rows: 54px 1fr; height: 100vh; }
.main { display: grid; grid-template-columns: 310px 1fr; overflow: hidden; }

/* ── HEADER ── */
header {
  background: var(--night); border-bottom: 1px solid var(--gold-dim);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; z-index: 1000; gap: 14px;
}
.h-title { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
.h-heb  { font-family: 'Frank Ruhl Libre', serif; font-size: 17px; font-weight: 700; color: var(--gold-lt); direction: rtl; letter-spacing: 0.05em; line-height: 1; }
.h-sub  { font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; color: #4a3a1a; }

/* Divider */
.h-sep  { width: 1px; height: 24px; background: var(--gold-dim); flex-shrink: 0; }

.h-controls { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: flex-end; }

/* Shared pill button */
.pill-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 11px; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  font-family: 'Spectral', serif; border-radius: 20px; cursor: pointer;
  transition: all 0.15s; white-space: nowrap; border: 1px solid var(--gold-dim);
  background: transparent; color: #5a4a2a;
}
.pill-btn:hover   { color: var(--gold); border-color: rgba(200,150,42,0.5); }
.pill-btn.active  { background: var(--gold); color: var(--night); border-color: var(--gold); font-weight: 600; }
.pill-btn.active:hover { background: var(--gold-lt); }
.pill-btn.era-on  { background: var(--blue); color: var(--blue-lt); border-color: #3a6a9a; }
.pill-btn.era-on:hover { background: #3a5a7a; }
.pill-btn .dot    { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

/* Chapter selects */
.ch-controls { display: flex; align-items: center; gap: 5px; }
.ch-lbl { font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: #4a3a1a; }
.ch-sel {
  background: var(--night-mid); color: var(--gold-lt); border: 1px solid #2a1a08;
  padding: 4px 7px; font-family: 'Spectral', serif; font-size: 10px;
  border-radius: var(--radius); cursor: pointer; outline: none; max-width: 160px;
}
.ch-sel option { background: var(--night-mid); }
.ch-sel:focus   { border-color: var(--gold); }

.ev-badge {
  font-size: 8px; padding: 3px 8px; border-radius: 20px;
  background: rgba(200,150,42,0.1); color: #7a6a3a;
  border: 1px solid var(--gold-dim); white-space: nowrap; letter-spacing: 0.08em;
}

/* ── SIDEBAR ── */
#sidebar {
  background: var(--parch); border-right: 1px solid var(--gold-dim);
  display: flex; flex-direction: column; overflow: hidden; z-index: 500;
  position: relative;
}

/* Sidebar sticky header — same style for both modes */
.sb-header {
  background: var(--night-mid); padding: 10px 15px; flex-shrink: 0;
  border-bottom: 1px solid var(--gold-dim);
}
.sb-title { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--stone); }
.sb-count { font-size: 9px; color: #3a2a10; margin-top: 3px; }

/* Book mode filter controls */
.sb-book-controls {
  background: var(--night-mid); padding: 11px 15px; flex-shrink: 0;
  border-bottom: 1px solid var(--gold-dim);
  display: none; flex-direction: column; gap: 9px;
}
.sb-book-controls.on { display: flex; }
.bc-lbl { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--stone); margin-bottom: 3px; }
.bc-sel {
  background: var(--night); color: var(--gold-lt); border: 1px solid #2a1a08;
  padding: 5px 8px; font-family: 'Spectral', serif; font-size: 10px; font-style: italic;
  border-radius: var(--radius); cursor: pointer; outline: none; width: 100%;
}
.bc-sel option { background: var(--night); font-style: normal; }
.bc-sel:focus  { border-color: var(--gold); }
.range-wrap    { display: flex; align-items: center; gap: 7px; }
.bc-range {
  flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px; outline: none; cursor: pointer;
  background: linear-gradient(to right, var(--gold) var(--pct,100%), #2a1a08 var(--pct,100%));
}
.bc-range::-webkit-slider-thumb { -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%; background: var(--gold); border: 2px solid #f5eed8; cursor: pointer; }
.range-lbl  { font-size: 9px; color: var(--stone); white-space: nowrap; }
.bc-count   { font-size: 9px; color: #3a2a10; }

/* Scrollable event list */
#event-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--parch-dk) var(--parch); }
#event-list::-webkit-scrollbar       { width: 3px; }
#event-list::-webkit-scrollbar-track { background: var(--parch); }
#event-list::-webkit-scrollbar-thumb { background: var(--parch-dk); border-radius: 2px; }

/* ── EVENT ITEMS ── */
.ev-item {
  border-bottom: 1px solid var(--parch-dk); cursor: pointer;
  transition: background 0.1s; position: relative;
}
.ev-item::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 0; background: var(--gold); transition: width 0.1s;
}
.ev-item:hover        { background: #f0e8d0; }
.ev-item:hover::after { width: 2px; }
.ev-item.active       { background: var(--parch-mid); border-left: 3px solid var(--gold); }
.ev-item.active::after{ display: none; }
.ev-item.hidden       { display: none; }

.ev-summary { padding: 10px 14px; }
.ev-v   { font-size: 8px; color: var(--stone-lt); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 3px; }
.ev-p   { font-family: 'Frank Ruhl Libre', serif; font-size: 14px; font-weight: 700; color: var(--ink); line-height: 1.2; }
.ev-ph  { font-size: 10px; color: var(--stone); direction: rtl; font-family: 'Frank Ruhl Libre', serif; font-weight: 400; }
.ev-who { font-size: 10px; color: #8b2a2a; font-style: italic; margin-top: 3px; }

/* Expanded detail panel */
.ev-detail {
  display: none; padding: 0 14px 14px; background: var(--parch-mid);
  border-top: 1px solid var(--parch-dk);
}
.ev-item.active .ev-detail { display: block; }
.ev-desc-text   { font-size: 11px; color: var(--ink-mid); line-height: 1.6; font-style: italic; margin-bottom: 8px; padding-top: 8px; }
.ev-source-text { font-size: 10px; color: #7a6a4a; line-height: 1.5; padding-top: 7px; border-top: 1px solid var(--parch-dk); }

/* ── PLACE TAB ── */
.pat-toggle {
  display: flex; margin-bottom: 10px; margin-top: 8px;
  border: 1px solid var(--parch-dk); border-radius: var(--radius); overflow: hidden;
}
.pat-tab {
  flex: 1; padding: 5px 0; font-size: 9px; text-align: center;
  letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Spectral', serif;
  border: none; cursor: pointer; transition: all 0.12s;
  background: transparent; color: var(--stone);
}
.pat-tab.active { background: var(--night-mid); color: var(--gold-lt); font-weight: 600; }
.pat-tab:not(.active):hover { background: var(--parch-dk); }
.pat-panel { display: none; }
.pat-panel.active { display: block; }

.pat-event {
  padding: 8px 0; border-bottom: 1px solid var(--parch-dk);
  cursor: pointer; transition: background 0.1s;
}
.pat-event:last-child { border-bottom: none; }
.pat-event:hover      { background: rgba(200,150,42,0.07); margin: 0 -14px; padding: 8px 14px; }
.pat-event.current    { opacity: 0.45; cursor: default; }
.pat-ch    { font-size: 9px; color: var(--stone); margin-bottom: 2px; }
.pat-ch-dot{ display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
.pat-place { font-size: 12px; font-weight: 600; color: var(--ink); font-family: 'Frank Ruhl Libre', serif; }
.pat-d     { font-size: 10px; color: var(--stone); font-style: italic; margin-top: 2px; line-height: 1.4; }
.pat-none  { font-size: 10px; color: #a09070; font-style: italic; padding: 8px 0; }

/* ── BOOK MODE ACCORDION ── */
.ch-group { border-bottom: 1px solid var(--parch-dk); }
.ch-group-hdr {
  padding: 9px 14px; cursor: pointer; background: #f0e8d0;
  display: flex; justify-content: space-between; align-items: center;
  user-select: none; transition: background 0.1s;
}
.ch-group-hdr:hover            { background: var(--parch-dk); }
.ch-group-hdr.open             { background: #eadb90; border-left: 3px solid var(--gold); }
.ch-group-hdr-title            { font-family: 'Frank Ruhl Libre', serif; font-size: 12px; font-weight: 700; color: var(--ink); }
.ch-group-hdr-meta             { font-size: 9px; color: var(--stone); }
.ch-group-hdr-arrow            { font-size: 9px; color: var(--stone); transition: transform 0.18s; }
.ch-group-hdr.open .ch-group-hdr-arrow { transform: rotate(90deg); }
.ch-group-body { display: none; }
.ch-group-hdr.open + .ch-group-body { display: block; }

/* ── MAP ── */
#map-area { position: relative; overflow: hidden; }
#map      { width: 100%; height: 100%; }

/* ── LEGEND ── */
.legend {
  position: absolute; bottom: 16px; right: 14px; z-index: 500;
  background: rgba(10,8,2,0.90); border: 1px solid var(--gold-dim);
  border-radius: var(--radius); padding: 9px 13px; color: #c8b898;
  font-size: 10px; font-family: 'Spectral', serif; line-height: 2;
  pointer-events: none; backdrop-filter: blur(4px);
}
.legend-title { font-size: 8px; letter-spacing: 0.22em; text-transform: uppercase; color: #5a4a2a; margin-bottom: 3px; }
.ldot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.15); }

/* ── LEAFLET POPUP ── */
.leaflet-popup-content-wrapper { background: rgba(10,8,2,0.96) !important; border: 1px solid var(--gold) !important; border-radius: var(--radius) !important; box-shadow: 0 6px 24px rgba(0,0,0,0.6) !important; }
.leaflet-popup-content { color: #f5eed8 !important; font-family: 'Spectral', serif !important; margin: 11px 15px !important; }
.leaflet-popup-tip     { background: rgba(10,8,2,0.96) !important; }
.leaflet-popup-close-button { color: var(--gold) !important; font-size: 16px !important; top: 6px !important; right: 8px !important; }
.pop-era   { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #6a9aba; margin-bottom: 3px; }
.pop-place { font-family: 'Frank Ruhl Libre', serif; font-size: 14px; font-weight: 700; color: var(--gold-lt); margin-bottom: 3px; }
.pop-verse { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: #5a4a2a; margin-bottom: 6px; }
.pop-desc  { font-size: 11px; font-style: italic; color: #c8b898; line-height: 1.55; }

/* ── DRAWER TOGGLE (mobile) ── */
#drawer-toggle { display: none; }

/* ── MOBILE ── */
@media (max-width: 680px) {
  .app  { grid-template-rows: auto 1fr; }
  .main { grid-template-columns: 1fr; position: relative; }

  header { height: auto; padding: 8px 14px; flex-wrap: wrap; gap: 6px; }
  .h-title { flex: 1; min-width: 0; }
  .h-heb  { font-size: 15px; }
  .h-sub, .h-sep, .ev-badge { display: none; }
  .h-controls { flex-wrap: wrap; gap: 5px; width: 100%; justify-content: flex-start; }
  .ch-lbl { display: none; }
  .ch-sel { font-size: 11px; max-width: 130px; }
  .era-toggle { display: none; } /* era toggle goes in sidebar on mobile */

  #map-area { position: absolute; inset: 0; }
  #map      { width: 100%; height: 100%; }
  .legend   { bottom: 58px; right: 8px; font-size: 9px; padding: 5px 9px; line-height: 1.75; }

  #sidebar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 50px; max-height: 74vh;
    border-right: none; border-top: 2px solid var(--gold);
    border-radius: 14px 14px 0 0; z-index: 900;
    transition: height 0.28s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden; background: var(--parch);
  }
  #sidebar.open { height: 74vh; }
  #sidebar::before {
    content: ''; display: block; width: 32px; height: 4px;
    background: var(--parch-dk); border-radius: 2px;
    margin: 8px auto 0; flex-shrink: 0;
  }

  #drawer-toggle {
    display: flex; position: absolute;
    bottom: 50px; left: 50%; transform: translateX(-50%);
    background: var(--night-mid); border: 1px solid var(--gold);
    border-radius: 20px; padding: 7px 18px;
    color: var(--gold-lt); font-family: 'Spectral', serif;
    font-size: 11px; letter-spacing: 0.1em; cursor: pointer;
    z-index: 901; align-items: center; gap: 6px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.5);
    transition: bottom 0.28s cubic-bezier(0.4,0,0.2,1);
    white-space: nowrap;
  }
  #drawer-toggle.open { bottom: calc(74vh + 6px); }
  #drawer-toggle-icon { font-size: 11px; transition: transform 0.25s; }
  #drawer-toggle.open #drawer-toggle-icon { transform: rotate(180deg); }
  #event-list { overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .sb-header, .sb-book-controls { border-radius: 0; }
}

/* ── PLACE HISTORY PANEL ── */
#place-history {
  display: none;
  position: absolute; inset: 0;
  background: var(--parch);
  flex-direction: column;
  z-index: 800;
  overflow: hidden;
}
#place-history.open { display: flex; }
.ph-header {
  background: var(--night-mid); padding: 11px 15px; flex-shrink: 0;
  border-bottom: 1px solid var(--gold-dim);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.ph-title {
  font-family: 'Frank Ruhl Libre', serif; font-size: 16px; font-weight: 700;
  color: var(--gold-lt); line-height: 1.2;
}
.ph-heb { font-size: 11px; color: var(--stone); direction: rtl; margin-top: 2px; }
.ph-subtitle { font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: #4a3a1a; margin-top: 4px; }
.ph-close {
  background: none; border: 1px solid var(--gold-dim); color: var(--stone);
  padding: 4px 10px; cursor: pointer; font-family: 'Spectral', serif;
  font-size: 10px; border-radius: 2px; flex-shrink: 0; white-space: nowrap;
}
.ph-close:hover { border-color: var(--gold); color: var(--gold-lt); }
.ph-list { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--parch-dk) var(--parch); }
.ph-event {
  padding: 10px 15px; border-bottom: 1px solid var(--parch-dk);
  cursor: pointer; transition: background 0.1s;
  display: grid; grid-template-columns: 64px 1fr; gap: 0 10px;
}
.ph-event:hover { background: var(--parch-mid); }
.ph-era {
  font-size: 9px; color: var(--stone-lt); letter-spacing: 0.1em;
  text-transform: uppercase; padding-top: 2px; line-height: 1.6;
}
.ph-era-dot {
  display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  margin-right: 4px; vertical-align: middle; margin-top: -1px;
}
.ph-place { font-family: 'Frank Ruhl Libre', serif; font-size: 13px; font-weight: 700; color: var(--ink); }
.ph-desc { font-size: 10px; color: var(--stone); font-style: italic; line-height: 1.45; margin-top: 2px; }
.ph-source { font-size: 9px; color: #7a6a4a; margin-top: 4px; padding-top: 4px; border-top: 1px solid var(--parch-dk); line-height: 1.4; }
.ph-sep {
  padding: 5px 15px; background: var(--night-mid);
  font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: #5a4a2a;
  border-bottom: 1px solid var(--gold-dim);
}
.ph-empty { padding: 20px 15px; font-size: 11px; color: var(--stone); font-style: italic; }
.ph-btn {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 8px; padding: 5px 12px;
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  font-family: 'Spectral', serif; border-radius: 2px; cursor: pointer;
  background: var(--night-mid); color: var(--gold-lt);
  border: 1px solid var(--gold-dim); transition: all 0.15s;
}
.ph-btn:hover { border-color: var(--gold); background: rgba(200,150,42,0.1); }

/* ── SEARCH ── */
.search-wrap {
  padding: 8px 12px; background: var(--night-mid);
  border-bottom: 1px solid var(--gold-dim); flex-shrink: 0;
  position: relative;
}
.search-input {
  width: 100%; background: var(--night); color: #f5eed8;
  border: 1px solid #2a1a08; border-radius: 20px;
  padding: 6px 30px 6px 12px; font-family: 'Spectral', serif;
  font-size: 11px; outline: none; transition: border-color 0.15s;
}
.search-input::placeholder { color: #4a3a1a; font-style: italic; }
.search-input:focus { border-color: var(--gold); }
.search-clear {
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  color: var(--stone); font-size: 14px; cursor: pointer; background: none;
  border: none; padding: 0; line-height: 1; display: none;
}
.search-clear.visible { display: block; }
.search-count {
  font-size: 8px; color: var(--stone); letter-spacing: 0.1em;
  padding: 3px 12px 0; display: none;
}
.search-count.visible { display: block; }
.ev-item .ev-highlight { background: rgba(200,150,42,0.3); border-radius: 2px; }
.pop-era   { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: #6a9aba; margin-bottom: 3px; }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="h-title">
    <div class="h-heb" id="h-heb">שמואל א · פרק יז</div>
    <div class="h-sub" id="h-sub">I Samuel · Chapter 17</div>
  </div>
  <div class="h-sep"></div>
  <div class="h-controls">
    <button class="pill-btn active" id="btn-chapter" onclick="setMode('chapter')">Chapter</button>
    <button class="pill-btn" id="btn-book" onclick="setMode('book')">Full Book</button>
    <div class="h-sep"></div>
    <div class="ch-controls">
      <span class="ch-lbl">Book</span>
      <select class="ch-sel" id="book-sel" onchange="onBookChange()">
        <option value="bereishit">Bereishit</option>
        <option value="shemot">Shemot</option>
        <option value="vayikra">Vayikra</option>
        <option value="bamidbar">Bamidbar</option>
        <option value="devarim">Devarim</option>
        <option value="yehoshua">Yehoshua</option>
        <option value="shoftim">Shoftim</option>
        <option value="rut">Rut</option>
        <option value="melachim1">Melachim I</option>
        <option value="melachim2">Melachim II</option>
        <option value="yirmiyahu">Yirmiyahu</option>
        <option value="shmuel1">Shmuel I</option>
        <option value="shmuel2">Shmuel II</option>
      </select>
    </div>
    <div class="ch-controls" id="ch-controls">
      <span class="ch-lbl">Ch</span>
      <select class="ch-sel" id="ch-sel" onchange="onChapterChange()"></select>
    </div>
    <span class="ev-badge" id="ev-badge">— events</span>
    <div class="h-sep"></div>
    <button class="pill-btn" id="era-talmudic-btn" onclick="toggleTalmudicEra()">
      <span class="dot"></span>Talmudic 70–500
    </button>
    <button class="pill-btn" id="era-modern-btn" onclick="toggleModernEra()">
      <span class="dot"></span>Modern 1882–1967
    </button>
  </div>
</header>

<div class="main">
  <div id="sidebar">
    <!-- Chapter mode header -->
    <div class="sb-header" id="sb-ch-hdr">
      <div class="sb-title" id="sb-ch-title">Chapter Events</div>
      <div class="sb-count" id="sb-ch-count"></div>
    </div>
    <!-- Book mode controls -->
    <div class="sb-book-controls" id="sb-book-ctrl">
      <div>
        <div class="bc-lbl">Follow a Person</div>
        <select class="bc-sel" id="bc-person" onchange="applyBookFilters()">
          <option value="">All persons</option>
        </select>
      </div>
      <div>
        <div class="bc-lbl">Theme</div>
        <select class="bc-sel" id="bc-theme" onchange="applyBookFilters()">
          <option value="">All themes</option>
          <option value="War">War &amp; Battle</option>

CHAPTERS["bereishit_19"] = [
  { verse:"19:1-25",place:"Sodom — Destruction",         heb:"סדום ועמורה",      lat:31.050, lng:35.480, color:"#8b1a1a", persons:["Lot","Angels","Sodom"],      themes:["Judgment","Destruction"],  source:"Rashi: Sodom's sin was cruelty to the poor and stranger — the very antithesis of Avraham's hospitality. The city's geographic richness had made them callous.", desc:"Two angels come to Sodom. Lot hosts them. The men of Sodom surround the house. The angels blind the mob. At dawn, Lot flees. Hashem rains sulfur and fire on Sodom and Amorah." },
  { verse:"19:26",  place:"Sodom — Lot's Wife",          heb:"נציב מלח",         lat:31.060, lng:35.370, color:"#8b1a1a", persons:["Lot's Wife"],                themes:["Judgment","Flight"],       source:"Rashi: She looked back from behind him — she was behind him and turned back from a place of mercy to a place of judgment. She became a pillar of salt.", desc:"Lot's wife looks back from behind him and becomes a pillar of salt. Avraham looks toward Sodom in the morning and sees smoke rising like a furnace." },
  { verse:"19:30",  place:"Cave near Tzoar",             heb:"מערה",             lat:31.080, lng:35.560, color:"#8b3a3a", persons:["Lot","Daughters"],           themes:["Exile","Moav","Amon"],     source:"Radak: Lot was afraid to remain in Tzoar. The cave in the hills above the Dead Sea — Lot lived there with his two daughters. Their sons become Moav and Amon.", desc:"Lot flees Tzoar and lives in a cave in the hills with his two daughters. From this cave come Moav and Amon — peoples who will recur throughout Tanach." }
];
CHAPTERS["bereishit_20"] = [
  { verse:"20:1",   place:"Gerar",                       heb:"גרר",              lat:31.408, lng:34.620, color:"#2a6a4a", persons:["Avraham","Avimelech","Sara"], themes:["Journey","Providence"],   source:"Radak: Avraham traveled to the Negev and settled between Kadesh and Shur — near Gerar, the Philistine city. He repeated the sister-wife ruse he had used in Egypt.", desc:"Avraham travels to the Negev and lives in Gerar. He presents Sara as his sister. Avimelech king of Gerar takes Sara. Hashem appears to Avimelech in a dream — she is a man's wife." }
];
CHAPTERS["bereishit_21"] = [
  { verse:"21:14", place:"Wilderness of Beer Sheva",     heb:"מדבר באר שבע",    lat:31.100, lng:34.900, color:"#8b3a3a", persons:["Hagar","Yishmael"],          themes:["Exile","Providence","Miracle"], source:"Rashi: The water ran out in the wilderness. Hagar placed Yishmael under a bush — he was dying. The angel opened her eyes and she saw a well of water.", desc:"Hagar and Yishmael are cast out. They wander in the wilderness of Beer Sheva. The water runs out. Hagar weeps. The angel calls to her — God hears the boy's voice. A well appears." },
  { verse:"21:31", place:"Beer Sheva — Covenant",        heb:"באר שבע",          lat:31.252, lng:34.791, color:"#c8962a", persons:["Avraham","Avimelech"],       themes:["Covenant","Wells"],        source:"Radak: Beer Sheva — Well of the Oath, or Well of Seven — named for the seven ewes Avraham set apart to witness the covenant. It becomes the southern boundary of the land.", desc:"Avraham and Avimelech swear an oath at the well. Avraham plants a tamarisk tree and calls on Hashem's name. Beer Sheva — Well of the Oath — gives the place its name." }
];
CHAPTERS["bereishit_22"] = [
  { verse:"22:1-19",place:"Har HaMoriya — Akeidat Yitzchak", heb:"הר המוריה",   lat:31.778, lng:35.235, color:"#c8962a", persons:["Avraham","Yitzchak","Angel"], themes:["Faith","Covenant","Temple"], source:"Rashi: Har HaMoriya is Yerushalayim — the Temple Mount. The Akeidah took place on the same rock where the Temple altar would stand and where Goren Aravna would stop the plague.", desc:"Hashem commands Avraham to offer Yitzchak at Har HaMoriya. Avraham and Yitzchak climb the mountain. The angel stops the knife. Avraham calls the place Hashem Yireh — Hashem will see." }
];
CHAPTERS["bereishit_23"] = [
  { verse:"23:1-20",place:"Marat HaMachpela — Chevron",   heb:"מערת המכפלה",     lat:31.524, lng:35.111, color:"#c8962a", persons:["Avraham","Efron","Sara"],    themes:["Death","Land","Burial"],   source:"Radak: The purchase of the Machpela cave was the first legal acquisition of land in Canaan by Avraham — paid in full, witnessed publicly, establishing an eternal claim.", desc:"Sara dies at 127 in Kiryat Arba (Chevron). Avraham purchases the cave of Machpela from Efron the Hittite for 400 silver shekels. He buries Sara there — the first of the Avot to be buried in the land." }
];
CHAPTERS["bereishit_24"] = [
  { verse:"24:10", place:"Aram Naharayim — Charan",       heb:"ארם נהריים",       lat:36.862, lng:39.022, color:"#2a6a4a", persons:["Eliezer","Rivka"],           themes:["Providence","Marriage"],   source:"Rashi: The servant took ten camels — representing Avraham's household — to Charan. His prayer at the well and Rivka's immediate appearance is the model of answered prayer.", desc:"Avraham's servant travels to Aram Naharayim to find a wife for Yitzchak. He prays at a well outside the city. Rivka appears and draws water. He discovers she is Avraham's kin." }
];
CHAPTERS["bereishit_25"] = [
  { verse:"25:27",  place:"Beer Sheva — Esav and Yaakov",  heb:"באר שבע",         lat:31.252, lng:34.791, color:"#2a6a4a", persons:["Esav","Yaakov","Yitzchak"],  themes:["Family","Conflict"],       source:"Rashi: Esav was a man of the field — a hunter. Yaakov was a man of the tents — a Torah scholar. The contrast between them defines the entire book that follows.", desc:"Yitzchak loved Esav, Rivka loved Yaakov. Esav sells his birthright to Yaakov for red lentil stew — becoming Edom (red). The rivalry that will define nations begins." }
];
CHAPTERS["bereishit_26"] = [
  { verse:"26:1",   place:"Gerar — Yitzchak",             heb:"גרר",              lat:31.408, lng:34.620, color:"#2a6a4a", persons:["Yitzchak","Avimelech"],      themes:["Journey","Wells","Covenant"], source:"Radak: Yitzchak repeated Avraham's journey to Gerar in a famine — and repeated his father's sister-wife ruse. The wells he dug were the wells Avraham had dug.", desc:"Famine in the land. Yitzchak goes to Gerar. He digs wells that his father's servants had dug. He is driven away by quarrels over each well — Esek, Sitna — until reaching Rechovot: now there is room." },
  { verse:"26:23",  place:"Beer Sheva — Yitzchak's Covenant", heb:"באר שבע",      lat:31.252, lng:34.791, color:"#c8962a", persons:["Yitzchak","Hashem","Avimelech"], themes:["Covenant","Blessing"],   source:"Rashi: Hashem appears to Yitzchak in Beer Sheva the night after Avimelech's visit — confirming the covenant He made with Avraham. Yitzchak builds a mizbe'ach there.", desc:"Yitzchak goes up to Beer Sheva. Hashem appears: I am the God of Avraham your father — do not fear. Avimelech comes to make a covenant. Yitzchak's servants find water that day." }
];
CHAPTERS["bereishit_27"] = [
  { verse:"27:41",  place:"Beer Sheva — Yaakov Flees",    heb:"באר שבע",          lat:31.252, lng:34.791, color:"#8b3a3a", persons:["Yaakov","Esav","Rivka"],     themes:["Exile","Flight","Family"], source:"Rashi: Rivka tells Yaakov: your brother comforts himself by planning to kill you. Flee to my brother Lavan in Charan — a few days until his anger subsides. It became 20 years.", desc:"Esav vows to kill Yaakov after the blessing theft. Rivka sends Yaakov to her brother Lavan in Charan. Yitzchak blesses Yaakov and sends him away from Beer Sheva." }
];
CHAPTERS["bereishit_28"] = [
  { verse:"28:10",  place:"Beit El — Yaakov's Ladder",    heb:"בית אל · סולם יעקב", lat:31.930, lng:35.222, color:"#c8962a", persons:["Yaakov","Angels","Hashem"], themes:["Vision","Covenant","Journey"], source:"Rashi: He took stones from the place — the Talmud says the stones quarreled over which one the righteous man should rest his head on, so they merged into one.", desc:"Yaakov sleeps at Beit El with a stone for a pillow. He dreams of a ladder to heaven with angels ascending and descending. Hashem stands above: I will give this land to your descendants. He anoints the stone and calls the place Beit El — House of God." },
  { verse:"28:10",  place:"Charan — Yaakov Arrives",      heb:"חרן",              lat:36.862, lng:39.022, color:"#2a6a4a", persons:["Yaakov","Rachel","Lavan"],   themes:["Journey","Providence","Marriage"], source:"Rashi: Yaakov lifted the stone from the well himself — showing his great strength at the sight of Rachel. It normally required several shepherds.", desc:"Yaakov arrives in Charan, meets Rachel at a well, single-handedly rolls away the great stone, and waters the sheep. He will live here 20 years — working seven years for Rachel, receiving Leah, then seven more years for Rachel." }
];
CHAPTERS["bereishit_31"] = [
  { verse:"31:17",  place:"Gilad — Yaakov Flees Lavan",   heb:"גלעד",             lat:32.325, lng:35.617, color:"#2a6a4a", persons:["Yaakov","Lavan","Rachel","Leah"], themes:["Journey","Conflict","Providence"], source:"Radak: Yaakov fled without telling Lavan — he feared Lavan would take his daughters and grandchildren by force. Rachel stole the terafim to prevent Lavan from using them to track Yaakov.", desc:"Yaakov takes his family and possessions and flees. Lavan pursues and catches up in the hills of Gilad. After a tense confrontation, they make a covenant — the Gilad heap of stones witnesses between them." }
];
CHAPTERS["bereishit_32"] = [
  { verse:"32:2",   place:"Machanayim",                   heb:"מחניים",            lat:32.325, lng:35.617, color:"#c8962a", persons:["Yaakov","Angels"],           themes:["Vision","Journey","Providence"], source:"Rashi: Machanayim — two camps — refers to the two camps of angels: those of the Land of Israel who came to escort him, and those of outside the land who came to greet him.", desc:"Yaakov meets the angels of God on his way back. He names the place Machanayim — Two Camps. He prepares for his encounter with Esav, dividing his people into two groups." },
  { verse:"32:23",  place:"Peniel — Wrestling with the Angel", heb:"פניאל",       lat:32.470, lng:35.540, color:"#c8962a", persons:["Yaakov","Angel","Hashem"],   themes:["Wrestling","Name","Covenant"], source:"Rashi: He wrestled with him — this was the guardian angel of Esav. Yaakov's new name, Yisrael — he who struggles with God — defines the Jewish people for all time.", desc:"Yaakov wrestles with a man all night at the ford of Yabok. At dawn the man says: your name is no longer Yaakov but Yisrael — you have struggled with God and with men and prevailed. He limps away at sunrise." }
];
CHAPTERS["bereishit_33"] = [
  { verse:"33:17",  place:"Sukkot — Yaakov's Return",     heb:"סוכות",            lat:32.200, lng:35.560, color:"#2a6a4a", persons:["Yaakov","Esav"],             themes:["Return","Reconciliation"], source:"Radak: Yaakov and Esav part ways — Esav to Seir, Yaakov to Sukkot. He built a house and booths (sukkot) for his cattle — giving the place its name.", desc:"After reconciling with Esav, Yaakov reaches Sukkot and builds a house and booths for his cattle — giving the place its name. He then crosses to Shchem." },
  { verse:"33:18",  place:"Shchem — Yaakov Buys Land",    heb:"שכם",              lat:32.220, lng:35.260, color:"#c8962a", persons:["Yaakov"],                    themes:["Land","Settlement"],       source:"Rashi: Yaakov arrived shalem — whole, in body, in wealth, in Torah. He purchased the plot from the sons of Chamor for 100 kesita — the second purchase of land in Canaan after Machpela.", desc:"Yaakov arrives safely at Shchem in Canaan and camps before the city. He buys the plot of land where he pitched his tent from the sons of Chamor for 100 kesita. He erects a mizbe'ach: El Elohei Yisrael." }
];
CHAPTERS["bereishit_34"] = [
  { verse:"34:1-31",place:"Shchem — Dina",                heb:"שכם",              lat:32.220, lng:35.261, color:"#8b1a1a", persons:["Dina","Shchem","Shimon","Levi"], themes:["Violence","Justice","War"], source:"Rashi: Shimon and Levi acted on their own — Yaakov did not know their plan. On his deathbed Yaakov condemned their anger, not the killing itself.", desc:"Shchem son of Chamor violates Dina. He asks to marry her. Shimon and Levi deceive the men of Shchem into circumcising themselves, then kill them all on the third day and plunder the city." }
];
CHAPTERS["bereishit_35"] = [
  { verse:"35:1",   place:"Beit El — Second Visit",       heb:"בית אל",           lat:31.930, lng:35.222, color:"#c8962a", persons:["Yaakov","Hashem"],           themes:["Covenant","Renewal"],      source:"Rashi: God tells Yaakov to go up to Beit El — where Hashem appeared to you when you fled from Esav. The place of the ladder vision is revisited with a covenant renewal.", desc:"Hashem says to Yaakov: Arise, go up to Beit El. Yaakov commands his household to remove the foreign gods. At Beit El, Hashem appears again and confirms: your name is Yisrael." },
  { verse:"35:19",  place:"Kever Rachel — Beit Lechem",   heb:"קבר רחל",          lat:31.716, lng:35.198, color:"#8b3a3a", persons:["Rachel","Yaakov","Binyamin"],themes:["Death","Burial","Mourning"], source:"Radak: Rachel died on the road between Beit El and Efrat (Beit Lechem). Yaakov buried her there and set up a monument — later to be seen by the exiles passing on their way to Babylon.", desc:"Rachel dies giving birth to Binyamin on the road to Efrat (Beit Lechem). Yaakov buries her there and sets up a pillar over her grave. Kever Rachel — still marked today." },
  { verse:"35:27",  place:"Chevron — Yitzchak's Death",   heb:"חברון",            lat:31.532, lng:35.095, color:"#2a6a4a", persons:["Yaakov","Esav","Yitzchak"],  themes:["Death","Family"],          source:"Radak: Yitzchak lived 180 years — the longest of the Avot after Avraham. Both Yaakov and Esav buried him in Chevron, at the cave of Machpela.", desc:"Yaakov comes to his father Yitzchak at Mamre in Chevron. Yitzchak dies at 180 and is gathered to his people. Esav and Yaakov bury him together." }
];
CHAPTERS["bereishit_37"] = [
  { verse:"37:12",  place:"Shchem — Yosef Sent",          heb:"שכם",              lat:32.220, lng:35.260, color:"#2a6a4a", persons:["Yosef","Yaakov","Brothers"], themes:["Providence","Journey"],    source:"Rashi: Yaakov sent Yosef to Shchem knowing his brothers hated him — yet he sent him. The Sages say Yaakov did not act foolishly — this was divinely ordained.", desc:"Yosef's brothers graze flocks in Shchem. Yaakov sends Yosef to check on them. A man finds Yosef wandering in the field and directs him to Dotan." },
  { verse:"37:17",  place:"Dotan — Yosef Sold",           heb:"דותן",             lat:32.415, lng:35.206, color:"#8b1a1a", persons:["Yosef","Brothers","Yishmael"], themes:["Betrayal","Providence","Egypt"], source:"Rashi: They saw him from afar and before he reached them they conspired to kill him. Reuven said: shed no blood — throw him into the pit. He intended to rescue him.", desc:"Yosef finds his brothers at Dotan. They see him coming and plot to kill him. Reuven saves him from death by placing him in a pit. Yehuda suggests selling him. Yosef is sold to Yishmaelite traders going to Egypt for 20 silver pieces." }
];
CHAPTERS["bereishit_46"] = [
  { verse:"46:1",   place:"Beer Sheva — Descent to Egypt",heb:"באר שבע",          lat:31.252, lng:34.791, color:"#8b3a3a", persons:["Yaakov","Hashem"],           themes:["Egypt","Descent","Providence"], source:"Rashi: Why did Yaakov offer sacrifices at Beer Sheva? Because it was on the border of the land — he offered before leaving. Also: it was where his grandfather Avraham and his father Yitzchak had worshipped.", desc:"Yaakov sets out for Egypt and offers sacrifices at Beer Sheva. Hashem speaks to him in a vision of the night: Do not fear going down to Egypt — I will make you a great nation there. I will also bring you back up." },
  { verse:"46:28",  place:"Goshen — Arrival",             heb:"גושן",             lat:30.600, lng:31.800, color:"#2a6a4a", persons:["Yaakov","Yosef","Israel"],   themes:["Egypt","Family","Reunion"], source:"Radak: Goshen was the fertile eastern delta of Egypt — separate from the main Egyptian population, allowing the Israelites to maintain their distinct identity.", desc:"Yosef goes up to Goshen to meet his father Yaakov. They embrace and weep. Yaakov says: now I can die, having seen your face and knowing you are still alive. Yisrael settles in Goshen." }
];
CHAPTERS["bereishit_49"] = [
  { verse:"49:29",  place:"Marat HaMachpela — Yaakov's Request", heb:"מערת המכפלה", lat:31.524, lng:35.111, color:"#c8962a", persons:["Yaakov","Sons"],          themes:["Death","Burial","Land"],   source:"Rashi: Yaakov commanded: do not bury me in Egypt. His insistence on burial in Canaan was a statement of faith — the land is ours and I will return to it even in death.", desc:"Yaakov commands his sons: bury me with my fathers in the cave of Machpela in Chevron — where Avraham, Sara, Yitzchak, Rivka, and Leah are buried. He gathers his feet into the bed and expires." }
];

// ── TORAH — SHEMOT ────────────────────────────────────────────
CHAPTERS["shemot_1"] = [
  { verse:"1:11",   place:"Pitom and Ramses — Slavery",  heb:"פיתום ורעמסס",    lat:30.716, lng:32.042, color:"#8b1a1a", persons:["Pharaoh","Bnei Yisrael"],    themes:["Slavery","Egypt","Suffering"], source:"Radak: The store cities of Pitom and Ramses — identified with Tell el-Maskhuta and Qantir in the eastern Nile Delta — were built by Israelite forced labor.", desc:"Pharaoh enslaves the Israelites. They build the store cities of Pitom and Ramses. The more they are oppressed, the more they multiply. Egypt makes their lives bitter with hard labor." }
];
CHAPTERS["shemot_2"] = [
  { verse:"2:15",   place:"Midyan — Moshe Flees",        heb:"מדין",             lat:28.500, lng:35.000, color:"#2a6a4a", persons:["Moshe","Yitro","Tziporah"],  themes:["Exile","Providence","Marriage"], source:"Rashi: Moshe fled to Midyan — the descendants of Avraham through Ketura. He sat by the well — as Yaakov and Eliezer had sat by wells where providence met them.", desc:"Moshe kills an Egyptian overseer and flees to Midyan. He sits at a well, defends Yitro's daughters from shepherds, and is invited into Yitro's home. He marries Tziporah." }
];
CHAPTERS["shemot_3"] = [
  { verse:"3:1",    place:"Har Chorev — Burning Bush",   heb:"הר חורב",          lat:28.539, lng:33.975, color:"#c8962a", persons:["Moshe","Hashem","Angel"],    themes:["Calling","Prophecy","Revelation"], source:"Rashi: Chorev is Sinai — called Chorev (desolation) because desolation descended on the nations of the world from there, and Sinai because hatred (sinah) descended on the nations.", desc:"Moshe leads the flock to Chorev — the mountain of God. The angel of Hashem appears in a burning bush that is not consumed. Hashem speaks: I am the God of Avraham. I have seen my people's suffering. Go — I am sending you to Pharaoh." }
];
CHAPTERS["shemot_7"] = [
  { verse:"7:20",   place:"Nile River — Ten Plagues",    heb:"יאור מצרים",       lat:30.100, lng:31.300, color:"#8b1a1a", persons:["Moshe","Aharon","Pharaoh"],  themes:["Plagues","Judgment","Miracles"], source:"Rashi: The plagues were structured in three groups of three plus the final plague — each group escalating in severity and each trio following the pattern of warning, morning-warning, and no warning.", desc:"Moshe strikes the Nile with his staff — the water turns to blood. Fish die, the river stinks. The ten plagues begin: blood, frogs, lice, wild beasts, pestilence, boils, hail, locusts, darkness, death of firstborn." }
];
CHAPTERS["shemot_12"] = [
  { verse:"12:37",  place:"Ramses — The Exodus Begins",  heb:"רעמסס",            lat:30.780, lng:32.000, color:"#c8962a", persons:["Bnei Yisrael","Moshe"],      themes:["Exodus","Freedom","Pesach"], source:"Rashi: About 600,000 men on foot besides children — plus the erev rav (mixed multitude). The Exodus from Ramses to Sukkot was the first leg of the journey.", desc:"On the 15th of Nisan, 600,000 men plus families leave Ramses. They travel to Sukkot. They baked unleavened bread — they had no time to wait for it to rise. 430 years of dwelling in Egypt ends." }
];
CHAPTERS["shemot_13"] = [
  { verse:"13:20",  place:"Sukkot to Etam — Desert Edge",heb:"סוכות · איתם",     lat:30.560, lng:32.270, color:"#2a6a4a", persons:["Bnei Yisrael","Moshe"],      themes:["Exodus","Journey","Cloud"], source:"Rashi: Hashem went before them in a pillar of cloud by day and pillar of fire by night — they never lacked guidance. The cloud and fire led them for 40 years.", desc:"Yisrael travels from Sukkot to Etam at the edge of the wilderness. Hashem leads them in a pillar of cloud by day and pillar of fire by night — never departing from before the people." }
];
CHAPTERS["shemot_14"] = [
  { verse:"14:21",  place:"Yam Suf — Splitting of the Sea", heb:"ים סוף",         lat:29.900, lng:32.500, color:"#c8962a", persons:["Moshe","Bnei Yisrael","Pharaoh"], themes:["Miracle","Salvation","Egypt"], source:"Rashi: A strong east wind all that night — the sea stood like a wall on right and left. The Egyptians pursued into the sea at the morning watch. Moshe stretched his hand and the water returned.", desc:"Pharaoh pursues Yisrael to the sea. Moshe stretches his staff — a strong east wind drives the sea back all night. Yisrael crosses on dry land. When Egyptians follow, Moshe stretches his hand and the sea returns. The entire Egyptian force drowns." }
];
CHAPTERS["shemot_15"] = [
  { verse:"15:22",  place:"Wilderness of Shur — Mara",   heb:"מרה",              lat:29.700, lng:33.000, color:"#8b3a3a", persons:["Moshe","Bnei Yisrael"],      themes:["Wilderness","Miracles","Complaint"], source:"Rashi: They traveled three days without water — their bodies were parched. At Mara the water was bitter. Moshe threw a tree into the water and it became sweet — a miracle and a test.", desc:"Three days into the wilderness of Shur without water. They reach Mara — the water is bitter. The people complain. Moshe throws a piece of wood into the water and it becomes sweet." },
  { verse:"15:27",  place:"Eilim — Oasis",               heb:"אילם",             lat:28.900, lng:33.100, color:"#4a7a2a", persons:["Bnei Yisrael"],               themes:["Rest","Provision"],        source:"Malbim: Eilim — twelve springs and seventy palm trees — corresponds to the twelve tribes and seventy elders. Providence provided exactly what was needed for the entire nation.", desc:"They come to Eilim — twelve springs of water and seventy palm trees. The people camp there by the water." }
];
CHAPTERS["shemot_16"] = [
  { verse:"16:1",   place:"Wilderness of Sin — Manna",   heb:"מדבר סין",         lat:29.200, lng:33.400, color:"#4a7a2a", persons:["Bnei Yisrael","Moshe","Aharon"], themes:["Manna","Provision","Wilderness"], source:"Rashi: The entire congregation complained against Moshe and Aharon in the wilderness — if only we had died in Egypt. The manna began on the 16th of Iyar, one month after the Exodus.", desc:"In the wilderness of Sin, the people complain about hunger. Hashem sends manna — bread from heaven — every morning and quail in the evening. The manna falls for 40 years until they enter the land." }
];
CHAPTERS["shemot_17"] = [
  { verse:"17:1",   place:"Refidim — Water from the Rock", heb:"רפידים",          lat:28.700, lng:33.600, color:"#8b3a3a", persons:["Moshe","Bnei Yisrael"],      themes:["Miracle","Complaint","Wilderness"], source:"Rashi: Why did they camp at Refidim? Because they became weak (rafu) in Torah. The Amalek attack immediately followed — showing that spiritual weakness invites attack.", desc:"No water at Refidim. The people quarrel with Moshe. Hashem tells Moshe: strike the rock at Chorev — water will come out. He does and water flows. The place is named Massa and Meriva." },
  { verse:"17:8",   place:"Refidim — Battle with Amalek", heb:"רפידים",           lat:28.700, lng:33.601, color:"#8b1a1a", persons:["Moshe","Yehoshua","Amalek"],  themes:["War","Amalek","Faith"],    source:"Rashi: When Moshe raised his hands Yisrael prevailed — not because of his hands but because he directed their hearts upward to their Father in heaven.", desc:"Amalek attacks Yisrael at Refidim. Yehoshua fights while Moshe holds up his hands on a hilltop. When his hands are up Yisrael prevails; when they fall, Amalek prevails. Aharon and Chur support his hands until sunset. Total victory." }
];
CHAPTERS["shemot_18"] = [
  { verse:"18:5",   place:"Midyan — Yitro Arrives",      heb:"מדבר האלהים",      lat:28.539, lng:33.975, color:"#4a7a2a", persons:["Yitro","Moshe","Tziporah"],  themes:["Family","Leadership","Wisdom"], source:"Rashi: Yitro heard about the splitting of the sea and the war with Amalek. He came to attach himself to Yisrael — a model convert who came for the right reasons.", desc:"Yitro hears of Hashem's miracles and comes to the wilderness with Tziporah and Moshe's sons. He observes Moshe judging alone all day and advises the famous system of delegated leadership — judges of thousands, hundreds, fifties, tens." }
];
CHAPTERS["shemot_19"] = [
  { verse:"19:1",   place:"Har Sinai — Matan Torah",     heb:"הר סיני",          lat:28.539, lng:33.975, color:"#c8962a", persons:["Moshe","Bnei Yisrael","Hashem"], themes:["Torah","Revelation","Covenant"], source:"Rashi: Why was the Torah given in the wilderness? To teach that Torah belongs to no one people — it was given in the public domain, hefker to all.", desc:"Three months after the Exodus, Yisrael camps at the foot of Har Sinai. Thunder, lightning, thick cloud, and the sound of the shofar. Moshe goes up and Hashem descends in fire. The mountain trembles. The Ten Commandments are given." }
];
CHAPTERS["shemot_32"] = [

CHAPTERS["bamidbar_13"] = [
  { verse:"13:1",   place:"Kadesh Barnea — Sending of Spies", heb:"קדש ברנע",    lat:30.642, lng:34.406, color:"#8b1a1a", persons:["Moshe","12 Spies"],          themes:["Spies","Fear","Punishment"], source:"Rashi: Why were they punished so severely? Because they slandered the land itself — they spoke against the gift Hashem had given them. The generation of the desert would not enter.", desc:"Moshe sends twelve spies from Kadesh Barnea into Canaan. After 40 days they return — ten bring a discouraging report: the land devours its inhabitants, the people are giants. The nation weeps all night." },

];
CHAPTERS["bamidbar_20"] = [

];
CHAPTERS["bamidbar_21"] = [

];

CHAPTERS["bamidbar_27"] = [

CHAPTERS["bamidbar_32"] = [

CHAPTERS["devarim_34"] = [

  { verse:"1:1-9",  place:"Arvot Moav — Commission",    heb:"ערבות מואב",       lat:31.870, lng:35.580, color:"#4a7a2a", persons:["Yehoshua","Hashem"],          themes:["Leadership","Covenant","Land"],  source:"Rashi: Hashem tells Yehoshua: be strong and courageous three times — once for Torah, once for battle, once for the division of the land. Each required different courage.", desc:"After Moshe's death, Hashem commissions Yehoshua: arise and cross the Yarden. Every place your foot treads I have given you. Be strong and courageous — do not fear." }

CHAPTERS["yehoshua_2"] = [
  { verse:"2:1",    place:"Yericho — Rachav's House",   heb:"יריחו",             lat:31.871, lng:35.444, color:"#c8962a", persons:["Yehoshua","Two Spies","Rachav"], themes:["Spies","Providence","Chesed"], source:"Rashi: Why did Yehoshua send spies secretly? Because he remembered what happened when Moshe sent spies openly — public failure. He sent only two, quietly.", desc:"Yehoshua sends two spies to Yericho. They lodge with Rachav. She hides them from the king's men under flax on the roof and lowers them by a scarlet cord through the window — binding her and her family to safety." }
];
CHAPTERS["yehoshua_3"] = [
  { verse:"3:14-17",place:"Yarden — Crossing",          heb:"הירדן",             lat:31.837, lng:35.548, color:"#c8962a", persons:["Yehoshua","Kohanim","Bnei Yisrael"], themes:["Miracle","Covenant","Ark"], source:"Rashi: As soon as the feet of the priests touched the water it stopped — the water rose in a heap far upstream at Adam. The entire nation crossed on dry land — the Yam Suf repeated.", desc:"The Kohanim carry the Ark into the Yarden. The water stops flowing and stands in a heap upstream. All Yisrael crosses on dry land. The Kohanim stand in the middle until the entire nation has crossed." }
];
CHAPTERS["yehoshua_4"] = [
  { verse:"4:19-20",place:"Gilgal — First Camp in the Land", heb:"גלגל",          lat:31.870, lng:35.444, color:"#c8962a", persons:["Yehoshua","Bnei Yisrael"],    themes:["Memorial","Land","First Entry"], source:"Rashi: The twelve stones taken from the Yarden were set up at Gilgal — a memorial that when your children ask, you shall tell them: Yisrael crossed the Yarden on dry land.", desc:"Yisrael camps at Gilgal on the eastern border of Yericho. Twelve stones from the Yarden are set up as a memorial. The 10th of Nisan — forty years after the Exodus — Yisrael is in the land." }
];
CHAPTERS["yehoshua_5"] = [
  { verse:"5:2-9",  place:"Gilgal — Circumcision",      heb:"גלגל",              lat:31.870, lng:35.444, color:"#c8962a", persons:["Yehoshua","Bnei Yisrael"],    themes:["Covenant","Circumcision"],      source:"Rashi: The generation born in the wilderness had not been circumcised — the constant travel prevented it. At Gilgal, the reproach of Egypt was rolled away (galal).", desc:"All males born in the wilderness are circumcised at Givat HaAralot at Gilgal. Hashem says: today I have rolled away the reproach of Egypt from you. Gilgal means rolling." },
  { verse:"5:10-12",place:"Gilgal — Pesach; Manna Stops",heb:"גלגל",              lat:31.870, lng:35.444, color:"#4a7a2a", persons:["Bnei Yisrael"],               themes:["Pesach","Manna","Land"],        source:"Rashi: The manna stopped the day after they ate from the produce of the land — on the 16th of Nisan. They had eaten manna for exactly 40 years from the 16th of Iyar after the Exodus.", desc:"Yisrael keeps Pesach at Gilgal on the 14th of Nisan. The next day they eat from the produce of the land — unleavened cakes and parched grain. The manna ceases. They eat from the land of Canaan." },
  { verse:"5:13-15",place:"Yericho — Commander of the Host", heb:"יריחו",         lat:31.871, lng:35.445, color:"#c8962a", persons:["Yehoshua","Angel"],            themes:["Vision","Revelation"],          source:"Malbim: The commander of Hashem's host was Michael — the guardian angel of Yisrael. He appeared to Yehoshua as Hashem appeared to Moshe at the burning bush — with the same command: remove your sandal.", desc:"Near Yericho, Yehoshua sees a man with a drawn sword. 'Are you for us or our enemies?' 'Neither — commander of Hashem's host.' Yehoshua falls on his face. 'Remove your sandal — the place you stand is holy.'" }
];
CHAPTERS["yehoshua_6"] = [
  { verse:"6:1-20", place:"Yericho — The Walls Fall",   heb:"יריחו",             lat:31.871, lng:35.444, color:"#c8962a", persons:["Yehoshua","Kohanim","Bnei Yisrael"], themes:["Miracle","Conquest","Victory"], source:"Radak: Seven days, seven priests, seven shofars, seven circuits on the seventh day. The number seven saturates the event — the city was placed under a sacred cherem from the beginning.", desc:"The Ark and priests circle Yericho once daily for six days, seven times on the seventh. The people shout — the walls collapse. Yisrael storms straight in. Yericho is utterly destroyed. Only Rachav's household is saved." }
];
CHAPTERS["yehoshua_7"] = [
  { verse:"7:1-26", place:"Ai — Defeat and Sin of Achan",heb:"עי",                lat:31.907, lng:35.287, color:"#8b1a1a", persons:["Achan","Yehoshua","Bnei Yisrael"], themes:["Sin","Defeat","Justice"],     source:"Rashi: Achan took from the cherem — the sacred spoil of Yericho that had been forbidden. One man's sin caused the entire nation's defeat at Ai. He is stoned in the Valley of Achor.", desc:"Yisrael attacks Ai and is repulsed — 36 men killed. Yehoshua tears his garments. Hashem reveals: someone has taken from the cherem. Achan confesses — he took a Babylonian garment, silver, and gold. He is stoned with his family at the Valley of Achor." }
];
CHAPTERS["yehoshua_8"] = [
  { verse:"8:1-29", place:"Ai — Second Battle",          heb:"עי",                lat:31.907, lng:35.287, color:"#4a7a2a", persons:["Yehoshua","Bnei Yisrael"],    themes:["Strategy","Victory","Conquest"], source:"Rashi: Yehoshua used an ambush strategy — drawing Ai's forces out by feigned retreat, then attacking from behind. The king of Ai was hung on a tree until evening.", desc:"Yehoshua sets an ambush of 30,000 men behind Ai. He draws the city's defenders out with a feigned retreat, then the ambush force takes and burns the city. Ai is completely destroyed. 12,000 fall." },
  { verse:"8:30-35",place:"Har Eival — Covenant Ceremony", heb:"הר עיבל",         lat:32.213, lng:35.268, color:"#c8962a", persons:["Yehoshua","Bnei Yisrael"],    themes:["Covenant","Torah","Assembly"],   source:"Radak: Yehoshua fulfilled Moshe's command exactly — half the tribes on Har Gerizim for blessing, half on Har Eival for the curses, with the Kohanim and Levites in the valley between.", desc:"Yehoshua builds a mizbe'ach on Har Eival and writes the Torah on plastered stones. All Yisrael — elders, officers, judges — stands on both sides of the Ark. The blessings and curses of the Torah are read aloud." }
];
CHAPTERS["yehoshua_9"] = [
  { verse:"9:3-27", place:"Givon — The Deception",       heb:"גבעון",             lat:31.837, lng:35.176, color:"#8b3a3a", persons:["Yehoshua","Givonites"],       themes:["Deception","Covenant","Oath"],   source:"Rashi: The Givonites heard what was done to Yericho and Ai. They came with old bread, patched wineskins, worn sandals — pretending to be from a distant land. Yehoshua did not consult the Urim.", desc:"The Givonites trick Yehoshua into making a peace treaty — presenting themselves as distant foreigners with stale provisions. When the deception is discovered Yehoshua cannot break the oath — they become woodchoppers and water-carriers." }
];
CHAPTERS["yehoshua_10"] = [
  { verse:"10:1-11",place:"Emek Ayalon — Sun Stands Still",heb:"עמק איילון",       lat:31.840, lng:35.010, color:"#c8962a", persons:["Yehoshua","Five Kings","Bnei Yisrael"], themes:["Miracle","Victory","War"],   source:"Rashi: Sun stand still at Givon and moon in Emek Ayalon — Yehoshua needed more daylight to complete the victory. The sun stopped for about a full day. This is written in the Book of Yashar.", desc:"Five Emorite kings attack Givon for its treaty with Yisrael. Yehoshua marches all night from Gilgal and falls on them suddenly. Giant hailstones kill more than the sword. Yehoshua calls: Sun stand still at Givon! Moon in Emek Ayalon! The sun stops for a full day." },
  { verse:"10:28-43",place:"Southern Campaign — Six Cities", heb:"הנגב",           lat:31.400, lng:34.900, color:"#4a7a2a", persons:["Yehoshua"],                   themes:["Conquest","Campaign","Victory"], source:"Radak: In one campaign Yehoshua struck Makeda, Livna, Lachish, Eglon, Chevron, Devir — the entire southern lowland. He returned to Gilgal after each stage. Rapid mobile warfare.", desc:"Yehoshua's southern campaign: Makeda, Livna, Lachish, Eglon, Chevron, Devir — all conquered in rapid succession. The entire southern hill country, Negev, and Shephelah are taken. Yehoshua returns to Gilgal." }
];
CHAPTERS["yehoshua_11"] = [

];
CHAPTERS["yehoshua_12"] = [
  { verse:"12:1-24", place:"Land Conquered — Summary",   heb:"ארץ ישראל",        lat:32.000, lng:35.200, color:"#4a7a2a", persons:["Yehoshua","Bnei Yisrael"],    themes:["Conquest","Summary","Victory"],  source:"Rashi: 31 kings — each city had its own king. The catalog of conquered kings shows the thoroughness of the conquest and prepares for the distribution of the land to the tribes.", desc:"Summary of conquered territory: 31 kings defeated. From the Arnon in the south to Baal Gad at Har Chermon in the north. The entire Transjordan under Moshe, the entire Cisjordan under Yehoshua." }
];
CHAPTERS["yehoshua_13"] = [
  { verse:"13:1",    place:"Shilo — Land Remaining",     heb:"שילה",              lat:32.053, lng:35.286, color:"#8b3a3a", persons:["Yehoshua","Hashem"],          themes:["Land","Remaining Conquest"],    source:"Rashi: Yehoshua was old and advanced in years — Hashem tells him: much land remains to be possessed. The conquest was not complete. Listing what remains is itself a command to continue.", desc:"Yehoshua is old. Hashem tells him: much land remains to be possessed — the Philistine coast, the Geshurites, Sidonians, Lebanon. The unconquered regions are specified so future generations know the mandate." }
];
CHAPTERS["yehoshua_14"] = [
  { verse:"14:6-15", place:"Chevron — Kalev's Inheritance", heb:"חברון",          lat:31.532, lng:35.095, color:"#c8962a", persons:["Kalev","Yehoshua"],           themes:["Inheritance","Faith","Land"],   source:"Rashi: Kalev was 85 years old and as strong as the day Moshe sent him. He alone had followed Hashem fully — his reward was Chevron, the very place he had visited as a spy 45 years earlier.", desc:"Kalev son of Yefuneh comes to Yehoshua at Gilgal. He recounts his faithfulness with the spies 45 years ago. He is 85 and still strong. He asks for the mountain at Chevron. Yehoshua blesses him and gives him Chevron." }
];
CHAPTERS["yehoshua_15"] = [
  { verse:"15:1-63", place:"Yehuda — Tribal Allotment",  heb:"נחלת יהודה",       lat:31.500, lng:35.000, color:"#4a7a2a", persons:["Tribe of Yehuda"],            themes:["Inheritance","Land","Tribes"],  source:"Radak: The allotment of Yehuda stretches from the Dead Sea to the Mediterranean, from the Negev to Yerushalayim. It includes Chevron, Lachish, Azeka, and Beit Lechem.", desc:"The lot for Yehuda: from the border of Edom in the south to the Dead Sea, west to the Mediterranean. Cities include Chevron, Devir, Lachish, Azeka — and Yerushalayim which the Yevusites would hold until Dovid." }
];
CHAPTERS["yehoshua_17"] = [
  { verse:"17:14-18",place:"Har Efraim — Yosef's Request",heb:"הר אפרים",         lat:32.200, lng:35.200, color:"#8b3a3a", persons:["Bnei Yosef","Yehoshua"],      themes:["Land","Tribes","Forest"],       source:"Rashi: The sons of Yosef complained: we are a great people but have only one lot. Yehoshua told them: if you are a great people — clear the forested hill country and expand there.", desc:"The sons of Yosef complain: we are too many for one lot. Yehoshua tells them: go up to the forest of the Perizzites and Refaim — clear it and it will be yours. You are great — you will expand." }
];
CHAPTERS["yehoshua_18"] = [
  { verse:"18:1",    place:"Shilo — Mishkan Established", heb:"שילה",             lat:32.053, lng:35.286, color:"#c8962a", persons:["Yehoshua","Bnei Yisrael"],    themes:["Mishkan","Assembly","Shilo"],   source:"Rashi: Shilo was chosen because it was in the center of the land — equidistant for all tribes to come for pilgrimage. The Mishkan remained at Shilo for 369 years.", desc:"The entire community of Yisrael assembles at Shilo and sets up the Tent of Meeting there. The land is subdued before them. Shilo becomes the religious center of the land — the Mishkan will rest here for 369 years." },
  { verse:"18:11-28",place:"Binyamin — Tribal Allotment", heb:"נחלת בנימין",     lat:31.850, lng:35.200, color:"#4a7a2a", persons:["Tribe of Binyamin"],          themes:["Land","Tribes","Inheritance"],  source:"Radak: Binyamin's allotment lay between Yehuda and Efraim — a narrow strip including Yerushalayim, Giva, and Beit El. The smallest tribe received the central portion.", desc:"The lot for Binyamin: between Yehuda and Efraim. Cities include Yericho, Beit El, Givon, Rama, Giva — and the slopes of Yerushalayim which straddles Yehuda and Binyamin." }
];
CHAPTERS["yehoshua_19"] = [
  { verse:"19:1",    place:"Tribal Allotments — North",  heb:"נחלות השבטים",     lat:32.500, lng:35.300, color:"#4a7a2a", persons:["Seven Tribes","Yehoshua"],    themes:["Land","Tribes","Inheritance"],  source:"Radak: The remaining seven tribes cast lots at Shilo — Shimon, Zevulun, Yissachar, Asher, Naftali, Dan, and Yehoshua's own portion at Timnat Serach in Efraim.", desc:"Seven tribes receive their allotments at Shilo: Shimon in the south within Yehuda, Zevulun and Yissachar in the Jezreel Valley, Asher and Naftali in the northern Galilee, Dan in the central lowlands." }
];
CHAPTERS["yehoshua_20"] = [
  { verse:"20:1-9",  place:"Cities of Refuge",           heb:"ערי מקלט",         lat:32.600, lng:35.200, color:"#5a6a8a", persons:["Yehoshua","Bnei Yisrael"],    themes:["Justice","Refuge","Law"],       source:"Rashi: Six cities of refuge — three on each side of the Yarden. Kedesh in Galilee, Shchem in Efraim, Chevron in Yehuda; Bezer in the Reuven, Ramot in Gilad, Golan in the Bashan.", desc:"Six cities of refuge are designated: Kedesh in the Galilee, Shchem in Efraim, Chevron in Yehuda — west of the Yarden. Bezer, Ramot, and Golan east of the Yarden. Any unintentional killer may flee there." }
];
CHAPTERS["yehoshua_21"] = [
  { verse:"21:1-3",  place:"Shilo — Levite Cities",      heb:"שילה",              lat:32.053, lng:35.286, color:"#4a7a2a", persons:["Levites","Eleazar","Yehoshua"], themes:["Levites","Cities","Land"],     source:"Rashi: The Levites had no tribal territory — their portion was the service of Hashem. But they received 48 cities scattered throughout all the tribes' territories.", desc:"The Levite heads of families approach Eleazar, Yehoshua, and the tribal leaders at Shilo. They receive 48 cities with their surrounding pasturelands distributed throughout all tribal territories." }
];
CHAPTERS["yehoshua_22"] = [
  { verse:"22:1-9",  place:"Shilo — Transjordan Tribes Depart", heb:"שילה",       lat:32.053, lng:35.286, color:"#4a7a2a", persons:["Reuven","Gad","Half-Menashe","Yehoshua"], themes:["Return","Covenant","Unity"], source:"Radak: Yehoshua blessed them and sent them away to their tents — they had fulfilled their vow made to Moshe to cross armed with their brothers before returning to their land.", desc:"Yehoshua summons Reuven, Gad, and half-Menashe, blesses them for keeping their vow to fight alongside their brothers, and sends them home east of the Yarden with great wealth." },
  { verse:"22:10-34",place:"Gelilot — Altar by the Yarden", heb:"גלילות",         lat:31.870, lng:35.540, color:"#8b3a3a", persons:["Reuven","Gad","Half-Menashe","Pinchas"], themes:["Unity","Conflict","Altar"],  source:"Rashi: When the tribes heard that an altar had been built, they gathered at Shilo to go to war against their brothers — they feared idolatry. Pinchas led the delegation. The crisis was resolved without bloodshed.", desc:"The Transjordan tribes build a large altar at Gelilot by the Yarden. The western tribes nearly go to war. Pinchas leads a delegation. The altar is explained as a witness, not for sacrifice — the crisis is averted." }
];
CHAPTERS["yehoshua_23"] = [
  { verse:"23:1-16", place:"Shilo — Yehoshua\'s FarewellAddress", heb:"שילה",     lat:32.053, lng:35.286, color:"#5a7a9a", persons:["Yehoshua","Elders","Yisrael"], themes:["Farewell","Warning","Covenant"], source:"Radak: Yehoshua was old — he had been 40 when sent as a spy under Moshe, served 7 years in the conquest, 7 years in the division. He was about 110. His farewell echoes Moshe's farewell.", desc:"Yehoshua summons all Yisrael — elders, heads, judges, officers. He reviews Hashem's faithfulness and warns: if you intermarry with the remaining nations they will be a snare. Hashem will drive them out only if you remain faithful." }
];
CHAPTERS["yehoshua_24"] = [
  { verse:"24:1-28", place:"Shchem — Covenant Renewal",  heb:"שכם",               lat:32.220, lng:35.262, color:"#c8962a", persons:["Yehoshua","All Yisrael"],     themes:["Covenant","Assembly","Farewell"], source:"Radak: Shchem was chosen for the final covenant — it was where Avraham first received the promise, where Yaakov bought land, where Yosef's bones would be buried. The covenant closed the circle.", desc:"Yehoshua assembles all the tribes at Shchem. He recounts the entire history from Avraham to the conquest. The people declare: we will serve Hashem. A covenant is made. A great stone is set up under the oak at the sanctuary of Hashem at Shchem." },
  { verse:"24:29-33",place:"Timnat Serach — Yehoshua's Burial", heb:"תמנת סרח",   lat:32.100, lng:35.155, color:"#5a7a9a", persons:["Yehoshua"],                   themes:["Death","Burial","Legacy"],       source:"Rashi: Yehoshua was buried in his own inheritance at Timnat Serach in the hill country of Efraim. Eleazar son of Aharon also died and was buried there. The generation of the conquest was gone.", desc:"Yehoshua son of Nun dies at 110 years. He is buried in his allotted territory at Timnat Serach in the hill country of Efraim. The bones of Yosef, brought up from Egypt, are buried at Shchem in the plot Yaakov had purchased." }
];


// ── MELACHIM I ────────────────────────────────────────────────
CHAPTERS["melachim1_1"] = [
  { verse:"1:1-4",  place:"Yerushalayim — Adoniyahu's Revolt", heb:"ירושלים", lat:31.771, lng:35.231, color:"#c8962a", persons:["Dovid","Adoniyahu","Batsheva","Natan"], themes:["Kingship","Succession","Revolt"], source:"Radak: Dovid was old and could not get warm — his physical weakness emboldened Adoniyahu. Yoav and Evyatar joined him; Tzadok and Natan and Benayahu did not.", desc:"Dovid is old and bedridden. Adoniyahu son of Chagit declares himself king, inviting all the king's sons except Shlomo. Natan and Batsheva warn Dovid — he moves immediately to crown Shlomo." }
];
CHAPTERS["melachim1_2"] = [
  { verse:"2:1-9",  place:"Yerushalayim — Dovid's Deathbed", heb:"ירושלים", lat:31.771, lng:35.231, color:"#c8962a", persons:["Dovid","Shlomo"], themes:["Death","Kingship","Legacy"], source:"Rashi: Dovid's last instructions to Shlomo combined spiritual charge — be strong and walk in Hashem's ways — with political settlements: deal wisely with Yoav, deal with Shimei.", desc:"Dovid charges Shlomo: be strong, walk in Hashem's ways, keep His commandments. He instructs him to settle accounts with Yoav and Shimei. Dovid dies after 40 years of reign and is buried in the City of Dovid." }
];
CHAPTERS["melachim1_3"] = [
  { verse:"3:4-15", place:"Givon — Shlomo's Dream", heb:"גבעון", lat:31.837, lng:35.176, color:"#c8962a", persons:["Shlomo","Hashem"], themes:["Wisdom","Dream","Prayer"], source:"Rashi: Why did Hashem appear at Givon? Because the Mishkan and the great bamah were there. Shlomo offered 1,000 burnt offerings — and Hashem appeared to him that night.", desc:"Shlomo goes to Givon to sacrifice — the great high place. Hashem appears in a dream: ask what I shall give you. Shlomo asks for an understanding heart to judge the people. Hashem grants him wisdom beyond any before or after." }
];
CHAPTERS["melachim1_4"] = [
  { verse:"4:1-19", place:"Yerushalayim — Administration", heb:"ירושלים", lat:31.771, lng:35.232, color:"#c8962a", persons:["Shlomo","Ministers","12 Officers"], themes:["Kingship","Administration","Empire"], source:"Radak: Shlomo divided the land into 12 districts, each supporting the palace for one month a year. The administration reflects the stability and wealth of his kingdom.", desc:"Shlomo appoints twelve officers over all Israel, each responsible for one month of provisions for the royal household. His kingdom extends from the Euphrates to Egypt. Yehuda and Yisrael are as numerous as sand." }
];
CHAPTERS["melachim1_5"] = [
  { verse:"5:15-26",place:"Tzor — Temple Alliance", heb:"צור", lat:33.270, lng:35.194, color:"#c8962a", persons:["Shlomo","Chiram of Tzor"], themes:["Temple","Alliance","Trade"], source:"Rashi: Chiram had loved Dovid. When he heard Shlomo was king he sent his servants. Shlomo told him: my father could not build because of wars — now Hashem has given me rest on all sides.", desc:"Shlomo sends to Chiram king of Tzor requesting cedar and cypress for the Temple. Chiram rejoices and supplies wood from Lebanon by sea. Shlomo sends 30,000 laborers to Lebanon in monthly shifts." }
];
CHAPTERS["melachim1_6"] = [
  { verse:"6:1-38", place:"Har HaBayit — Temple Construction", heb:"הר הבית", lat:31.778, lng:35.235, color:"#c8962a", persons:["Shlomo","Hashem"], themes:["Temple","Building","Covenant"], source:"Rashi: 480 years after the Exodus from Egypt — the Temple construction began. Hashem appeared to Shlomo mid-construction: if you walk in my statutes, I will dwell among the children of Israel.", desc:"Shlomo begins building the Temple in the 480th year after the Exodus. The house is 60 cubits long, 20 wide, 30 high. The inner sanctuary — the Kodesh HaKodashim — is 20 by 20 cubits. The building takes 7 years." }
];
CHAPTERS["melachim1_7"] = [
  { verse:"7:1-12", place:"Yerushalayim — Shlomo's Palace", heb:"ירושלים", lat:31.770, lng:35.230, color:"#c8962a", persons:["Shlomo"], themes:["Building","Kingship","Wealth"], source:"Radak: Shlomo spent 7 years on the Temple and 13 years on his own palace — the House of the Forest of Lebanon. The disproportion troubled later generations.", desc:"Shlomo builds his own palace complex — the House of the Forest of Lebanon, the Hall of Pillars, the Hall of the Throne. He also builds a house for Pharaoh's daughter. All are finest cut stone." }
];
CHAPTERS["melachim1_8"] = [
  { verse:"8:1-11", place:"Har HaBayit — Ark Brought In", heb:"הר הבית", lat:31.778, lng:35.235, color:"#c8962a", persons:["Shlomo","Kohanim","Elders"], themes:["Temple","Ark","Dedication"], source:"Rashi: When the Kohanim brought the Ark into the Holy of Holies, the cloud filled the House of Hashem so densely that the Kohanim could not stand to minister.", desc:"Shlomo assembles all Israel for the Temple dedication. The Ark of the Covenant is brought in. The cloud of Hashem's glory fills the Temple. Shlomo prays the great dedication prayer facing the altar." }
];
CHAPTERS["melachim1_9"] = [
  { verse:"9:1-9", place:"Yerushalayim — Second Vision", heb:"ירושלים", lat:31.771, lng:35.231, color:"#c8962a", persons:["Shlomo","Hashem"], themes:["Covenant","Warning","Temple"], source:"Malbim: Hashem appeared a second time — as He had at Givon. This time the tone is conditional: if you turn away and serve other gods, this Temple will become a ruin and a proverb.", desc:"Hashem appears to Shlomo a second time. He consecrates the Temple. But: if you or your children turn away and serve other gods, I will cut Israel off from the land and the Temple will become a ruin." }
];
CHAPTERS["melachim1_10"] = [
  { verse:"10:1-13",place:"Yerushalayim — Queen of Sheba", heb:"ירושלים", lat:31.771, lng:35.231, color:"#c8962a", persons:["Shlomo","Queen of Sheba"], themes:["Wisdom","Wealth","International"], source:"Radak: The Queen of Sheba came to test Shlomo with hard questions — riddles. She found his wisdom exceeded his fame. She gave him 120 talents of gold and vast amounts of spices.", desc:"The Queen of Sheba hears of Shlomo's fame and comes to test him with hard questions. She is overwhelmed by his wisdom, his palace, his servants, and his wealth. She gives him 120 talents of gold and departs." }
];
CHAPTERS["melachim1_11"] = [
  { verse:"11:1-13",place:"Yerushalayim — Shlomo's Sin", heb:"ירושלים", lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Shlomo","Foreign Wives"], themes:["Sin","Idolatry","Judgment"], source:"Rashi: Shlomo had 700 wives and 300 concubines — and they turned his heart. He built high places for Ashtoreth, Milkom, Chemosh. Hashem was angry and said: I will tear the kingdom from you.", desc:"Shlomo's foreign wives turn his heart to other gods. He builds high places for Ashtoreth of Tzidon, Milkom of Ammon, Chemosh of Moav on the Mount of Olives. Hashem decrees the kingdom will be split — but not in Shlomo's lifetime, for Dovid's sake." },
  { verse:"11:26-40",place:"Tzreda — Yarovam", heb:"צרדה", lat:32.100, lng:35.250, color:"#8b3a3a", persons:["Yarovam","Achiyahu","Shlomo"], themes:["Prophecy","Rebellion","Split"], source:"Radak: Achiyahu the prophet met Yarovam alone in a field and tore a new garment into 12 pieces — ten for Yarovam. The dramatic gesture prophesied the kingdom's division.", desc:"Yarovam ben Nevat of Tzreda is appointed over the corvee labor. The prophet Achiyahu meets him and tears his garment into 12 pieces — ten for Yarovam. Hashem will give him ten tribes. Shlomo tries to kill Yarovam; he flees to Egypt." }
];
CHAPTERS["melachim1_12"] = [
  { verse:"12:1-19",place:"Shchem — Kingdom Splits", heb:"שכם", lat:32.220, lng:35.260, color:"#8b1a1a", persons:["Rechavam","Yarovam","Elders"], themes:["Split","Rebellion","Kingship"], source:"Rashi: Rechavam rejected the elders' counsel and followed the young men — the most consequential political decision in Israelite history. The northern tribes cried: What portion do we have in Dovid?", desc:"Rechavam goes to Shchem to be made king. The people plead for lighter taxation. He consults old advisors, then young ones, and follows the harsh advice. The ten northern tribes rebel: to your tents, Israel! The kingdom splits permanently." },
  { verse:"12:25-33",place:"Beit El — Golden Calves", heb:"בית אל", lat:31.930, lng:35.222, color:"#8b1a1a", persons:["Yarovam"], themes:["Idolatry","Sin","Dan"], source:"Radak: Yarovam feared that if the people went to Yerushalayim to worship, their hearts would return to Rechavam. So he made two golden calves and placed them in Beit El and Dan.", desc:"Yarovam builds two golden calves — one in Beit El, one in Dan. He says: here are your gods who brought you up from Egypt. He establishes non-Levitical priests and changes the festival calendar. This becomes the sin of the house of Yarovam." }
];
CHAPTERS["melachim1_13"] = [
  { verse:"13:1-10",place:"Beit El — Man of God", heb:"בית אל", lat:31.930, lng:35.222, color:"#8b3a3a", persons:["Yarovam","Man of God from Yehuda"], themes:["Prophecy","Judgment","Altar"], source:"Rashi: The man of God cried against the altar: a son shall be born to the house of Dovid — Yoshiyahu by name — and he shall sacrifice the priests of the high places upon you. This prophecy was fulfilled 300 years later.", desc:"A man of God from Yehuda comes to Beit El and prophesies against Yarovam's altar — a king named Yoshiyahu will one day desecrate it. Yarovam stretches out his hand to seize him and it withers. The altar splits and the ashes pour out." }
];
CHAPTERS["melachim1_14"] = [
  { verse:"14:1-18",place:"Shilo — Achiyahu's Prophecy", heb:"שילה", lat:32.053, lng:35.286, color:"#8b3a3a", persons:["Achiyahu","Yarovam's Wife"], themes:["Prophecy","Judgment","Death"], source:"Radak: Achiyahu was very old and blind — but when he heard Yarovam's wife's footsteps at the door he knew her, for Hashem had told him she was coming. His prophecy of doom was total.", desc:"Yarovam's son is ill. He sends his wife disguised to the prophet Achiyahu at Shilo. The blind prophet recognizes her and pronounces doom: because Yarovam made Israel sin, your son will die and the dynasty will be cut off." }
];
CHAPTERS["melachim1_15"] = [
  { verse:"15:16-22",place:"Rama — Asa and Baasha", heb:"רמה", lat:31.860, lng:35.212, color:"#8b3a3a", persons:["Asa","Baasha","Ben-Hadad"], themes:["War","Alliance","Border"], source:"Radak: Baasha built Rama to blockade Yehuda. Asa bribed Ben-Hadad of Aram to break his treaty with Baasha — Ben-Hadad attacked the Galilee, Baasha abandoned Rama, and Asa used the stones to build Geva and Mitzpa.", desc:"Baasha king of Israel builds Rama on the Yehuda border to blockade Yerushalayim. Asa king of Yehuda strips the Temple treasury and bribes Ben-Hadad of Aram to attack from the north. Baasha abandons Rama — Asa uses its stones for Geva and Mitzpa." }
];
CHAPTERS["melachim1_16"] = [
  { verse:"16:23-28",place:"Shomron — Capital Founded", heb:"שומרון", lat:32.278, lng:35.202, color:"#8b3a3a", persons:["Omri"], themes:["Kingship","Building","Capital"], source:"Radak: Omri bought the hill of Shomron from Shemer for two talents of silver and built the city. He called it Shomron after Shemer. As a dynasty, the Omrides were geopolitically powerful but religiously catastrophic.", desc:"Omri king of Israel buys the hill of Shomron for two talents of silver and builds a new capital city. He names it Shomron after its previous owner Shemer. Shomron (Samaria) will be the capital of the northern kingdom until its destruction." }
];
CHAPTERS["melachim1_17"] = [
  { verse:"17:1-7",  place:"Nachal Kerit — Eliyahu Hides", heb:"נחל כרית", lat:32.100, lng:35.550, color:"#8b3a3a", persons:["Eliyahu","Hashem"], themes:["Prophecy","Drought","Eliyahu"], source:"Rashi: Eliyahu told Achav there would be no rain except by his word — the most dramatic confrontation between prophet and king. He then fled to Nachal Kerit east of the Yarden where ravens fed him.", desc:"Eliyahu the Tishbite appears before Achav: as Hashem lives, there will be no dew or rain these years except by my word. Hashem commands him to hide at Nachal Kerit — ravens bring him bread and meat, he drinks from the stream." },
  { verse:"17:8-24", place:"Tzarfat — Widow of Tzarfat", heb:"צרפת", lat:33.452, lng:35.289, color:"#4a7a2a", persons:["Eliyahu","Widow of Tzarfat"], themes:["Miracle","Chesed","Resurrection"], source:"Radak: The jar of flour did not run out and the cruse of oil did not fail — for three years of famine. When the widow's son died, Eliyahu stretched himself over him three times and Hashem heard his prayer.", desc:"The stream dries up. Hashem sends Eliyahu to Tzarfat in Phoenicia where a widow is gathering sticks for a last meal. Her flour and oil miraculously never run out. When her son dies, Eliyahu revives him — the first resurrection in Tanach." }
];
CHAPTERS["melachim1_18"] = [
  { verse:"18:17-40",place:"Har HaKarmel — Contest with Baal", heb:"הר הכרמל", lat:32.749, lng:35.052, color:"#c8962a", persons:["Eliyahu","Baal Prophets","Achav"], themes:["Prophecy","Miracle","Fire"], source:"Rashi: Eliyahu taunted the Baal prophets: perhaps your god is sleeping, or on a journey, or pursuing. At the time of the evening offering, Eliyahu called out and fire fell from heaven and consumed the offering, the wood, the stones, and the water.", desc:"Eliyahu challenges 450 Baal prophets on Har HaKarmel. Each side prepares an altar. The Baal prophets dance and cut themselves from morning until afternoon — no answer. Eliyahu rebuilds the Hashem altar, drenches it with water, prays. Fire falls from heaven and consumes everything." },
  { verse:"18:41-46",place:"Har HaKarmel — End of Drought", heb:"הר הכרמל", lat:32.749, lng:35.053, color:"#4a7a2a", persons:["Eliyahu","Achav"], themes:["Rain","Prayer","Miracle"], source:"Radak: Eliyahu put his face between his knees — the position of deep prayer. Seven times he sent his servant to look toward the sea. On the seventh time: a cloud small as a man's hand rising from the sea.", desc:"After the Baal contest, Eliyahu tells Achav: go up and eat, for there is a sound of the rushing of rain. He prays with his face between his knees. A small cloud rises from the sea. The sky darkens, the rain falls — three years of drought end." }
];
CHAPTERS["melachim1_19"] = [
