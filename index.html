function clearMap() {
  if (clusterGroup) { map.removeLayer(clusterGroup); clusterGroup = null; }
  Object.keys(leafletMarkers).forEach(function(k) { map.removeLayer(leafletMarkers[k]); });
  leafletMarkers = {};
  if (pathLine) { map.removeLayer(pathLine); pathLine = null; }
}

// ── DESELECT ─────────────────────────────────────────────────
function deselectEvent() {
  if (activeId === null) return;
  var item = document.getElementById('item-' + activeId);
  if (item) item.classList.remove('active');
  var m = leafletMarkers[activeId];
  if (m) {
    var ev = events.find(function(e) { return e.id === activeId; });
    if (ev) m.setStyle({ radius: currentMode === 'book' ? 7 : 8, color: '#f5eed8', weight: currentMode === 'book' ? 1.5 : 2 });
    m.closePopup();
  }
  activeId = null;
}

// ── SELECT EVENT ─────────────────────────────────────────────
function selectEvent(id) {
  // Deactivate previous
  if (activeId !== null) {
    var pi = document.getElementById('item-' + activeId);
    if (pi) pi.classList.remove('active');
    var pm = leafletMarkers[activeId];
    if (pm) {
      var prevEv = events.find(function(e) { return e.id === activeId; });
      if (prevEv) pm.setStyle({ radius: currentMode === 'book' ? 7 : 8, color: '#f5eed8', weight: currentMode === 'book' ? 1.5 : 2 });
    }
  }
  activeId = id;
  // Activate sidebar item
  var item = document.getElementById('item-' + id);
  if (item) {
    item.classList.add('active');
    if (currentMode === 'book') {
      var grp = item.closest('.ch-group');
      if (grp) { var h = grp.querySelector('.ch-group-hdr'); if (h && !h.classList.contains('open')) h.classList.add('open'); }
    }
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    openDrawerIfMobile();
  }
  // Activate marker
  var m = leafletMarkers[id];
  if (m) { m.setStyle({ radius: 11, color: '#e8c76a', weight: 3 }); m.openPopup(); }
  // flyTo
  var ev = events.find(function(e) { return e.id === id; });
  if (ev) {
    map.flyTo([ev.lat, ev.lng], 13, { duration: 1.1 });
    refreshPlaceTab(ev);
  }
}

// ── PLACE HISTORY ────────────────────────────────────────────
function openPlaceHistory(lat, lng, placeName, hebName) {
  var panel = document.getElementById('place-history');
  var list  = document.getElementById('ph-list');

  document.getElementById('ph-title').textContent = placeName;
  document.getElementById('ph-heb').textContent   = hebName || '';

  list.innerHTML = '';

  // ── Collect ALL Tanach events at this location across all books ──
  var tanachEvents = [];
  var bookOrder = ['bereishit','shemot','vayikra','bamidbar','devarim','yehoshua','shmuel1','shmuel2'];
  var bookLabels = {bereishit:'Bereishit',shemot:'Shemot',vayikra:'Vayikra',
                    bamidbar:'Bamidbar',devarim:'Devarim',yehoshua:'Yehoshua',
                    shmuel1:'Shmuel I',shmuel2:'Shmuel II'};
  bookOrder.forEach(function(bk) {
    var book = BOOKS[bk];
    if (!book) return;
    book.chapters.forEach(function(ch) {
      var key = ch.key || (bk + '_' + ch.num);
      var data = CHAPTERS[key];
      if (!data) return;
      data.forEach(function(ev, i) {
        if (haversineKm(lat, lng, ev.lat, ev.lng) <= PROXIMITY_KM) {
          tanachEvents.push({
            era: 'tanach', book: bk, bookLabel: bookLabels[bk],
            chapterNum: ch.num, chapterLabel: ch.label,
            verse: ev.verse, place: ev.place, heb: ev.heb || '',
            desc: ev.desc, source: ev.source || '',
            persons: ev.persons || [],
            color: getBookChapterColor(bk, ch.num),
            eventId: ch.num * 100 + i + 1,
            sortKey: bookOrder.indexOf(bk) * 10000 + ch.num * 100 + i
          });
        }
      });
    });
  });

  // ── Collect Talmudic events ──
  var talEvents = TALMUDIC_EVENTS.filter(function(ev) {
    return haversineKm(lat, lng, ev.lat, ev.lng) <= PROXIMITY_KM;
  }).map(function(ev) {
    return { era:'talmudic', year: ev.year, period: ev.period,
      place: ev.place, heb: ev.heb || '', desc: ev.desc, source: ev.source || '',
      persons: ev.persons || [], color: getTalmudicColor(ev.period),
      id: ev.id, sortKey: 1000000 + ev.year };
  });

  // ── Collect Modern events ──
  var modEvents = MODERN_EVENTS.filter(function(ev) {
    return haversineKm(lat, lng, ev.lat, ev.lng) <= PROXIMITY_KM;
  }).map(function(ev) {
    return { era:'modern', year: ev.year, period: ev.period,
      place: ev.place, heb: ev.heb || '', desc: ev.desc, source: ev.source || '',
      persons: ev.persons || [], color: getModernColor(ev.period),
      id: ev.id, sortKey: 2000000 + ev.year };
  });

  var total = tanachEvents.length + talEvents.length + modEvents.length;
  document.getElementById('ph-subtitle').textContent =
    total + ' event' + (total !== 1 ? 's' : '') + ' across ' +
    [tanachEvents.length > 0 ? 'Tanach' : '',
     talEvents.length > 0 ? 'Talmudic' : '',
     modEvents.length > 0 ? 'Modern' : ''].filter(Boolean).join(', ');

  if (total === 0) {
    list.innerHTML = '<div class="ph-empty">No events found within 1km of this location.</div>';
    panel.classList.add('open');
    return;
  }

  // ── Render sections ──
  function makeSep(label, color) {
    var s = document.createElement('div');
    s.className = 'ph-sep';
    s.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + color + ';margin-right:6px;vertical-align:middle;"></span>' + label;
    list.appendChild(s);
  }

  function makeRow(ev, onClick) {
    var d = document.createElement('div');
    d.className = 'ph-event';
    var eraHtml = '';
    if (ev.era === 'tanach') {
      eraHtml = '<span class="ph-era-dot" style="background:' + ev.color + '"></span>' +
                ev.bookLabel + '<br><span style="color:#4a3a1a;">' + ev.verse + '</span>';
    } else {
      eraHtml = '<span class="ph-era-dot" style="background:' + ev.color + '"></span>' +
                ev.year + (ev.era === 'talmudic' ? ' CE' : '') + '<br>' +
                '<span style="color:#4a3a1a;font-size:8px;">' + ev.period + '</span>';
    }
    d.innerHTML =
      '<div class="ph-era">' + eraHtml + '</div>' +
      '<div>' +
        '<div class="ph-place">' + ev.place + (ev.heb ? ' <span style="font-size:10px;color:var(--stone);font-weight:400;">' + ev.heb + '</span>' : '') + '</div>' +
        '<div class="ph-desc">' + ev.desc + '</div>' +
        (ev.source ? '<div class="ph-source">' + ev.source + '</div>' : '') +
      '</div>';
    d.onclick = onClick;
    list.appendChild(d);
  }

  if (tanachEvents.length > 0) {
    makeSep('Tanach', '#c8962a');
    tanachEvents.forEach(function(ev) {
      makeRow(ev, function() {
        closePlaceHistory();
        loadChapter(ev.book, ev.chapterNum);
      });
    });
  }

  if (talEvents.length > 0) {
    makeSep('Talmudic Era · 70–500 CE', '#7a4a2a');
    talEvents.forEach(function(ev) {
      makeRow(ev, function() {
        closePlaceHistory();
        if (!showTalmudic) toggleTalmudicEra();
        setTimeout(function() { selectTalmudicEvent(ev.id); }, 200);
      });
    });
  }

  if (modEvents.length > 0) {
    makeSep('Modern Era · 1882–1967', '#2a5a8a');
    modEvents.forEach(function(ev) {
      makeRow(ev, function() {
        closePlaceHistory();
        if (!showModern) toggleModernEra();
        setTimeout(function() { selectModernEvent(ev.id); }, 200);
      });
    });
  }

  panel.classList.add('open');
  map.flyTo([lat, lng], 14, { duration: 0.8 });
}

function closePlaceHistory() {
  document.getElementById('place-history').classList.remove('open');
  // Restore scroll position to active event if one exists
  if (activeId !== null) {
    var item = document.getElementById('item-' + activeId);
    if (item) setTimeout(function() { item.scrollIntoView({ behavior:'smooth', block:'nearest' }); }, 50);
  }
}

// ── PLACE ACROSS TIME ────────────────────────────────────────
var PROXIMITY_KM = 1.0;

function hasAnyNearbyAcrossAllBooks(lat, lng) {
  // Quick check: does any book (not just current) have events within PROXIMITY_KM?
  var bookOrder = ['bereishit','shemot','vayikra','bamidbar','devarim','yehoshua','shmuel1','shmuel2'];
  var count = 0;
  for (var bi = 0; bi < bookOrder.length; bi++) {
    var bk = bookOrder[bi];
    var book = BOOKS[bk];
    if (!book) continue;
    for (var ci = 0; ci < book.chapters.length; ci++) {
      var ch = book.chapters[ci];
      var key = ch.key || (bk + '_' + ch.num);
      var data = CHAPTERS[key];
      if (!data) continue;
      for (var ei = 0; ei < data.length; ei++) {
        if (haversineKm(lat, lng, data[ei].lat, data[ei].lng) <= PROXIMITY_KM) {
          count++;
          if (count > 1) return true; // found more than 1 — button should show
        }
      }
    }
  }
  // Also check era events
  for (var mi = 0; mi < MODERN_EVENTS.length; mi++) {
    if (haversineKm(lat, lng, MODERN_EVENTS[mi].lat, MODERN_EVENTS[mi].lng) <= PROXIMITY_KM) return true;
  }
  for (var ti = 0; ti < TALMUDIC_EVENTS.length; ti++) {
    if (haversineKm(lat, lng, TALMUDIC_EVENTS[ti].lat, TALMUDIC_EVENTS[ti].lng) <= PROXIMITY_KM) return true;
  }
  return false;
}

// Refreshes the place tab on the active sidebar item — called on select
// so it always reflects current era state
function refreshPlaceTab(ev) {
  var item = document.getElementById('item-' + ev.id);
  if (!item) return;
  var det = item.querySelector('.ev-detail');
  if (!det) return;

  var nearby    = findNearby(ev.lat, ev.lng, ev.id);
  var nearbyMod = findNearbyModern(ev.lat, ev.lng);
  var nearbyTal = findNearbyTalmudic(ev.lat, ev.lng);
  var total     = nearby.length + nearbyMod.length + nearbyTal.length;

  // Remove existing toggle + place panel, leave event panel alone
  var existingToggle = det.querySelector('.pat-toggle');
  if (existingToggle) existingToggle.remove();
  var existingPlace = document.getElementById('panel-place-' + ev.id);
  if (existingPlace) existingPlace.remove();

  if (total <= 1 && nearbyMod.length === 0) return; // nothing to show

  var placeLabel = 'This Place (' + (nearby.length + nearbyMod.length + nearbyTal.length) + ')';

  // Re-insert toggle before the event panel
  var evPanel = document.getElementById('panel-ev-' + ev.id);
  var toggleDiv = document.createElement('div');
  toggleDiv.className = 'pat-toggle';
  toggleDiv.innerHTML =
    '<button class="pat-tab active" id="tab-ev-' + ev.id + '" onclick="switchTab(' + ev.id + ',\'ev\')">This Event</button>' +
    '<button class="pat-tab" id="tab-place-' + ev.id + '" onclick="switchTab(' + ev.id + ',\'place\')">' + placeLabel + '</button>';
  det.insertBefore(toggleDiv, evPanel);

  // Build place rows — Tanach
  var tanachRows = nearby.map(function(ne) {
    var isCurrent = (ne.eventId === ev.id || (ne.chapterNum === (ev.chapterNum || currentChapter) && ne.verse === ev.verse));
    return '<div class="pat-event' + (isCurrent ? ' current' : '') + '" onclick="' +
      (isCurrent ? '' : 'jumpToPlace(' + ne.chapterNum + ',' + ne.eventId + ')') + '">' +
      '<div class="pat-ch"><span class="pat-ch-dot" style="background:' + (CHAPTER_COLORS[ne.chapterNum] || '#8a7a5a') + '"></span>Ch ' + ne.chapterNum + ' · ' + ne.verse + '</div>' +
      '<div class="pat-place">' + ne.place + '</div>' +
      '<div class="pat-d">' + ne.desc.substring(0,90) + '…</div></div>';
  }).join('');

  // Build place rows — Modern
  var modernRows = nearbyMod.map(function(me) {
    return '<div class="pat-event" onclick="selectModernEvent(\'' + me.id + '\')" style="border-left:2px solid ' + getModernColor(me.period) + ';padding-left:8px;">' +
      '<div class="pat-ch" style="color:#4a7a9a;"><span class="pat-ch-dot" style="background:' + getModernColor(me.period) + '"></span>' + me.year + ' · ' + me.period + '</div>' +
      '<div class="pat-place">' + me.place + '</div>' +
      '<div class="pat-d">' + me.desc.substring(0,90) + '…</div></div>';
  }).join('');

  // Build place rows — Talmudic
  var talmudicRows = nearbyTal.map(function(te) {
    return '<div class="pat-event" onclick="selectTalmudicEvent(\'' + te.id + '\')" style="border-left:2px solid ' + getTalmudicColor(te.period) + ';padding-left:8px;">' +
      '<div class="pat-ch" style="color:#9a7a5a;"><span class="pat-ch-dot" style="background:' + getTalmudicColor(te.period) + '"></span>' + te.year + ' CE · ' + te.period + '</div>' +
      '<div class="pat-place">' + te.place + '</div>' +
      '<div class="pat-d">' + te.desc.substring(0,90) + '…</div></div>';
  }).join('');

  var placePanel = document.createElement('div');
  placePanel.className = 'pat-panel';
  placePanel.id = 'panel-place-' + ev.id;
  placePanel.innerHTML = (tanachRows + modernRows + talmudicRows) || '<div class="pat-none">No other events found nearby.</div>';

  // Add "Full Place History" button if there are any nearby events
  if (hasAnyNearbyAcrossAllBooks(ev.lat, ev.lng)) {
    var btnWrap = document.createElement('div');
    btnWrap.style.cssText = 'padding:8px 0 2px;';
    var btn = document.createElement('button');
    btn.className = 'ph-btn';
    btn.innerHTML = '⟐ Full Place History';
    var capLat = ev.lat, capLng = ev.lng, capPlace = ev.place, capHeb = ev.heb || '';
    btn.onclick = function(e) {
      e.stopPropagation();
      openPlaceHistory(capLat, capLng, capPlace, capHeb);
    };
    btnWrap.appendChild(btn);
    placePanel.appendChild(btnWrap);
  }

  det.appendChild(placePanel);
}

function findNearby(lat, lng, excludeId) {
  var book = BOOKS[currentBook];
  var nearby = []; var seen = {};
  book.chapters.forEach(function(ch) {
    var key = ch.key || (currentBook + '_' + ch.num);
    var data = CHAPTERS[key];
    if (!data) return;
    data.forEach(function(ev, i) {
      if (haversineKm(lat, lng, ev.lat, ev.lng) <= PROXIMITY_KM) {
        var uid = ch.num + '_' + i;
        if (!seen[uid]) {
          seen[uid] = true;
          var chColor = (currentBook === 'shmuel2' ? CHAPTER_COLORS_S2 : CHAPTER_COLORS)[ch.num] || '#8a7a5a';
          nearby.push({ chapterNum: ch.num, verse: ev.verse, place: ev.place, heb: ev.heb || '',
            desc: ev.desc, source: ev.source || '', persons: ev.persons || [],
            eventId: ch.num * 100 + i + 1, color: chColor });
        }
      }
    });
  });
  nearby.sort(function(a, b) { return a.chapterNum !== b.chapterNum ? a.chapterNum - b.chapterNum : a.verse.localeCompare(b.verse); });
  return nearby;
}

// ── MODE ─────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-chapter').className = 'pill-btn' + (mode === 'chapter' ? ' active' : '');
  document.getElementById('btn-book').className    = 'pill-btn' + (mode === 'book'    ? ' active' : '');
  var chCtrl = document.getElementById('ch-controls');
  chCtrl.style.opacity = mode === 'book' ? '0.3' : '1';
  chCtrl.style.pointerEvents = mode === 'book' ? 'none' : '';
  if (mode === 'book') loadBookView();
  else loadChapter(currentBook, currentChapter);
}

function loadBookView() {
  console.log('Makom: loadBookView', currentBook, 'mode:', currentMode);
  try {
  var book = BOOKS[currentBook];
  if (!book) { console.error('Makom: no book config for', currentBook); return; }
  var all = [];
  book.chapters.forEach(function(ch) {
    var key = ch.key || (currentBook + '_' + ch.num);
    var data = CHAPTERS[key];
    if (!data) { console.warn('Makom: no data for key', key); return; }
    data.forEach(function(ev, i) {
      try {
        var c = JSON.parse(JSON.stringify(ev));
        var bookOffset = {'bereishit':0,'shemot':10000,'vayikra':20000,'bamidbar':30000,
                          'devarim':40000,'yehoshua':50000,'shmuel1':60000,'shmuel2':70000};
        c.id = (bookOffset[currentBook] || 0) + ch.num * 100 + i + 1;
        c.chapterNum = ch.num; c.chapterLabel = ch.label;
        c.color = getBookChapterColor(currentBook, ch.num);
        all.push(c);
      } catch(err) {
        console.error('Makom loadBookView error ch', ch.num, 'ev', i, ':', err.message);
      }
    });
  });
  events = all; activeId = null;
  // Reset filters
  bookFilterPerson = ''; bookFilterTheme = ''; bookFilterMaxCh = 31;
  document.getElementById('bc-person').value = '';
  document.getElementById('bc-theme').value  = '';
  var rng = document.getElementById('bc-range');
  var maxCh = Math.max.apply(null, BOOKS[currentBook].chapters.map(function(c){return c.num;}));
  bookFilterMaxCh = maxCh;
  rng.max = maxCh;
  rng.value = maxCh; rng.style.setProperty('--pct','100%');
  document.getElementById('range-disp').textContent = maxCh;
  document.getElementById('range-end').textContent  = maxCh;
  renderSidebarBook();
  renderMapBook();
  updateHeader();
  updateLegend();
  var lls = events.map(function(e) { return [e.lat, e.lng]; });
  if (lls.length) map.fitBounds(L.latLngBounds(lls), { padding: [40,40], maxZoom: 10 });
  console.log('Makom: loadBookView done, events:', events.length);
  } catch(e) { console.error('Makom: loadBookView error:', e.message, e.stack); }
}

  try {
    if (currentMode === 'book') {
      var book = BOOKS[currentBook];
      document.getElementById('h-heb').textContent = book.hebrewLabel + ' — כל הספר';
      document.getElementById('h-sub').textContent = book.label + ' — Full Book';
      document.getElementById('ev-badge').textContent = events.length + ' events';
    } else {
      var bk = BOOKS[currentBook];
      var chObj = bk.chapters.find(function(c) { return c.num === currentChapter; });
      var chLabel = chObj ? chObj.label : 'Chapter ' + currentChapter;
      var subLabel = chLabel.indexOf('—') >= 0 ? chLabel.split('—')[1].trim() : chLabel;
      document.getElementById('h-heb').textContent = bk.hebrewLabel + ' · פרק ' + hebrewNumeral(currentChapter);
      document.getElementById('h-sub').textContent = bk.label + ' · ' + subLabel;
      document.getElementById('ev-badge').textContent = events.length + ' events';
    }
  } catch(e) { console.error('updateHeader error:', e.message); }
  var dl = document.getElementById('drawer-label');
  if (dl && !document.getElementById('sidebar').classList.contains('open')) {
    dl.textContent = events.length + ' Events';
  }
}

// ── SEARCH ───────────────────────────────────────────────────
var currentQuery = '';

function onSearch(q) {
  currentQuery = q.trim().toLowerCase();
  var clearBtn = document.getElementById('search-clear');
  var countEl  = document.getElementById('search-count');
  clearBtn.className = 'search-clear' + (currentQuery ? ' visible' : '');

  if (!currentQuery) {
    document.querySelectorAll('#event-list .ev-item').forEach(function(el) {
      el.classList.remove('hidden');
    });
    document.querySelectorAll('.ch-group').forEach(function(grp) {
      grp.style.display = '';
    });
    countEl.className = 'search-count';
    return;
  }

  var matched = 0;
  var total   = 0;

  // Search Tanach events
  events.forEach(function(ev) {
    total++;
    var haystack = [
      ev.place, ev.heb || '', ev.desc, ev.verse,
      (ev.persons || []).join(' '), (ev.themes || []).join(' '),
      ev.source || '', ev.chapterLabel || ''
    ].join(' ').toLowerCase();
    var item = document.getElementById('item-' + ev.id);
    if (!item) return;
    if (haystack.indexOf(currentQuery) >= 0) {
      item.classList.remove('hidden'); matched++;
    } else {
      item.classList.add('hidden');
    }
  });

  // Search Talmudic events if overlay is on
  if (showTalmudic) {
    TALMUDIC_EVENTS.forEach(function(ev) {
      total++;
      var haystack = [
        ev.place, ev.heb || '', ev.desc, String(ev.year),
        ev.period, (ev.persons || []).join(' '), ev.source || ''
      ].join(' ').toLowerCase();
      var item = document.getElementById('item-' + ev.id);
      if (!item) return;
      if (haystack.indexOf(currentQuery) >= 0) {
        item.classList.remove('hidden'); matched++;
      } else {
        item.classList.add('hidden');
      }
    });
  }

  // Search modern events if overlay is on
  if (showModern) {
    MODERN_EVENTS.forEach(function(ev) {
      total++;
      var haystack = [
        ev.place, ev.heb || '', ev.desc, String(ev.year),
        ev.period, (ev.persons || []).join(' '), ev.source || ''
      ].join(' ').toLowerCase();
      var item = document.getElementById('item-' + ev.id);
      if (!item) return;
      if (haystack.indexOf(currentQuery) >= 0) {
        item.classList.remove('hidden'); matched++;
      } else {
        item.classList.add('hidden');
      }
    });
  }

  // Book mode: hide empty chapter groups, open groups with matches
  if (currentMode === 'book') {
    document.querySelectorAll('.ch-group').forEach(function(grp) {
      var vis = grp.querySelectorAll('.ev-item:not(.hidden)').length;
      grp.style.display = vis > 0 ? '' : 'none';
      if (vis > 0) {
        var hdr = grp.querySelector('.ch-group-hdr');
        if (hdr && !hdr.classList.contains('open')) hdr.classList.add('open');
      }
    });
  }

  countEl.className = 'search-count visible';
  countEl.textContent = matched + ' of ' + total + ' match';
}

function clearSearch() {
  var inp = document.getElementById('search-input');
  if (inp) { inp.value = ''; onSearch(''); inp.focus(); }
}

function resetSearch() {
  currentQuery = '';
  var inp = document.getElementById('search-input');
  if (inp) inp.value = '';
  var clearBtn = document.getElementById('search-clear');
  if (clearBtn) clearBtn.className = 'search-clear';
  var countEl = document.getElementById('search-count');
  if (countEl) countEl.className = 'search-count';
}

function toggleDrawer() {
  var sb = document.getElementById('sidebar');
  var btn = document.getElementById('drawer-toggle');
  var isOpen = sb.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  document.getElementById('drawer-label').textContent = isOpen ? 'Map' : 'Events';
}

function openDrawerIfMobile() {
  if (window.innerWidth <= 680) {
    var sb = document.getElementById('sidebar');
    var btn = document.getElementById('drawer-toggle');
    sb.classList.add('open');
    btn.classList.add('open');
    document.getElementById('drawer-label').textContent = 'Map';
  }
}

// ── ERA OVERLAY REFRESH ON MAP MOVE ─────────────────────────
function refreshEraOverlays() {
  if (showModern)   { clearModernOverlay();   renderModernOverlay();   }
  if (showTalmudic) { clearTalmudicOverlay(); renderTalmudicOverlay(); }
}
