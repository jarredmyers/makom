  { verse:"19:1-8",  place:"Beer Sheva and Wilderness — Eliyahu Flees", heb:"באר שבע", lat:31.252, lng:34.791, color:"#8b3a3a", persons:["Eliyahu","Izevel","Angel"], themes:["Flight","Despair","Angel"], source:"Rashi: Eliyahu fled a day's journey into the wilderness and sat under a broom tree asking to die: it is enough, take my life. An angel touched him twice and told him to eat — the journey is too great for you.", desc:"Izevel threatens to kill Eliyahu. He flees to Beer Sheva, leaves his servant, goes a day into the wilderness. He asks to die. An angel touches him: arise and eat. Twice. He travels 40 days on that food to Har Chorev — the mountain of God." },
  { verse:"19:9-18", place:"Har Chorev — Still Small Voice", heb:"הר חורב", lat:28.539, lng:33.975, color:"#c8962a", persons:["Eliyahu","Hashem"], themes:["Revelation","Prophecy","Calling"], source:"Malbim: The wind, earthquake, and fire — Hashem was not in them. Then the still small voice (kol demama daka). The most dramatic reversal in prophetic experience: power is not God's medium. Silence is.", desc:"Eliyahu comes to Har Chorev — the same mountain where Moshe received the Torah. He hides in a cave. Hashem passes by: wind, earthquake, fire — Hashem is not in them. Then a still small voice. Eliyahu is commissioned: anoint Elisha, Yeihu, and Chazael." }
];
CHAPTERS["melachim1_20"] = [
  { verse:"20:1-21", place:"Shomron — Ben-Hadad's Siege", heb:"שומרון", lat:32.278, lng:35.202, color:"#8b3a3a", persons:["Achav","Ben-Hadad","Prophet"], themes:["War","Siege","Miracle"], source:"Rashi: An unnamed prophet told Achav: do you see this great multitude? I will deliver it into your hand today — so you will know that I am Hashem. A small force of 232 young men routed the vast Aramean army.", desc:"Ben-Hadad of Aram besieges Shomron with 32 vassal kings. He demands Achav's silver, gold, wives, and children. Achav refuses his final demand. A prophet promises miraculous victory — a small force routs the entire Aramean army." }
];
CHAPTERS["melachim1_21"] = [
  { verse:"21:1-16", place:"Yizreel — Nabot's Vineyard", heb:"יזרעאל", lat:32.591, lng:35.316, color:"#8b1a1a", persons:["Achav","Izevel","Nabot"], themes:["Murder","Justice","Land"], source:"Radak: Nabot refused to sell his ancestral inheritance — the Torah forbids alienating inherited land permanently. Izevel arranged a false accusation of cursing God and king. Two false witnesses were enough for execution.", desc:"Achav wants Nabot's vineyard adjacent to his palace in Yizreel. Nabot refuses: Hashem forbid I give you my ancestral inheritance. Izevel arranges false witnesses, Nabot is stoned. Achav takes the vineyard. Eliyahu is sent to pronounce judgment." },
  { verse:"21:17-29",place:"Yizreel — Eliyahu\'s Verdict", heb:"יזרעאל", lat:32.591, lng:35.317, color:"#8b1a1a", persons:["Eliyahu","Achav","Izevel"], themes:["Prophecy","Judgment","Repentance"], source:"Rashi: In the place where dogs licked Nabot's blood, dogs will lick your blood. Izevel: dogs will eat Izevel in the plot of Yizreel. When Achav repented, Hashem told Eliyahu: the evil will come in his son's days, not his.", desc:"Eliyahu confronts Achav in Nabot's vineyard: have you murdered and also inherited? Dogs will lick your blood. Izevel will be eaten by dogs in Yizreel. Achav tears his clothes and fasts — and Hashem partially relents." }
];
CHAPTERS["melachim1_22"] = [
  { verse:"22:1-37", place:"Ramot Gilad — Achav's Death", heb:"רמות גלעד", lat:32.300, lng:35.750, color:"#8b1a1a", persons:["Achav","Yehoshafat","Michayahu","Aram"], themes:["Death","Prophecy","War"], source:"Rashi: The prophet Michayahu told the truth — all the other prophets prophesied falsely. Achav ordered him imprisoned. In the battle, a man drew his bow randomly and struck Achav between the joints of his armor.", desc:"Achav and Yehoshafat of Yehuda plan to retake Ramot Gilad from Aram. The prophet Michayahu prophesies Achav's death. Achav disguises himself in battle. A random arrow strikes him between his armor joints. He dies at sunset — his chariot is washed in the pool of Shomron and dogs lick his blood." }
];

// ── MELACHIM II ───────────────────────────────────────────────
CHAPTERS["melachim2_1"] = [
  { verse:"1:1-16",  place:"Shomron — Achazya and Baal-Zevuv", heb:"שומרון", lat:32.278, lng:35.202, color:"#8b3a3a", persons:["Achazya","Eliyahu"], themes:["Idolatry","Judgment","Prophecy"], source:"Rashi: Achazya sent messengers to consult Baal-Zevuv of Ekron instead of Hashem — consulting a foreign god about his own fate. Eliyahu intercepted them: is there no God in Israel that you go to Baal-Zevuv?", desc:"Achazya son of Achav falls through a lattice and is injured. He sends to consult Baal-Zevuv god of Ekron. Eliyahu intercepts his messengers and pronounces judgment: you will not rise from your bed. Twice Achazya's soldiers are consumed by fire from heaven before Eliyahu comes." }
];
CHAPTERS["melachim2_2"] = [
  { verse:"2:1-14",  place:"Yarden — Eliyahu's Ascent", heb:"הירדן", lat:31.833, lng:35.547, color:"#c8962a", persons:["Eliyahu","Elisha"], themes:["Eliyahu","Miracle","Succession"], source:"Rashi: A fiery chariot and fiery horses separated them — and Eliyahu went up in a whirlwind to heaven. Elisha saw it and cried: my father, my father — the chariot of Israel and its horsemen.", desc:"Eliyahu and Elisha travel from Gilgal to Beit El to Yericho to the Yarden. Eliyahu strikes the water and it parts. They cross on dry land. A fiery chariot takes Eliyahu in a whirlwind to heaven. Elisha tears his clothes and takes up Eliyahu's mantle — and parts the Yarden himself on return." },
  { verse:"2:19-22", place:"Yericho — Healing the Waters", heb:"יריחו", lat:31.871, lng:35.444, color:"#4a7a2a", persons:["Elisha"], themes:["Miracle","Water","Elisha"], source:"Radak: The men of Yericho said: the city is pleasant but the water is bad and the land is causing miscarriages. Elisha threw salt into the spring and healed the waters — the spring of Elisha is still identified near Yericho today.", desc:"The men of Yericho tell Elisha the city is good but the water is bad. He takes a new bowl with salt, throws it into the spring, and pronounces it healed. The waters are good to this day — identified with Ein es-Sultan near Yericho." }
];
CHAPTERS["melachim2_3"] = [
  { verse:"3:4-27",  place:"Midbar Moav — Campaign", heb:"מדבר מואב", lat:31.200, lng:35.600, color:"#8b3a3a", persons:["Yehoram","Yehoshafat","Elisha","Mesha"], themes:["War","Prophecy","Moav"], source:"Rashi: Elisha said: were it not that I respect Yehoshafat king of Yehuda, I would not look at you or see you. He called for a musician and the spirit of Hashem came upon him.", desc:"Israel, Yehuda, and Edom march against Moav. The army runs out of water in the wilderness. They consult Elisha who provides water miraculously and predicts victory. Mesha king of Moav sacrifices his firstborn son on the city wall — Israel withdraws." }
];
CHAPTERS["melachim2_4"] = [
  { verse:"4:8-37",  place:"Shunam — Elisha and the Shunamite", heb:"שונם", lat:32.620, lng:35.336, color:"#4a7a2a", persons:["Elisha","Shunamite Woman"], themes:["Miracle","Chesed","Resurrection"], source:"Radak: The Shunamite built an upper chamber for Elisha on the roof — a bed, table, chair, and lamp. When her son died of sunstroke in the field, she rode to Elisha at Har HaKarmel immediately. He came and revived the child.", desc:"A wealthy Shunamite woman builds Elisha a roof chamber. He promises her a son. The boy is born but dies of sunstroke. She rides to Elisha at Har HaKarmel. He comes to Shunam and revives the child by lying over him twice — the child sneezes seven times and opens his eyes." }
];
CHAPTERS["melachim2_5"] = [
  { verse:"5:1-19",  place:"Naaman — Nachal Yarden", heb:"הירדן", lat:31.900, lng:35.550, color:"#4a7a2a", persons:["Naaman","Elisha","Captive Girl"], themes:["Miracle","Healing","Faith"], source:"Rashi: Naaman was commander of Aram's army — a great man, mighty in valor, but a leper. An Israelite captive girl told his wife: if only my master were with the prophet in Shomron.", desc:"Naaman commander of Aram's army has leprosy. An Israelite captive girl directs him to Elisha. Elisha sends a messenger: go dip in the Yarden seven times. Naaman is angry at the instruction's simplicity but his servants persuade him. He dips seven times and his skin becomes like a young child's." }
];
CHAPTERS["melachim2_6"] = [
  { verse:"6:8-23",  place:"Dotan — Elisha and the Arameans", heb:"דותן", lat:32.415, lng:35.206, color:"#4a7a2a", persons:["Elisha","Gehazi","Aram"], themes:["Miracle","Vision","Prayer"], source:"Rashi: The servant of Elisha saw the mountain full of horses and chariots of fire around Elisha. Elisha had prayed: open his eyes that he may see. Those who are with us are more than those with them.", desc:"Aram sends a great army to capture Elisha at Dotan. The city is surrounded by night. Elisha's servant panics. Elisha prays — the servant sees the mountain full of horses and chariots of fire. The Aramean army is struck with blindness and led to Shomron." },
  { verse:"6:24-33", place:"Shomron — Siege and Famine", heb:"שומרון", lat:32.278, lng:35.202, color:"#8b1a1a", persons:["Ben-Hadad","Yehoram","Elisha"], themes:["Famine","Siege","Despair"], source:"Radak: The famine was so severe that a donkey's head was sold for 80 silver pieces and a quarter kav of dove's dung for 5 pieces. A woman cannibalized her own son — the king tore his clothes in horror.", desc:"Ben-Hadad of Aram besieges Shomron. Terrible famine — a donkey's head costs 80 shekels. A woman cries to the king that she and another agreed to eat their children — she ate hers and the other hid hers. The king tears his clothes and blames Elisha." }
];
CHAPTERS["melachim2_7"] = [
  { verse:"7:1-20",  place:"Shomron — Aramean Rout", heb:"שומרון", lat:32.278, lng:35.202, color:"#4a7a2a", persons:["Elisha","Four Lepers","Arameans"], themes:["Miracle","Salvation","Prophecy"], source:"Rashi: Hashem caused the Aramean army to hear the sound of a great army — chariots and horses. They said: the king of Israel has hired the Hittite and Egyptian kings against us. They fled and left everything.", desc:"Four lepers at the gate of Shomron decide they have nothing to lose and go to the Aramean camp. They find it abandoned — Hashem had caused the army to hear sounds of a great army and they fled in panic, leaving horses, food, silver, and gold. The famine ends." }
];
CHAPTERS["melachim2_8"] = [
  { verse:"8:7-15",  place:"Damascus — Chazael", heb:"דמשק", lat:33.510, lng:36.291, color:"#7a3a3a", persons:["Elisha","Chazael","Ben-Hadad"], themes:["Prophecy","Aram","Death"], source:"Rashi: Elisha wept because he foresaw what Chazael would do to Israel — burn their fortresses, kill young men with the sword, dash their infants, and rip open pregnant women.", desc:"Elisha goes to Damascus. Ben-Hadad is ill and sends Chazael to inquire. Elisha weeps: I know the evil you will do to Israel. He recovers but will die. Chazael goes back, smothers Ben-Hadad with a cloth, and becomes king of Aram." }
];
CHAPTERS["melachim2_9"] = [
  { verse:"9:1-13",  place:"Ramot Gilad — Yeihu Anointed", heb:"רמות גלעד", lat:32.300, lng:35.750, color:"#7a3a3a", persons:["Yeihu","Elisha's Servant"], themes:["Anointing","Kingship","Prophecy"], source:"Radak: The young prophet poured oil on Yeihu's head in an inner chamber: thus says Hashem — I have anointed you king over Israel. Then he opened the door and fled. The other officers immediately proclaimed Yeihu king.", desc:"Elisha's servant anoints Yeihu son of Nimshi as king over Israel at Ramot Gilad — with orders to wipe out the house of Achav and avenge the blood of Nabot and the prophets. Yeihu's fellow officers immediately accept him as king." },
  { verse:"9:21-37", place:"Yizreel — Izevel's Death", heb:"יזרעאל", lat:32.591, lng:35.316, color:"#8b1a1a", persons:["Yeihu","Izevel","Yehoram"], themes:["Death","Judgment","Izevel"], source:"Rashi: Izevel painted her eyes and adorned her head — she dressed to meet her fate with dignity, or perhaps to seduce Yeihu. He ordered her thrown down. Her blood splattered on the wall. Later they came to bury her but found only her skull, feet, and palms — as Eliyahu had prophesied.", desc:"Yeihu races to Yizreel in his chariot. He kills Yehoram with an arrow in Nabot's plot. Izevel taunts him from a window. He orders her thrown down — she is trampled by horses. When they go to bury her, only her skull, feet, and palms remain. The dogs ate her as Eliyahu prophesied." }
];
CHAPTERS["melachim2_10"] = [
  { verse:"10:1-11", place:"Shomron — Yeihu's Purge", heb:"שומרון", lat:32.278, lng:35.202, color:"#7a3a3a", persons:["Yeihu","Achav's Sons"], themes:["Judgment","Purge","Dynasty"], source:"Radak: Yeihu sent letters to Shomron: if you are on my side, bring me the heads of your master's sons by tomorrow. Seventy heads arrived in baskets. Yeihu said: Hashem has done what He spoke through Eliyahu.", desc:"Yeihu demands the heads of Achav's seventy sons from Shomron. They are brought in baskets. Yeihu displays them in two piles at the city gate and addresses the people: Hashem's word is fulfilled. He kills all the remaining officials of Achav's house in Yizreel." },
  { verse:"10:18-28",place:"Shomron — Baal Temple Destroyed", heb:"שומרון", lat:32.278, lng:35.203, color:"#4a7a2a", persons:["Yeihu","Baal Worshippers"], themes:["Idolatry","Judgment","Reform"], source:"Rashi: Yeihu tricked all the Baal worshippers into gathering in the Baal temple — proclaiming a great sacrifice to Baal. He stationed 80 men outside with orders to kill anyone who escaped. Then he burned the Baal temple and turned it into a latrine.", desc:"Yeihu tricks all Baal worshippers into the Baal temple for a great sacrifice. He has them all killed, destroys the Baal pillar, and turns the temple into a latrine. He wiped out Baal from Israel — though he continued the golden calves of Yarovam." }
];
CHAPTERS["melachim2_11"] = [
  { verse:"11:1-20", place:"Yerushalayim — Atalya and Yoash", heb:"ירושלים", lat:31.771, lng:35.231, color:"#6a4a3a", persons:["Atalya","Yoash","Yehoyada"], themes:["Kingship","Temple","Rescue"], source:"Radak: Atalya seized the throne and killed all the royal seed — but Yehosheva hid the infant Yoash in the Temple for six years. When he was seven, the Kohen Gadol Yehoyada staged a coup and crowned him in the Temple.", desc:"Atalya daughter of Achav seizes power in Yehuda and kills all the royal seed. The Kohen's wife hides the infant Yoash in the Temple for six years. In the seventh year Yehoyada the Kohen Gadol makes a covenant, arms the Levites, and crowns Yoash. Atalya is killed at the horse gate." }
];
CHAPTERS["melachim2_12"] = [
  { verse:"12:1-17", place:"Yerushalayim — Temple Repairs", heb:"ירושלים", lat:31.778, lng:35.235, color:"#6a4a3a", persons:["Yoash","Yehoyada"], themes:["Temple","Repair","Reform"], source:"Rashi: Yoash commanded the priests to take the money donated to the Temple and use it for repairs. But it was not done until the 23rd year of his reign. Then Yehoyada the Kohen placed a chest by the altar — the first charity box.", desc:"Yoash commands Temple repairs and institutes a chest for donations at the altar — the first recorded charity collection box. The Temple is repaired. But Yoash later kills Zecharya son of Yehoyada in the Temple courtyard." }
];
CHAPTERS["melachim2_13"] = [
  { verse:"13:14-21", place:"Shomron — Elisha's Death", heb:"שומרון", lat:32.278, lng:35.202, color:"#6a4a3a", persons:["Elisha","Yehoash"], themes:["Death","Miracle","Prophecy"], source:"Rashi: After Elisha died and was buried, Moabite raiders came. The men carrying a dead body saw the raiders and threw the body into Elisha's grave — the body touched Elisha's bones and the man revived and stood on his feet.", desc:"Elisha is dying. King Yehoash weeps: my father, my father — the chariot of Israel and its horsemen. Elisha has the king shoot arrows and strike the ground — he strikes three times and stops. Elisha is angry: you should have struck five or six times. After Elisha's death, a dead man touches his bones and revives." }
];
CHAPTERS["melachim2_14"] = [
  { verse:"14:7",    place:"Gei HaMelach — Edom", heb:"גיא המלח", lat:30.800, lng:35.200, color:"#6a4a3a", persons:["Amatzyahu"], themes:["War","Victory","Edom"], source:"Radak: Amatzyahu struck 10,000 Edomites in the Valley of Salt and captured Sela (Petra) and called it Yokteel. He then challenged Israel's king Yehoash — foolishly, as the parable of the cedar and thornbush shows.", desc:"Amatzyahu king of Yehuda strikes 10,000 Edomites in the Valley of Salt and captures Sela (Petra). Emboldened, he challenges Yehoash king of Israel — who responds with the parable of the cedar and the thornbush. Amatzyahu presses the battle and is defeated at Beit Shemesh." }
];
CHAPTERS["melachim2_15"] = [
  { verse:"15:19-20",place:"Shomron — Tiglat-Pileser", heb:"שומרון", lat:32.278, lng:35.202, color:"#5a3a4a", persons:["Menachem","Tiglat-Pileser"], themes:["Assyria","Tribute","Decline"], source:"Radak: Pul (Tiglat-Pileser) came against the land. Menachem paid 1,000 talents of silver — levied from all the wealthy men of Israel at 50 shekels each. This was the first Assyrian tribute from Israel.", desc:"Tiglat-Pileser king of Assyria invades. Menachem king of Israel pays 1,000 talents of silver in tribute, levied from wealthy Israelites. The Assyrian withdraws. The shadow of Assyria falls on the northern kingdom." }
];
CHAPTERS["melachim2_16"] = [
  { verse:"16:5-9",  place:"Yerushalayim — Achaz and Assyria", heb:"ירושלים", lat:31.771, lng:35.231, color:"#5a3a4a", persons:["Achaz","Tiglat-Pileser","Retzin","Pekach"], themes:["Assyria","Alliance","Compromise"], source:"Radak: Achaz sent messengers to Tiglat-Pileser: I am your servant and your son. Come save me from the kings of Aram and Israel. He stripped the Temple and palace treasury to pay tribute — a fateful alliance that made Yehuda an Assyrian vassal.", desc:"Retzin of Aram and Pekach of Israel besiege Yerushalayim. Achaz strips the Temple treasury and sends it to Tiglat-Pileser of Assyria for help. Assyria responds, kills Retzin, and takes Damascus. Achaz introduces an Assyrian-style altar in the Temple." }
];
CHAPTERS["melachim2_17"] = [
  { verse:"17:1-24", place:"Shomron — Fall of the North", heb:"שומרון", lat:32.278, lng:35.202, color:"#4a2a3a", persons:["Hoshea","Shalmaneser","Sargon"], themes:["Exile","Assyria","End"], source:"Rashi: Because they sinned against Hashem who brought them out of Egypt — they feared other gods and walked in the statutes of the nations. Hashem removed Israel from His sight, as He had spoken through all His servants the prophets.", desc:"Hoshea king of Israel pays tribute to Shalmaneser of Assyria but then conspires with Egypt. Shalmaneser besieges Shomron for three years. In 722 BCE Sargon II captures it — the northern kingdom of Israel ends. The ten tribes are exiled to Assyria. Foreign peoples are settled in their place." }
];
CHAPTERS["melachim2_18"] = [
  { verse:"18:1-8",  place:"Yerushalayim — Chizkiyahu's Reform", heb:"ירושלים", lat:31.771, lng:35.231, color:"#5a6a3a", persons:["Chizkiyahu"], themes:["Reform","Faithfulness","Temple"], source:"Rashi: Chizkiyahu removed the high places, smashed the pillars, and cut down the Ashera. He broke into pieces the copper serpent that Moshe had made — for the Israelites had been burning incense to it, calling it Nechushtan.", desc:"Chizkiyahu becomes king and immediately reforms — removes high places, destroys the Asherah, breaks Moshe's copper serpent Nechushtan which had become an idol. He clings to Hashem and keeps His commandments. He rebels against Assyria." },
  { verse:"18:13-37",place:"Lachish — Sennacherib's Invasion", heb:"לכיש", lat:31.560, lng:34.848, color:"#4a2a3a", persons:["Sennacherib","Chizkiyahu","Ravshakeh"], themes:["Assyria","Siege","Crisis"], source:"Radak: Sennacherib sent Ravshakeh from Lachish to Yerushalayim with a great army. Ravshakeh stood at the Upper Pool conduit and called out in Hebrew to the people on the wall — psychological warfare intended to break morale.", desc:"Sennacherib king of Assyria captures Lachish and all the Judean cities. He demands tribute. Then he sends Ravshakeh to Yerushalayim with a great speech designed to break the city's morale: do not let Chizkiyahu deceive you — can any god of the nations deliver you from Assyria?" }
];
CHAPTERS["melachim2_19"] = [
  { verse:"19:1-37", place:"Yerushalayim — Assyrian Rout", heb:"ירושלים", lat:31.771, lng:35.231, color:"#5a6a3a", persons:["Chizkiyahu","Yeshayahu","Sennacherib"], themes:["Miracle","Prayer","Salvation"], source:"Rashi: Chizkiyahu spread the letter before Hashem in the Temple. Yeshayahu's prophecy: the virgin daughter of Tzion has despised you. That night the angel of Hashem struck 185,000 in the Assyrian camp — they were all dead in the morning.", desc:"Chizkiyahu goes to the Temple and spreads Sennacherib's threatening letter before Hashem. Yeshayahu prophesies: the Assyrian will not enter this city. That night the angel of Hashem strikes 185,000 Assyrian soldiers dead. Sennacherib returns to Nineveh and is killed by his sons." }
];
CHAPTERS["melachim2_20"] = [
  { verse:"20:1-11", place:"Yerushalayim — Chizkiyahu's Illness", heb:"ירושלים", lat:31.771, lng:35.231, color:"#5a6a3a", persons:["Chizkiyahu","Yeshayahu"], themes:["Miracle","Prayer","Healing"], source:"Rashi: Yeshayahu told Chizkiyahu: set your house in order — you will die. Chizkiyahu turned his face to the wall and wept greatly. Before Yeshayahu had left the courtyard, the word of Hashem came back: I have heard your prayer, I will add 15 years.", desc:"Chizkiyahu falls deathly ill. Yeshayahu tells him: you will die. Chizkiyahu prays, weeping. Hashem sends Yeshayahu back: I will add 15 years to your life. The sign: the shadow on the sundial of Achaz goes backward ten steps." },
  { verse:"20:20",   place:"Yerushalayim — Chizkiyahu's Tunnel", heb:"נקבת השילוח", lat:31.773, lng:35.233, color:"#4a6a3a", persons:["Chizkiyahu"], themes:["Building","Water","Engineering"], source:"Radak: Chizkiyahu brought water into the city by cutting through 533 meters of solid rock — the tunnel connects the Gichon Spring to the Pool of Shiloach. The Siloam inscription discovered in 1880 describes the tunnel's completion.", desc:"Chizkiyahu digs the famous water tunnel — cutting 533 meters through rock to bring the Gichon Spring's water inside the city walls. The tunnel inscription describes the moment the two teams of diggers heard each other's voices and broke through. Still walkable today." }
];
CHAPTERS["melachim2_21"] = [
  { verse:"21:1-18", place:"Yerushalayim — Menashe's Sins", heb:"ירושלים", lat:31.771, lng:35.231, color:"#4a2a3a", persons:["Menashe"], themes:["Idolatry","Sin","Judgment"], source:"Rashi: Menashe rebuilt the high places his father Chizkiyahu had destroyed. He erected altars to Baal and made an Asherah. He placed an image in the Temple itself. He shed very much innocent blood until he filled Yerushalayim from one end to the other.", desc:"Menashe son of Chizkiyahu reigns 55 years — the longest and most sinful reign. He rebuilds all the high places, makes an Asherah, places an idol in the Temple. He sacrifices his son in fire, practices sorcery. Hashem decrees: I will wipe Yerushalayim as one wipes a dish." }
];
CHAPTERS["melachim2_22"] = [
  { verse:"22:1-20", place:"Yerushalayim — Sefer HaTorah Found", heb:"ירושלים", lat:31.778, lng:35.235, color:"#5a6a3a", persons:["Yoshiyahu","Chilkiyahu","Chulda"], themes:["Torah","Reform","Prophecy"], source:"Rashi: The Book of the Torah was found in the Temple by Chilkiyahu the Kohen Gadol. Some say it was the original Torah written by Moshe. When Yoshiyahu heard the curses written in it, he tore his garments.", desc:"During Temple repairs, the Kohen Gadol Chilkiyahu finds the Sefer HaTorah. It is read before King Yoshiyahu who tears his garments in grief at how far Israel has strayed. The prophetess Chulda prophesies: doom is coming, but not in Yoshiyahu's lifetime because of his humility." }
];
CHAPTERS["melachim2_23"] = [
  { verse:"23:1-25", place:"Yerushalayim — Yoshiyahu's Reform", heb:"ירושלים", lat:31.771, lng:35.231, color:"#5a6a3a", persons:["Yoshiyahu"], themes:["Reform","Covenant","Pesach"], source:"Radak: Yoshiyahu's reform was the most thoroughgoing in Judean history — he destroyed high places from Beer Sheva to Beit El, desecrated Molech in Gei Ben Hinnom, burned the bones of false priests on their altars.", desc:"Yoshiyahu gathers all Israel and reads the Torah publicly. He purges the Temple, destroys all the high places throughout the land, desecrates the Molech site in Gei Ben Hinnom, and fulfills the 300-year-old prophecy at Beit El. He keeps a Pesach of unprecedented magnitude." },
  { verse:"23:29-30",place:"Megiddo — Yoshiyahu's Death", heb:"מגידו", lat:32.583, lng:35.183, color:"#4a2a3a", persons:["Yoshiyahu","Pharaoh Necho"], themes:["Death","Battle","Tragedy"], source:"Rashi: Yoshiyahu went out to fight Pharaoh Necho against Hashem's word — the Sages say he did not deserve to die this way but his generation's sins caused it. He was shot by archers and died. All Yehuda and Yerushalayim mourned for him.", desc:"Pharaoh Necho marches north. Yoshiyahu goes out to meet him at Megiddo. He is shot by archers and mortally wounded. He is brought back to Yerushalayim in a chariot and dies. All Yehuda and Yerushalayim mourn — Yirmiyahu composes a lamentation. The last righteous king of Yehuda is gone." }
];
CHAPTERS["melachim2_24"] = [
  { verse:"24:1-16", place:"Yerushalayim — First Exile", heb:"ירושלים", lat:31.771, lng:35.231, color:"#3a1a2a", persons:["Nevuchadnetzar","Yehoyachin","Elites"], themes:["Exile","Babylon","Judgment"], source:"Rashi: Nevuchadnetzar came and Yehoyachin surrendered. He took 10,000 captives — all the officers, warriors, craftsmen, and smiths. None remained except the poorest people. Daniel and his companions were among this exile.", desc:"Nevuchadnetzar king of Babylon besieges Yerushalayim. King Yehoyachin surrenders. Nevuchadnetzar takes 10,000 captives to Babylon — the king, his family, all the officers, warriors, craftsmen, and smiths. He strips the Temple treasures. Tzidkiyahu is installed as puppet king." }
];
CHAPTERS["melachim2_25"] = [
  { verse:"25:1-21", place:"Yerushalayim — Destruction", heb:"ירושלים", lat:31.771, lng:35.231, color:"#1a0a0a", persons:["Nevuchadnetzar","Tzidkiyahu","Nevuzaradan"], themes:["Destruction","Exile","End"], source:"Rashi: On the 9th of Av the Temple was set on fire. The copper pillars, the sea, and the stands were broken up and carried to Babylon. The Kohen Gadol, the second priest, and the Temple officers were executed at Rivla.", desc:"Nevuchadnetzar besieges Yerushalayim for 18 months. Tzidkiyahu flees but is captured at Yericho, blinded, and taken to Babylon. On 9 Av the Temple is burned. The walls of Yerushalayim are torn down. The surviving people are exiled to Babylon. The Kingdom of Yehuda ends." },
  { verse:"25:22-26",place:"Mitzpa — Gedalyahu", heb:"מצפה", lat:31.855, lng:35.218, color:"#2a1a1a", persons:["Gedalyahu","Yishmael","Remnant"], themes:["Remnant","Assassination","Exile"], source:"Radak: Gedalyahu was appointed governor over the few who remained. He was warned that Yishmael ben Netanya intended to kill him but he did not believe it. He was killed at Mitzpa — and the last remnant fled to Egypt.", desc:"Gedalyahu son of Achikam is appointed governor over the remaining poor people in the land. He is warned of an assassination plot but disbelieves it. Yishmael ben Netanya kills him at Mitzpa. The last remnant of Yehuda — fearing Babylonian reprisals — flees to Egypt." }
];

// ── SHOFTIM ───────────────────────────────────────────────────
CHAPTERS["shoftim_1"] = [
  { verse:"1:1-8",   place:"Bezek — Adoni-Bezek",         heb:"בזק",              lat:32.186, lng:35.463, color:"#6a8a3a", persons:["Yehuda","Shimon","Adoni-Bezek"], themes:["Conquest","War","Justice"],   source:"Rashi: They found Adoni-Bezek at Bezek and fought him. As I have done to seventy kings who ate scraps under my table — so God has repaid me. They brought him to Yerushalayim and he died there.", desc:"After Yehoshua's death, the tribe of Yehuda leads the renewed effort to conquer its territory. At Bezek they defeat Adoni-Bezek who had cut off the thumbs of 70 kings. They cut off his thumbs and he acknowledges divine justice." },
  { verse:"1:21",    place:"Yerushalayim — Yevusites Remain", heb:"ירושלים",       lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Binyamin","Yevusites"],          themes:["Conquest","Failure","Remnant"], source:"Radak: The children of Binyamin did not drive out the Yevusites who lived in Yerushalayim — and the Yevusites live with Binyamin to this day. This failure explains why Dovid had to conquer Yerushalayim generations later.", desc:"The tribe of Binyamin fails to drive out the Yevusites from Yerushalayim. They dwell together — the city remains Yebusite until Dovid's conquest 400 years later." }
];
CHAPTERS["shoftim_2"] = [
  { verse:"2:1-5",   place:"Bokhim — Angel's Rebuke",      heb:"בוכים",            lat:31.900, lng:35.220, color:"#8b3a3a", persons:["Angel of Hashem","Bnei Yisrael"], themes:["Covenant","Rebuke","Idolatry"], source:"Rashi: The angel went up from Gilgal to Bokhim — the angel who had led them in the wilderness. He rebuked them for making covenants with the nations. The people wept loudly — so the place was called Bokhim (weepers).", desc:"The angel of Hashem comes to Bokhim and rebukes Israel: you have not obeyed my voice — therefore I will not drive them out before you. The people weep loudly. They sacrifice to Hashem." }
];
CHAPTERS["shoftim_3"] = [
  { verse:"3:12-30", place:"Yericho — Ehud and Eglon",      heb:"יריחו",            lat:31.871, lng:35.444, color:"#4a7a2a", persons:["Ehud","Eglon"],                  themes:["Deliverance","Assassination","Moav"], source:"Radak: Ehud made himself a double-edged sword a cubit long and strapped it to his right thigh — the unexpected side, since guards searched the left. He said: I have a secret word for you from God. And he thrust the sword into Eglon's belly.", desc:"Eglon king of Moav oppresses Israel 18 years from his palace at the City of Palms (Yericho). Ehud son of Gera, a left-handed Benjaminite, assassinates Eglon with a concealed sword. He escapes while the servants wait outside, then rallies Israel to defeat Moav at the Yarden fords." }
];
CHAPTERS["shoftim_4"] = [
  { verse:"4:1-16",  place:"Har Tavor — Devorah and Barak",  heb:"הר תבור",         lat:32.686, lng:35.393, color:"#4a7a2a", persons:["Devorah","Barak","Sisra","Yavin"], themes:["War","Prophecy","Victory","Women"], source:"Rashi: Devorah summoned Barak from Kedesh Naftali and told him: Hashem has commanded — go to Har Tavor with 10,000 men. Barak said: if you go with me I will go — but if you do not go I will not go. She replied: the glory will not be yours — Hashem will give Sisra into the hand of a woman.", desc:"Devorah the prophetess judges Israel under her palm tree between Rama and Beit El. She summons Barak and commands him to assemble at Har Tavor. Sisra's 900 iron chariots are routed in the Valley of Yizreel — Hashem throws them into confusion." }
];
CHAPTERS["shoftim_5"] = [
  { verse:"5:19-21", place:"Megiddo — Song of Devorah",      heb:"מגידו",            lat:32.583, lng:35.183, color:"#c8962a", persons:["Devorah","Barak","Sisra"],       themes:["Victory","Poetry","Miracle"],  source:"Rashi: The stars from their courses fought against Sisra — a miraculous hailstorm fell on the Canaanite army. The Kishon torrent swept them away. The Song of Devorah is one of the oldest poems in Tanach.", desc:"The Song of Devorah celebrates the victory: kings came and fought at Taanach by the waters of Megiddo. The stars from their courses fought Sisra. The Kishon torrent swept them away." }
];
CHAPTERS["shoftim_6"] = [
  { verse:"6:11-24", place:"Ofra — Gideon Called",           heb:"עפרה",             lat:32.411, lng:35.320, color:"#c8962a", persons:["Gideon","Angel of Hashem"],      themes:["Calling","Prophecy","Midyan"],  source:"Rashi: The angel found Gideon threshing wheat in the winepress — hiding it from Midyan. He said: Hashem is with you, mighty warrior. Gideon replied: if Hashem is with us, why has all this happened to us?", desc:"Midyan oppresses Israel 7 years. The angel of Hashem appears to Gideon threshing wheat in a winepress at Ofra. He is commissioned to save Israel. He prepares an offering — fire springs from the rock and consumes it. He builds a mizbe'ach: Hashem Shalom." },
  { verse:"6:25-32", place:"Ofra — Baal Altar Destroyed",    heb:"עפרה",             lat:32.411, lng:35.321, color:"#4a7a2a", persons:["Gideon","Yoash"],                themes:["Reform","Idolatry","Courage"],  source:"Radak: Gideon cut down the Asherah and built an altar to Hashem. The townspeople demanded his death — but his father Yoash said: if Baal is a god, let him contend for himself. They called Gideon Yerubaal: let Baal contend with him.", desc:"That night Gideon tears down his father's Baal altar and cuts down the Asherah. He builds an altar to Hashem and sacrifices on it. The townspeople want to kill him — his father defends him. He is renamed Yerubaal." }
];
CHAPTERS["shoftim_7"] = [
  { verse:"7:1-25",  place:"Ein Charod — Gideon's 300",      heb:"עין חרוד",         lat:32.553, lng:35.353, color:"#c8962a", persons:["Gideon","300 Men","Midyan"],     themes:["War","Miracle","Faith"],        source:"Rashi: Hashem told Gideon: the people are too many — lest Israel boast saying my own hand saved me. He reduced 32,000 to 300 by the water test. At midnight the 300 surrounded the camp with torches and shofars — the Midyanite camp panicked and destroyed itself.", desc:"Hashem reduces Gideon's army from 32,000 to 300 at the spring of Charod. At midnight the 300 surround the Midyanite camp with torches hidden in pitchers and shofars. They shout: the sword of Hashem and of Gideon! The camp panics, fights itself, and flees." }
];
CHAPTERS["shoftim_8"] = [
  { verse:"8:4-17",  place:"Sukkot and Penuel — Gideon's Pursuit", heb:"סוכות · פנואל", lat:32.200, lng:35.560, color:"#8b3a3a", persons:["Gideon","Sukkot Elders","Penuel"], themes:["War","Pursuit","Vengeance"],  source:"Rashi: The men of Sukkot refused to give Gideon's exhausted soldiers bread. He said: when Hashem gives Zebah and Tzalmuna into my hand I will thresh your flesh with thorns of the wilderness. He fulfilled the threat on his return.", desc:"Gideon pursues Midyan east of the Yarden. He asks Sukkot and Penuel for bread — both refuse. He captures the two Midyanite kings, returns, and punishes Sukkot and Penuel as promised." }
];
CHAPTERS["shoftim_9"] = [
  { verse:"9:1-57",  place:"Shchem — Avimelech",             heb:"שכם",              lat:32.220, lng:35.260, color:"#8b1a1a", persons:["Avimelech","Yotam","Baal-Berit"], themes:["Kingship","Murder","Judgment"], source:"Radak: Avimelech killed 70 of his brothers on one stone at Ofra — only the youngest, Yotam, escaped. Yotam climbed Har Gerizim and spoke his parable of the trees choosing a king — the thornbush alone agreed to rule.", desc:"Avimelech son of Gideon murders his 70 brothers at Shchem and makes himself king. Yotam delivers his parable of the trees from Har Gerizim. After 3 years Avimelech is killed at Tevetz when a woman drops a millstone on his head." },
  { verse:"9:50-54", place:"Tevetz — Millstone",             heb:"תבץ",              lat:32.294, lng:35.299, color:"#8b1a1a", persons:["Avimelech","Unnamed Woman"],     themes:["Death","Justice","Women"],     source:"Rashi: A woman threw an upper millstone on Avimelech's head and cracked his skull. He quickly commanded his armor-bearer to thrust him through — lest men say a woman killed him. But they said it anyway.", desc:"Avimelech besieges Tevetz. A woman drops a millstone from the tower and cracks his skull. He has his armor-bearer finish him off to avoid the shame of being killed by a woman." }
];
CHAPTERS["shoftim_10"] = [
  { verse:"10:6-18", place:"Mitzpa of Gilad — Assembly",     heb:"מצפה גלעד",       lat:32.100, lng:35.750, color:"#8b3a3a", persons:["Bnei Yisrael","Hashem"],         themes:["Repentance","Ammon","Gilad"],   source:"Radak: The children of Israel cried to Hashem: we have sinned — do to us whatever seems good in your sight; only please deliver us this day. Hashem: go and cry to the gods you have chosen — let them save you. They put away the foreign gods and Hashem was grieved by Israel's misery.", desc:"Ammon oppresses Israel 18 years. Israel repents and removes the foreign gods. Hashem's soul is grieved. The tribes assemble at Mitzpa of Gilad. Who will lead against Ammon? Whoever begins the battle against Ammon shall be head over all of Gilad." }
];
CHAPTERS["shoftim_11"] = [
  { verse:"11:1-11", place:"Mitzpa — Yiftach Commissioned",  heb:"מצפה",             lat:31.855, lng:35.218, color:"#c8962a", persons:["Yiftach","Gilad Elders"],        themes:["Leadership","Rejection","Vow"],  source:"Rashi: Yiftach was the son of a harlot — his brothers drove him away. But when Ammon threatened, the elders of Gilad went to get him from the land of Tov. He made them swear: if you bring me back to fight Ammon and Hashem gives them to me, I will be your head.", desc:"Yiftach the Gileadite, expelled by his brothers as illegitimate, is recalled by the elders of Gilad to fight Ammon. He negotiates his status — if he wins he will be their head. He speaks before Hashem at Mitzpa." },
  { verse:"11:30-40",place:"Mitzpa — Yiftach's Daughter",    heb:"מצפה",             lat:31.855, lng:35.219, color:"#8b1a1a", persons:["Yiftach","Yiftach's Daughter"], themes:["Vow","Tragedy","Women"],        source:"Radak: Yiftach vowed: whatever comes out of the doors of my house to meet me — it shall be Hashem's, or I will offer it as a burnt offering. His only child, a daughter, came out with timbrels. She asked only for two months to go with her companions and weep over her virginity.", desc:"Before battle Yiftach vows to sacrifice whatever first greets him at home. His only daughter emerges. She accepts her fate, asks for two months in the mountains to weep with companions. After which Yiftach fulfilled his vow." }
];
CHAPTERS["shoftim_12"] = [
  { verse:"12:1-7",  place:"Maavarot HaYarden — Shibboleth", heb:"מעברות הירדן",    lat:32.100, lng:35.540, color:"#8b3a3a", persons:["Yiftach","Efraim"],              themes:["Tribal War","Language","Death"], source:"Rashi: Those of Efraim who tried to cross said Sibboleth not Shibboleth — they could not pronounce the shin. And they slew them. 42,000 of Efraim fell at that time at the fords of the Yarden.", desc:"Efraim complains it was excluded from Yiftach's campaign and threatens war. Yiftach defeats them. At the Yarden fords he identifies Ephraimites by their inability to say Shibboleth — they say Sibboleth. 42,000 are killed." }
];
CHAPTERS["shoftim_13"] = [
  { verse:"13:1-25", place:"Tzora — Shimshon's Birth",       heb:"צרעה",             lat:31.777, lng:34.924, color:"#c8962a", persons:["Shimshon","Manoach","Angel"],    themes:["Miracle","Nazirite","Birth"],   source:"Rashi: The angel appeared to the woman first — because women are more attentive to raising children. He told her: you are barren, but you will conceive a son. Let no razor touch his head — he shall be a Nazirite from the womb.", desc:"A Danite woman in Tzora is barren. The angel of Hashem appears and announces she will conceive a son who will save Israel from the Philistines. He must be a Nazirite from the womb. Shimshon is born." }
];
CHAPTERS["shoftim_14"] = [
  { verse:"14:5-19", place:"Timna — Shimshon's Lion",        heb:"תמנה",             lat:31.733, lng:34.967, color:"#4a7a2a", persons:["Shimshon","Philistines"],        themes:["Strength","Riddle","Philistines"], source:"Rashi: A young lion came roaring at him and the spirit of Hashem came mightily upon him — he tore the lion as one tears a kid. He told neither his father nor his mother. Later he found a beehive and honey in the lion's carcass — hence his riddle.", desc:"On the way to Timna to meet his Philistine bride, Shimshon tears a lion with his bare hands. At the wedding feast he poses a riddle: out of the eater came something to eat. The 30 companions get the answer from his wife and he kills 30 Ashkelonites to pay the debt." }
];
CHAPTERS["shoftim_15"] = [
  { verse:"15:9-17", place:"Lechi — Jawbone",                heb:"לחי",              lat:31.700, lng:34.900, color:"#4a7a2a", persons:["Shimshon","Philistines"],        themes:["Strength","Miracle","Battle"],  source:"Rashi: Shimshon found a fresh jawbone of a donkey and with it killed 1,000 men. Then he was very thirsty — he called to Hashem and water came from the hollow of the jawbone. He called the place Ein HaKore.", desc:"Philistines bind Shimshon at Lechi. The spirit of Hashem comes on him — he breaks the ropes and with a fresh donkey's jawbone kills 1,000 men. He names the place Ramat Lechi. Dying of thirst, he prays — water bursts from the jawbone." }
];
CHAPTERS["shoftim_16"] = [
  { verse:"16:1-3",  place:"Aza — Gates Carried",            heb:"עזה",              lat:31.507, lng:34.467, color:"#4a7a2a", persons:["Shimshon"],                      themes:["Strength","Gaza","Philistines"],source:"Rashi: Shimshon lay until midnight, then rose and took the doors of the city gate and the two posts, pulled them up bar and all, and carried them on his shoulders to the top of the hill that faces Chevron.", desc:"Shimshon visits a harlot in Aza. Philistines wait all night at the city gate to kill him at dawn. At midnight he rises, takes the city gates and posts, and carries them on his shoulders to the top of the hill facing Chevron." },
  { verse:"16:4-31", place:"Nachal Sorek — Delila",          heb:"נחל שורק",         lat:31.760, lng:35.000, color:"#8b1a1a", persons:["Shimshon","Delila","Philistines"],themes:["Betrayal","Downfall","Death"],  source:"Malbim: The lords of the Philistines each offered Delila 1,100 pieces of silver — a fortune. Three times Shimshon misled her. The fourth time he told her the truth: if my head is shaved my strength will leave me. She shaved it while he slept.", desc:"Shimshon loves Delila in Nachal Sorek. The Philistine lords bribe her to find his secret. Three times he deceives her; the fourth time he reveals his Nazirite hair. She shaves his head, his strength leaves, he is blinded and brought to Aza. In the temple of Dagon he pulls down the pillars — killing 3,000 and himself." }
];
CHAPTERS["shoftim_17"] = [
  { verse:"17:1-13", place:"Har Efraim — Micha's Idol",      heb:"הר אפרים",         lat:32.200, lng:35.200, color:"#8b3a3a", persons:["Micha","Levite Priest"],         themes:["Idolatry","Priest","Decline"],  source:"Radak: Micha made an ephod and terafim and installed one of his sons as priest — then a wandering Levite came and he hired him as a father and priest. This is the low point of religious life in the period of the Judges.", desc:"A man of Har Efraim named Micha makes a silver idol, an ephod and terafim. He hires a wandering Levite as his personal priest, thinking this guarantees Hashem's blessing. The author notes: in those days there was no king in Israel — every man did what was right in his own eyes." }
];
CHAPTERS["shoftim_18"] = [
  { verse:"18:1-31", place:"Dan — Tribe of Dan Migrates",    heb:"דן",               lat:33.248, lng:35.651, color:"#8b3a3a", persons:["Tribe of Dan","Micha's Levite"], themes:["Migration","Idolatry","Dan"],    source:"Rashi: The tribe of Dan could not conquer its allotted territory in the south. Six hundred armed men marched north, stole Micha's idol and priest, and conquered Layish — renaming it Dan. This was the northern limit of the land.", desc:"The tribe of Dan, unable to hold its southern territory, sends spies north. They find Layish — a peaceful, isolated city. 600 Danites steal Micha's idol and Levite priest and conquer Layish, renaming it Dan. The idol is set up there." }
];
CHAPTERS["shoftim_19"] = [
  { verse:"19:1-30", place:"Giva of Binyamin — Pilegesh",    heb:"גבעת בנימין",     lat:31.852, lng:35.228, color:"#8b1a1a", persons:["Levite","Pilegesh","Giva Men"],  themes:["Sin","Violence","Outrage"],     source:"Radak: The men of Giva surrounded the house all night demanding the Levite. They violated his concubine all night until morning — and she fell at the door of the house. It was the gravest sin in the book of Shoftim — and the most catastrophic.", desc:"A Levite and his concubine stop for the night in Giva of Binyamin. The men of the city demand the Levite. His concubine is pushed out and brutally violated all night. In the morning she is found dead at the doorway. The Levite sends her body in 12 pieces to all of Israel — calling for justice." }
];
CHAPTERS["shoftim_20"] = [
  { verse:"20:1-48", place:"Mitzpa — War against Binyamin",  heb:"מצפה",             lat:31.855, lng:35.218, color:"#8b1a1a", persons:["All Israel","Binyamin"],         themes:["Civil War","Justice","Battle"], source:"Rashi: 400,000 swordsmen assembled at Mitzpa. They asked Binyamin to hand over the guilty men — Binyamin refused. Three battles: Binyamin won the first two, then on the third day Israel destroyed Giva and routed Binyamin completely.", desc:"All Israel assembles at Mitzpa — 400,000 swordsmen. They demand that Binyamin surrender the guilty men of Giva. Binyamin refuses and musters 26,000. Two devastating days — Israel loses 40,000. On the third day a great ambush: Giva burns, Binyamin is nearly annihilated." }
];
CHAPTERS["shoftim_21"] = [
  { verse:"21:1-25", place:"Shilo — Binyamin Restored",      heb:"שילה",             lat:32.053, lng:35.286, color:"#4a7a2a", persons:["All Israel","Binyamin"],         themes:["Restoration","Unity","Daughters"], source:"Rashi: The people had sworn at Mitzpa not to give their daughters to Binyamin — and they mourned. They found the daughters of Shilo dancing at the yearly festival and allowed Binyamin to take them. The book ends: there was no king in Israel — every man did what was right in his own eyes.", desc:"Israel mourns that Binyamin is nearly destroyed. They find 400 virgins from Yavesh Gilad and give them to Binyamin. They also allow the remaining Binyaminites to take daughters of Shilo from the yearly festival. Binyamin is restored. The book closes: in those days there was no king in Israel — every man did what was right in his own eyes." }
];

// ── RUT ───────────────────────────────────────────────────────
CHAPTERS["rut_1"] = [
  { verse:"1:1-2",   place:"Beit Lechem — Departure",        heb:"בית לחם",         lat:31.704, lng:35.206, color:"#8a6a3a", persons:["Elimelech","Naomi","Machlon","Kilyon"], themes:["Famine","Exile","Family"], source:"Rashi: In the days when the judges judged — a famine came. Elimelech, a leader of his generation, left the land during the famine instead of supporting his people. The Sages say he was punished for this.", desc:"A famine strikes Beit Lechem in the days of the Judges. Elimelech takes his wife Naomi and sons Machlon and Kilyon and leaves for the fields of Moav. He dies there, leaving Naomi a widow in a foreign land." },
  { verse:"1:3-5",   place:"Fields of Moav — Deaths",        heb:"שדי מואב",         lat:31.200, lng:35.700, color:"#8b3a3a", persons:["Naomi","Machlon","Kilyon","Rut","Orpa"], themes:["Death","Widowhood","Moav"], source:"Radak: Elimelech died, then Machlon and Kilyon also died — and Naomi was left alone, bereaved of her husband and her two sons in a foreign land. The names Machlon (sickness) and Kilyon (destruction) foreshadowed their fate.", desc:"Naomi's sons marry Moabite women — Rut and Orpa. Then both sons die. Naomi is left alone in Moav with her two daughters-in-law, all three widowed." },
  { verse:"1:6-18",  place:"Road from Moav to Beit Lechem",  heb:"דרך בית לחם",      lat:31.450, lng:35.400, color:"#c8962a", persons:["Naomi","Rut","Orpa"],              themes:["Loyalty","Chesed","Return"],   source:"Rashi: Where you go I will go — Rut's declaration is the model of conversion. She accepted the Torah, the commandments, the people, and their God in a single speech. Orpa kissed and returned; Rut clung.", desc:"Naomi hears the famine is over and sets out to return to Beit Lechem. She urges both daughters-in-law to return to their mothers' homes. Orpa kisses her and returns. Rut clings: where you go I will go, where you die I will die — your people are my people and your God is my God." },
  { verse:"1:19-22", place:"Beit Lechem — Arrival",          heb:"בית לחם",          lat:31.704, lng:35.207, color:"#c8962a", persons:["Naomi","Rut"],                     themes:["Return","Grief","Barley"],     source:"Malbim: The whole city stirred when they arrived — is this Naomi? She said: do not call me Naomi (pleasant) — call me Mara (bitter) for Hashem has dealt bitterly with me. I went out full and Hashem brought me back empty.", desc:"Naomi and Rut arrive in Beit Lechem. The whole city is stirred. Naomi says: call me Mara — I went out full and returned empty. They arrive at the beginning of the barley harvest." }
];
CHAPTERS["rut_2"] = [
  { verse:"2:1-7",   place:"Fields of Boaz — Gleaning",      heb:"שדה בועז",         lat:31.700, lng:35.220, color:"#c8962a", persons:["Rut","Boaz","Reapers"],            themes:["Providence","Chesed","Harvest"], source:"Rashi: Her chance fell upon the portion of the field belonging to Boaz — it says chance, but the Sages say the Holy One arranged it. She happened to glean in the right field.", desc:"Rut goes to glean in the fields after the reapers, as the Torah permits for the poor. She happens to come to the field belonging to Boaz — a relative of Elimelech. Boaz arrives from Beit Lechem, notices Rut, and asks the overseer about her." },
  { verse:"2:8-17",  place:"Fields of Boaz — Boaz Provides", heb:"שדה בועז",         lat:31.700, lng:35.221, color:"#c8962a", persons:["Rut","Boaz"],                      themes:["Chesed","Providence","Loyalty"], source:"Radak: Boaz told her: stay close to my maidens, drink from the vessels the young men have drawn. He commanded the young men: let some stalks fall for her deliberately and leave them — do not rebuke her. His chesed exceeded the letter of the law.", desc:"Boaz tells Rut to glean only in his fields, drink his water, eat with his workers. He tells his young men to leave stalks deliberately for her. He has heard of her loyalty to Naomi. She gleans an ephah of barley — much more than gleaning normally yields." }
];
CHAPTERS["rut_3"] = [
  { verse:"3:1-13",  place:"Threshing Floor of Boaz",        heb:"גורן בועז",        lat:31.702, lng:35.210, color:"#c8962a", persons:["Rut","Boaz","Naomi"],              themes:["Redemption","Chesed","Marriage"], source:"Malbim: Naomi's plan was precise — wash, anoint, dress, go down to the threshing floor. Uncover his feet and lie down. He will tell you what to do. Rut's approach was bold but entirely within propriety.", desc:"Naomi instructs Rut to go to the threshing floor at night after Boaz has eaten and drunk. Rut lies at his feet. At midnight he wakes and finds her. She asks him to spread his cloak over her as a kinsman-redeemer. He praises her chesed and agrees — but there is a closer redeemer who has the first right." },
  { verse:"3:14-18", place:"Beit Lechem — Return from Threshing Floor", heb:"בית לחם", lat:31.704, lng:35.206, color:"#c8962a", persons:["Rut","Naomi","Boaz"],            themes:["Anticipation","Providence"],   source:"Rashi: Boaz gave her six measures of barley and said: do not go to your mother-in-law empty-handed. Naomi said: sit still my daughter — the man will not rest until he has settled the matter today.", desc:"Before dawn Rut returns to Naomi with six measures of barley — Boaz's gift. Naomi tells her: sit still, he will settle the matter today." }
];
CHAPTERS["rut_4"] = [
  { verse:"4:1-12",  place:"Beit Lechem — City Gate",        heb:"שער בית לחם",      lat:31.704, lng:35.206, color:"#c8962a", persons:["Boaz","Ploni Almoni","Elders"],    themes:["Redemption","Law","Gate"],     source:"Radak: Boaz sat at the gate and the closer redeemer happened to pass — again, providence. He presented the case: you must also take Rut the Moabite. The man said: I cannot redeem for myself — lest I ruin my own inheritance. He drew off his sandal.", desc:"Boaz goes to the gate of Beit Lechem and assembles ten elders as witnesses. He presents the case to the closer redeemer — Ploni Almoni. When he hears Rut is part of the deal he declines. He removes his sandal — the legal act of transferring the right of redemption. Boaz acquires the land and Rut." },
  { verse:"4:13-17", place:"Beit Lechem — Oved is Born",     heb:"בית לחם",          lat:31.704, lng:35.207, color:"#c8962a", persons:["Rut","Boaz","Naomi","Oved"],       themes:["Redemption","Birth","Legacy"], source:"Rashi: The women said to Naomi: blessed is Hashem who has not left you without a redeemer today. They named the child Oved. He is the father of Yishai, the father of Dovid.", desc:"Rut conceives and bears a son. The women of Beit Lechem bless Naomi: your daughter-in-law who loves you is better to you than seven sons. They name the child Oved. He becomes the grandfather of Dovid — the book closes with the genealogy leading to the future king." }
];

// ── YIRMIYAHU ─────────────────────────────────────────────────
CHAPTERS["yirmiyahu_1"] = [
  { verse:"1:1-3",   place:"Anatot — Yirmiyahu's Hometown",   heb:"ענתות",           lat:31.812, lng:35.290, color:"#7a5a3a", persons:["Yirmiyahu"],                     themes:["Calling","Prophecy","Origin"],  source:"Rashi: Anatot was a city of priests in Binyamin — Evyatar the Kohen had been exiled there by Shlomo. Yirmiyahu came from a priestly family in a priestly city.", desc:"The word of Hashem comes to Yirmiyahu son of Chilkiyahu, of the priests in Anatot in the territory of Binyamin. His prophecy spans from the 13th year of Yoshiyahu through the destruction and beyond." },
  { verse:"1:4-19",  place:"Anatot — The Calling",            heb:"ענתות",           lat:31.812, lng:35.291, color:"#c8962a", persons:["Yirmiyahu","Hashem"],             themes:["Calling","Prophecy","Mission"], source:"Rashi: Before I formed you in the womb I knew you — Yirmiyahu was designated as a prophet before his birth. He said: I cannot speak, I am a youth. Hashem touched his mouth: I have put my words in your mouth.", desc:"Hashem tells Yirmiyahu: before I formed you I knew you, before you were born I set you apart as a prophet to the nations. Yirmiyahu protests his youth. Hashem touches his mouth: I have placed my words there. He will uproot and plant, destroy and build." }
];
CHAPTERS["yirmiyahu_2"] = [
  { verse:"2:1-13",  place:"Yerushalayim — First Rebuke",     heb:"ירושלים",         lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Yirmiyahu","Bnei Yisrael"],       themes:["Idolatry","Rebuke","Covenant"], source:"Rashi: I remember the chesed of your youth — your love as a bride — how you followed me in the wilderness. What wrong did your fathers find in me that they went far from me? They exchanged their Glory for what does not profit.", desc:"Hashem recalls Israel's early devotion in the wilderness. The rebuke begins: you have forsaken me, the spring of living water, and dug broken cisterns that hold no water. You have exchanged your glory for idols." }
];
CHAPTERS["yirmiyahu_3"] = [
  { verse:"3:6-18",  place:"Yerushalayim — Northern Kingdom's Lesson", heb:"ירושלים", lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Yirmiyahu","Hashem","Yisrael","Yehuda"], themes:["Repentance","Idolatry","Return"], source:"Radak: Faithless Israel was more righteous than treacherous Yehuda — Israel sinned openly but Yehuda sinned while pretending to be faithful. The treacherous sister is worse than the faithless one.", desc:"Hashem contrasts faithless Israel (the northern kingdom, already exiled) with treacherous Yehuda. Despite seeing Israel's punishment Yehuda continued in idolatry. Yet a call for return: return O faithless children — I will heal your backsliding." }
];
CHAPTERS["yirmiyahu_4"] = [
  { verse:"4:5-31",  place:"Yerushalayim — Foe from the North", heb:"ירושלים",       lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Yirmiyahu","Hashem"],             themes:["Destruction","Prophecy","Babylon"], source:"Rashi: Blow the shofar in the land, cry out loud — say: gather together and let us go into the fortified cities. Set up a standard toward Tzion. A lion has gone up from his thicket — the destroyer of nations has set out.", desc:"The great prophecy of the foe from the north — Babylon approaching. Yirmiyahu sees in vision: the earth formless and void, the mountains trembling, no man, the birds fled. I looked and the fruitful land was a desert. The whole land is desolate." }
];
CHAPTERS["yirmiyahu_5"] = [
  { verse:"5:1",     place:"Yerushalayim — Search for One Just Man", heb:"ירושלים",   lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Yirmiyahu","Hashem"],             themes:["Justice","Corruption","City"],  source:"Rashi: Go through the streets of Yerushalayim and look and know and seek in her squares — if you can find a man who does justice and seeks truth, I will pardon her. Even one righteous man could save the city.", desc:"Hashem challenges Yirmiyahu to find even one just person in Yerushalayim. He searches the streets and squares. The poor are ignorant, but the great have broken the yoke — all have gone after other gods." }
];
CHAPTERS["yirmiyahu_6"] = [
  { verse:"6:1",     place:"Beit HaKerem — Warning Signal",    heb:"בית הכרם",        lat:31.753, lng:35.191, color:"#8b1a1a", persons:["Yirmiyahu","Binyamin"],           themes:["Warning","Destruction","Signal"], source:"Rashi: Blow the shofar in Tekoa and raise a fire signal over Beit HaKerem — for evil looks out from the north and great destruction. Beit HaKerem was a high place south of Yerushalayim where signal fires were lit.", desc:"Yirmiyahu calls Binyamin to flee Yerushalayim. Light a fire signal at Beit HaKerem — evil comes from the north. Yerushalayim must be punished for she is full of oppression." }
];
CHAPTERS["yirmiyahu_7"] = [
  { verse:"7:1-15",  place:"Har HaBayit — Temple Gate Sermon", heb:"הר הבית",         lat:31.778, lng:35.235, color:"#8b3a3a", persons:["Yirmiyahu","Temple Worshippers"], themes:["Temple","False Confidence","Sermon"], source:"Rashi: Stand at the gate of Hashem's house and proclaim there this word. The people said: the Temple of Hashem, the Temple of Hashem — thinking the Temple's presence guaranteed safety. Yirmiyahu warned: this is a lie.", desc:"Yirmiyahu stands at the Temple gate and delivers his great sermon: do not trust in false words saying 'the Temple of Hashem.' Reform your ways and I will let you dwell here. Has this house become a den of robbers in your eyes?" },
  { verse:"7:31-32", place:"Gei Ben Hinnom — Tofet",          heb:"גיא בן הינום",    lat:31.769, lng:35.226, color:"#8b1a1a", persons:["Yirmiyahu","Yehuda"],             themes:["Idolatry","Molech","Judgment"], source:"Radak: They built the high places of Tofet in the Valley of Ben Hinnom to burn their sons and daughters in fire — which I did not command nor did it enter my mind. Therefore the days are coming when it will no longer be called Tofet but the Valley of Slaughter.", desc:"Yirmiyahu condemns the Tofet in Gei Ben Hinnom — where children were burned to Molech. The days are coming when it will be called the Valley of Slaughter and Tofet will be the burial ground of Jerusalem's dead." }
];
CHAPTERS["yirmiyahu_8"] = [
  { verse:"8:18-22", place:"Yerushalayim — The Balm of Gilad", heb:"ירושלים",         lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Yirmiyahu","Hashem"],             themes:["Lament","Healing","Grief"],     source:"Rashi: Is there no balm in Gilad? Is there no healer there? Why then has the healing of my people not come? Yirmiyahu weeps for his people as he prophesies their doom — the prophet who loved more than anyone.", desc:"Yirmiyahu's anguish: my joy is gone, grief is upon me, my heart is sick. The harvest is past, the summer is ended and we are not saved. Is there no balm in Gilad? Why has the healing of my people not come?" }
];
CHAPTERS["yirmiyahu_9"] = [
  { verse:"9:1",     place:"Midbar — Yirmiyahu's Wish",        heb:"המדבר",           lat:31.500, lng:35.300, color:"#8b3a3a", persons:["Yirmiyahu"],                     themes:["Lament","Grief","Exile"],       source:"Rashi: Oh that I had in the wilderness a traveler's lodging place — that I might leave my people and go away from them. Yirmiyahu wanted to flee the sight of their suffering and sin — not from hatred but from unbearable grief.", desc:"Yirmiyahu cries: oh that I had a lodging place in the wilderness — I would leave my people and go from them. For they are all adulterers, an assembly of treacherous men. He weeps and mourns over the mountains." }
];
CHAPTERS["yirmiyahu_10"] = [
  { verse:"10:17-22",place:"Yerushalayim — Before Exile",      heb:"ירושלים",         lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Yirmiyahu","Yehuda"],             themes:["Exile","Judgment","Lament"],    source:"Radak: Gather your bundle from the ground O inhabitant of the siege — for thus says Hashem: I am slinging out the inhabitants of the land at this time. A great commotion from the north country — to make the cities of Yehuda a desolation.", desc:"Yirmiyahu addresses besieged Yerushalayim: pack your goods for exile. Hashem is slinging out the inhabitants. A great noise comes from the north — to make Yehuda's cities desolate, a lair of jackals." }
];
CHAPTERS["yirmiyahu_11"] = [
  { verse:"11:18-23",place:"Anatot — Plot against Yirmiyahu",  heb:"ענתות",           lat:31.812, lng:35.290, color:"#8b3a3a", persons:["Yirmiyahu","Men of Anatot"],     themes:["Persecution","Prophecy","Hometown"], source:"Rashi: The men of Anatot sought his life saying: do not prophesy in Hashem's name or you will die by our hand. Even his own townspeople — and perhaps his own family — conspired against him. He was like a lamb led to slaughter, not knowing.", desc:"Yirmiyahu discovers a plot against his life — the men of Anatot, his own hometown, are seeking to kill him. He had not known. Hashem reveals it and promises punishment for Anatot." }
];
CHAPTERS["yirmiyahu_12"] = [
  { verse:"12:5",    place:"Yarden — The Thickets",            heb:"גאון הירדן",      lat:31.834, lng:35.548, color:"#8b3a3a", persons:["Yirmiyahu","Hashem"],             themes:["Suffering","Challenge","Faith"], source:"Rashi: If you have raced with men on foot and they have wearied you, how will you compete with horses? If you fell in a safe land, what will you do in the thicket of the Yarden? More trials are coming — Yirmiyahu must strengthen himself.", desc:"Hashem challenges Yirmiyahu's complaint about the prosperity of the wicked: if you ran with foot-soldiers and they wore you out, how will you compete with horses? If you fall in a peaceful land, what will you do in the jungle of the Yarden?" }
];
CHAPTERS["yirmiyahu_13"] = [
  { verse:"13:1-9",  place:"Prat — The Linen Belt",            heb:"פרת",             lat:31.834, lng:35.548, color:"#8b3a3a", persons:["Yirmiyahu","Hashem"],             themes:["Prophecy","Symbol","Exile"],    source:"Radak: Yirmiyahu was told to hide the belt at the Prat — some say the Euphrates, others say a place called Prat near Anatot. After many days it was ruined — just as Hashem would ruin the pride of Yehuda and Yerushalayim.", desc:"Hashem tells Yirmiyahu to buy a linen belt, wear it, then hide it in the cleft of the rock at Prat. After many days he retrieves it — it is ruined and useless. So will Hashem ruin the pride of Yehuda." }
];
CHAPTERS["yirmiyahu_14"] = [
  { verse:"14:1-9",  place:"Yerushalayim — Drought",           heb:"ירושלים",         lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Yirmiyahu","Hashem","Yehuda"],    themes:["Drought","Prayer","Lament"],    source:"Rashi: The nobles sent their servants for water — they came to the cisterns and found no water. They returned with empty vessels. The ground is cracked — there was no rain. The farmers were ashamed.", desc:"A severe drought. Yehuda mourns, her gates languish, her nobles send servants for water and find none. The farmers are ashamed. Yirmiyahu intercedes in prayer: do not reject us for your name's sake." }
];
CHAPTERS["yirmiyahu_15"] = [
  { verse:"15:10-21",place:"Anatot — Yirmiyahu's Complaint",   heb:"ענתות",           lat:31.812, lng:35.291, color:"#8b3a3a", persons:["Yirmiyahu","Hashem"],             themes:["Lament","Suffering","Faith"],   source:"Malbim: Woe is me my mother that you bore me — a man of strife and contention to the whole land. Yirmiyahu's great complaint: your words were found and I ate them — your word was the joy of my heart. Why is my pain perpetual?", desc:"Yirmiyahu's personal lament: woe to me that my mother bore me — everyone curses me. I have not sat in the assembly of merrymakers. Your words became my joy but my pain is unceasing. Hashem promises: I will make you a fortified wall of bronze." }
];
CHAPTERS["yirmiyahu_16"] = [
  { verse:"16:1-9",  place:"Yerushalayim — No Marriage, No Mourning", heb:"ירושלים",  lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Yirmiyahu","Hashem"],             themes:["Prophecy","Symbol","Destruction"], source:"Rashi: Do not take a wife, do not have sons or daughters in this place — for the sons and daughters born here will die of terrible deaths. Do not go to mourn or show sympathy — I have removed my peace from this people.", desc:"Hashem commands Yirmiyahu not to marry or have children in Yerushalayim — the coming destruction will kill the children. He is also not to attend mourning feasts or celebrations. His celibate, isolated life is itself a prophetic sign." }
];
CHAPTERS["yirmiyahu_17"] = [
  { verse:"17:19-27",place:"Shaar Binyamin — Shabbat Sermon",  heb:"שער בנימין",      lat:31.775, lng:35.229, color:"#8b3a3a", persons:["Yirmiyahu","Yehuda"],             themes:["Shabbat","Gates","Warning"],    source:"Rashi: Stand in the gate of the children of the people through which the kings of Yehuda enter and exit, and in all the gates of Yerushalayim, and say to them: hear the word of Hashem. Guard the Shabbat and do not carry burdens.", desc:"Yirmiyahu stands at the gates of Yerushalayim — the Shaar Binyamin and all the city gates — preaching observance of Shabbat. If you keep the Shabbat, kings and princes will enter these gates. If not, I will kindle a fire in her gates." }
];
CHAPTERS["yirmiyahu_18"] = [
  { verse:"18:1-12", place:"Beit HaYotzer — Potter's House",   heb:"בית היוצר",       lat:31.770, lng:35.228, color:"#c8962a", persons:["Yirmiyahu","Hashem","Potter"],    themes:["Prophecy","Symbol","Sovereignty"], source:"Rashi: Hashem sent Yirmiyahu to the potter's house. He watched the potter work at the wheel — when the vessel was spoiled he remade it as seemed good to the potter. Cannot I do with you as this potter, says Hashem?", desc:"Hashem sends Yirmiyahu to a potter's house. He watches the potter reshape a spoiled vessel on the wheel. The message: as clay in the potter's hand so are you in my hand, O house of Israel. I can uproot or plant any nation." }
];
CHAPTERS["yirmiyahu_19"] = [
  { verse:"19:1-13", place:"Gei Ben Hinnom — Smashing the Jar", heb:"גיא בן הינום",   lat:31.769, lng:35.226, color:"#8b1a1a", persons:["Yirmiyahu","Elders","Kohanim"],   themes:["Prophecy","Symbol","Tofet"],    source:"Radak: Yirmiyahu bought an earthenware jar from the potter, took elders and senior priests to the Valley of Ben Hinnom, and smashed it. Thus says Hashem: so will I break this people and this city as one breaks a potter's vessel — that cannot be mended.", desc:"Yirmiyahu takes a clay jar and senior leaders to Gei Ben Hinnom. He smashes the jar before them: so will Hashem smash this people and city — unrepairable. He prophesies against the Tofet where children were burned." }
];
CHAPTERS["yirmiyahu_20"] = [
  { verse:"20:1-6",  place:"Har HaBayit — Pashchur Strikes Yirmiyahu", heb:"הר הבית", lat:31.778, lng:35.235, color:"#8b1a1a", persons:["Yirmiyahu","Pashchur"],           themes:["Persecution","Prison","Prophecy"], source:"Rashi: Pashchur the priest heard Yirmiyahu prophesying — he struck Yirmiyahu and put him in stocks at the Upper Gate of Binyamin. The next morning Pashchur released him and Yirmiyahu said: Hashem has not called you Pashchur but Magor Missaviv — terror on every side.", desc:"The priest Pashchur ben Immer strikes Yirmiyahu and puts him in stocks at the Upper Gate of Binyamin in the Temple. When released, Yirmiyahu renames him Magor Missaviv and prophesies that he and his household will die in Babylon." }
];
CHAPTERS["yirmiyahu_21"] = [
  { verse:"21:1-10", place:"Yerushalayim — During Siege",      heb:"ירושלים",         lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Yirmiyahu","Tzidkiyahu","Nevuchadnetzar"], themes:["Siege","Judgment","Babylon"],  source:"Radak: King Tzidkiyahu sent Pashchur and Tzefanya to Yirmiyahu during Nevuchadnetzar's siege asking if perhaps Hashem will deal with us according to all his wonders. Yirmiyahu answered: whoever goes out to the Chaldeans shall live. Whoever stays shall die.", desc:"Tzidkiyahu sends to Yirmiyahu during Nevuchadnetzar's siege: inquire of Hashem for us. Yirmiyahu's devastating answer: Hashem himself is fighting against this city. Whoever goes out to Babylon will live; whoever stays will die." }
];
CHAPTERS["yirmiyahu_22"] = [
  { verse:"22:1-9",  place:"Beit HaMelech — Palace Gate",      heb:"בית המלך",        lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Yirmiyahu","King of Yehuda"],     themes:["Kingship","Justice","Warning"], source:"Rashi: Go down to the house of the king of Yehuda and speak this word. Execute justice and righteousness, deliver the robbed from the oppressor. If you do this, kings sitting on Dovid's throne will enter these gates. If not, this house will become a ruin.", desc:"Yirmiyahu goes to the royal palace and preaches to the king: execute justice, protect the widow and orphan, shed no innocent blood. If you do this, the dynasty continues. If not, this palace will become a ruin." }
];
CHAPTERS["yirmiyahu_23"] = [
  { verse:"23:1-8",  place:"Yerushalayim — False Shepherds",   heb:"ירושלים",         lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Yirmiyahu","Hashem","False Prophets"], themes:["Prophecy","False Prophets","Messianic"], source:"Rashi: Woe to the shepherds who destroy and scatter the sheep of my pasture. Then Hashem will gather the remnant of his flock from all the lands. And I will raise up for Dovid a righteous branch — and this is his name: Hashem Tzidkeinu.", desc:"Hashem condemns the false shepherds who scattered Israel. He promises to gather the flock and appoint good shepherds. The great messianic prophecy: I will raise up a righteous branch for Dovid — Hashem is our righteousness." }
];
CHAPTERS["yirmiyahu_24"] = [
  { verse:"24:1-10", place:"Har HaBayit — Two Baskets of Figs", heb:"הר הבית",        lat:31.778, lng:35.235, color:"#c8962a", persons:["Yirmiyahu","Hashem"],             themes:["Prophecy","Vision","Exile"],    source:"Radak: After Nevuchadnetzar exiled Yehoyachin, Hashem showed Yirmiyahu two baskets of figs. The good figs — like the first-ripened figs — are the exiles taken to Babylon. The bad figs are Tzidkiyahu and those remaining in the land.", desc:"Hashem shows Yirmiyahu two baskets of figs before the Temple. Good figs = the exiles taken to Babylon — Hashem will watch over them and return them. Bad figs = Tzidkiyahu and those remaining, who will be cursed." }
];
CHAPTERS["yirmiyahu_25"] = [
  { verse:"25:1-14", place:"Yerushalayim — 70 Years Prophecy", heb:"ירושלים",         lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Yirmiyahu","Yehuda","Nevuchadnetzar"], themes:["Babylon","70 Years","Prophecy"], source:"Rashi: This whole land shall become a ruin and a desolation and these nations shall serve the king of Babylon for 70 years. Then after 70 years I will punish the king of Babylon for their iniquity. Yirmiyahu prophesied this in the fourth year of Yehoyakim.", desc:"The great prophecy of 70 years: because you have not obeyed my words, Nevuchadnetzar my servant will bring this land to ruin. Yehuda and all nations will serve Babylon 70 years. After that, Babylon itself will be punished." }
];
CHAPTERS["yirmiyahu_26"] = [
  { verse:"26:1-19", place:"Har HaBayit — Yirmiyahu on Trial",  heb:"הר הבית",        lat:31.778, lng:35.235, color:"#8b1a1a", persons:["Yirmiyahu","Priests","Elders"],   themes:["Trial","Temple","Persecution"], source:"Radak: The priests and prophets seized Yirmiyahu: you shall die! He said: I am in your hands — do to me as seems good. Only know that if you kill me, you bring innocent blood upon yourselves. The elders remembered Micha and saved him.", desc:"After his Temple sermon, the priests and prophets seize Yirmiyahu: you shall die for prophesying against this Temple. He refuses to retract. The elders recall the precedent of Micha the Morashti who prophesied similarly under Chizkiyahu. Yirmiyahu is saved." }
];
CHAPTERS["yirmiyahu_27"] = [
  { verse:"27:1-11", place:"Yerushalayim — Yoke Symbol",       heb:"ירושלים",         lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Yirmiyahu","Tzidkiyahu","Ambassadors"], themes:["Babylon","Submission","Symbol"], source:"Rashi: Hashem told Yirmiyahu to make yoke-bars and put them on his neck, and to send word to the kings of Edom, Moav, Ammon, Tzor, and Tzidon: submit to Babylon — for I have given all these lands to Nevuchadnetzar my servant.", desc:"Yirmiyahu wears a wooden yoke around his neck and sends copies to all the surrounding nations: submit to Babylon — Hashem has given all these lands to Nevuchadnetzar. Do not listen to prophets who tell you otherwise." }
];
CHAPTERS["yirmiyahu_28"] = [
  { verse:"28:1-17", place:"Har HaBayit — Chananya Breaks the Yoke", heb:"הר הבית",   lat:31.778, lng:35.235, color:"#8b3a3a", persons:["Yirmiyahu","Chananya ben Azzur"], themes:["False Prophecy","Yoke","Confrontation"], source:"Rashi: The false prophet Chananya took the yoke from Yirmiyahu's neck and broke it saying: so shall Hashem break the yoke of Babylon within two years. Yirmiyahu went his way. Then came the word of Hashem: you have broken wooden bars — but you will make iron bars instead.", desc:"The false prophet Chananya publicly breaks Yirmiyahu's wooden yoke and prophesies the exiles will return within two years. Yirmiyahu responds: the prophets of old prophesied war and disaster — only when the word comes true is the prophet known. Chananya dies within the year." }
];
CHAPTERS["yirmiyahu_29"] = [
  { verse:"29:1-14", place:"Babylon — Letter to the Exiles",   heb:"בבל",             lat:32.536, lng:44.421, color:"#8b3a3a", persons:["Yirmiyahu","Exiles in Babylon"],  themes:["Exile","Hope","Letter"],        source:"Rashi: Seek the peace of the city where I have sent you into exile — pray to Hashem on its behalf, for in its peace you will have peace. Build houses and live in them, plant gardens. Yirmiyahu's letter to the exiles in Babylon is the founding document of diaspora Judaism.", desc:"Yirmiyahu sends a letter to the exiles in Babylon: build houses, plant gardens, marry and have children. Seek the peace of the city — pray for it. After 70 years I will return you. I know the plans I have for you — plans for peace and not for evil, to give you a future and a hope." }
];
CHAPTERS["yirmiyahu_30"] = [
  { verse:"30:1-22", place:"Yerushalayim — Book of Consolation", heb:"ירושלים",       lat:31.771, lng:35.231, color:"#c8962a", persons:["Yirmiyahu","Hashem","Yisrael"],   themes:["Consolation","Restoration","Hope"], source:"Rashi: For I will restore the fortunes of my people Israel and Yehuda, says Hashem, and I will bring them back to the land that I gave to their fathers and they shall possess it. The days are coming — I will break the yoke from your neck.", desc:"The beginning of the Book of Consolation (chapters 30-33). Hashem promises: the time is coming when I will restore the fortunes of my people. The yoke will be broken. I will save you from afar and your children from the land of their captivity." }
];
CHAPTERS["yirmiyahu_31"] = [
  { verse:"31:2-6",  place:"Midbar — Rachel Weeps",            heb:"רמה",             lat:31.860, lng:35.212, color:"#c8962a", persons:["Hashem","Rachel","Bnei Yisrael"], themes:["Consolation","Rachel","Return"],source:"Rashi: A voice is heard in Rama — lamentation and bitter weeping. Rachel is weeping for her children, she refuses to be comforted for her children — for they are gone. Hashem says: restrain your voice from weeping — there is reward for your labor. They shall come back from the land of the enemy.", desc:"The great consolation: Rachel weeping for her children at Rama as the exiles pass. Hashem tells her: restrain your voice from weeping — they shall return from the land of the enemy. A new covenant is promised: I will write my Torah on their hearts." },
  { verse:"31:30-32",place:"Yerushalayim — New Covenant",      heb:"ירושלים",         lat:31.771, lng:35.231, color:"#c8962a", persons:["Hashem","House of Israel"],       themes:["New Covenant","Torah","Heart"],  source:"Radak: I will make a new covenant with the house of Israel — not like the covenant I made with their fathers when I took them out of Egypt. I will put my Torah within them and write it on their hearts.", desc:"The new covenant prophecy: not like the covenant of Sinai. I will put my Torah within them and write it on their hearts. I will be their God and they will be my people. No longer will each man teach his neighbor — they will all know me." }
];
CHAPTERS["yirmiyahu_32"] = [
  { verse:"32:1-15", place:"Anatot — Yirmiyahu Buys a Field",  heb:"ענתות",           lat:31.812, lng:35.290, color:"#c8962a", persons:["Yirmiyahu","Chanamel","Baruch"], themes:["Hope","Redemption","Land"],     source:"Rashi: Yirmiyahu was imprisoned in the court of the guard when his cousin Chanamel came to him: buy my field in Anatot — for the right of redemption is yours. Yirmiyahu understood this was the word of Hashem and bought it for 17 shekels of silver. Houses and fields and vineyards shall yet again be bought in this land.", desc:"While imprisoned in the besieged city, Yirmiyahu buys his cousin's field in Anatot for 17 silver shekels — signing the deed, sealing it, getting witnesses. He gives it to Baruch: thus says Hashem — houses, fields and vineyards shall yet be bought in this land. The ultimate act of faith during destruction." }
];
CHAPTERS["yirmiyahu_33"] = [
  { verse:"33:1-16", place:"Yerushalayim — Prison Court Prophecy", heb:"ירושלים",     lat:31.771, lng:35.231, color:"#c8962a", persons:["Yirmiyahu","Hashem"],             themes:["Consolation","Messianic","Restoration"], source:"Radak: Call to me and I will answer you and tell you great and hidden things that you do not know. Hashem promises to heal Yerushalayim, to cleanse her of sin, and to raise up the righteous branch of Dovid.", desc:"From prison Hashem gives Yirmiyahu another consolation prophecy: call to me and I will answer. I will restore Yehuda and Yerushalayim. The streets will again have the voice of joy and gladness — the voice of bride and groom." }
];
CHAPTERS["yirmiyahu_34"] = [
