];

CHAPTERS['shmuel2_11'] = [
  { verse:"11:1",    place:"Rabat Ammon — Siege",           heb:"רבת עמון",       lat:31.955, lng:35.945, color:"#8b1a1a", persons:["Yoav","Ammon"],               themes:["War","Siege"],             source:"Rashi: 'At the turn of the year when kings go out to war' — Dovid stayed in Yerushalayim while his army besieged Ammon. This was the beginning of his downfall.", desc:"In spring — when kings go to war — Dovid sends Yoav to besiege Rabbah of Ammon. Dovid remains in Yerushalayim." },
  { verse:"11:2-5",  place:"Yerushalayim — Batsheva",       heb:"ירושלים",        lat:31.772, lng:35.231, color:"#8b1a1a", persons:["Dovid","Batsheva"],            themes:["Sin","Batsheva"],          source:"Abarbanel: 'He walked on the roof at evening' — the Sages say Dovid's sin was not purely accidental; his moral vigilance had lapsed while he remained behind from war.", desc:"Dovid sees Batsheva bathing from his roof. He sends for her. She comes. She returns home having conceived." },
  { verse:"11:6-13", place:"Yerushalayim — Uriya",          heb:"ירושלים",        lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Dovid","Uriya"],               themes:["Sin","Cover-up","Loyalty"],source:"Malbim: Uriya refused to sleep in his house while the Ark was in the field — his loyalty and honor contrasted devastatingly with Dovid's betrayal.", desc:"Dovid recalls Uriya from the front and tries to get him to sleep with Batsheva. Uriya refuses — 'The Ark and Yisrael dwell in tents.' Dovid gets him drunk. Still he doesn't go home." },
  { verse:"11:14-17",place:"Rabat Ammon — Uriya's Death",   heb:"רבת עמון",       lat:31.955, lng:35.946, color:"#8b1a1a", persons:["Yoav","Uriya","Ammon"],        themes:["Murder","Sin","War"],      source:"Radak: Yoav carried out the order without question — and later used this knowledge as leverage over Dovid, becoming untouchable.", desc:"Dovid sends a letter by Uriya's own hand, ordering Yoav to place him in the fiercest fighting and fall back. Uriya is killed before the walls of Rabbah." },
  { verse:"11:26-27",place:"Yerushalayim — Marriage",       heb:"ירושלים",        lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Dovid","Batsheva"],            themes:["Sin","Marriage"],          source:"Abarbanel: 'The thing that Dovid had done was evil in the eyes of Hashem' — the closing verdict of the chapter, spoken in understatement about the gravest sin of Dovid's life.", desc:"After Batsheva's mourning, Dovid brings her to his house. She becomes his wife and bears a son. 'The thing Dovid did was evil in the eyes of Hashem.'" }
];

CHAPTERS['shmuel2_12'] = [
  { verse:"12:1-9",  place:"Yerushalayim — Natan's Parable",heb:"ירושלים",        lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Natan","Dovid"],               themes:["Prophecy","Rebuke","Sin"], source:"Rashi: Natan's parable of the poor man's lamb was a perfect trap — Dovid condemned himself before the sentence was revealed. 'You are the man.'", desc:"Natan tells Dovid the parable of the rich man who took the poor man's one lamb. Dovid rages. Natan says: 'You are the man.' He recounts Dovid's sins." },
  { verse:"12:10-14",place:"Yerushalayim — Judgment",       heb:"ירושלים",        lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Natan","Dovid"],               themes:["Judgment","Repentance"],   source:"Abarbanel: 'The sword shall not depart from your house' — the punishment mirrors the crime: hidden sin exposed publicly, private violence repaid with public shame.", desc:"Natan pronounces judgment: the sword will not depart from Dovid's house; his wives will be taken publicly. Dovid says: 'I have sinned against Hashem.' Natan: you shall not die, but the child will." },
  { verse:"12:15-23",place:"Yerushalayim — Child Dies",     heb:"ירושלים",        lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Dovid","Batsheva"],            themes:["Death","Repentance","Acceptance"],source:"Malbim: Dovid's behavior after the child's death — rising, washing, eating — astonished his servants. His explanation: 'Now he is dead, why should I fast? I will go to him; he will not return to me.'", desc:"The child falls ill. Dovid fasts and lies on the ground for seven days. The child dies. Dovid rises, washes, eats. He comforts Batsheva. She bears Shlomo." },
  { verse:"12:26-31",place:"Rabat Ammon — Conquest",        heb:"רבת עמון",       lat:31.955, lng:35.945, color:"#4a7a2a", persons:["Yoav","Dovid","Ammon"],        themes:["Victory","War","Empire"],  source:"Radak: Yoav summoned Dovid to take the final credit — a diplomatic gesture showing Yoav's political awareness and his loyalty despite everything.", desc:"Yoav captures the water city of Rabbah and sends for Dovid to take the city himself. Dovid conquers Rabbah, takes the Ammonite crown, and brings enormous spoil." }
];


CHAPTERS['shmuel2_13'] = [
  { verse:"13:1-6",  place:"Yerushalayim — Amnon's Plot",  heb:"ירושלים",        lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Amnon","Tamar","Yonadav"],    themes:["Sin","Betrayal","Family"],  source:"Abarbanel: Yonadav's counsel was brilliantly evil — he understood Amnon's desire and provided the mechanism. The court enabled the crime.", desc:"Amnon, Dovid's firstborn, becomes obsessed with his half-sister Tamar. His cousin Yonadav advises him to feign illness and ask Dovid to send Tamar to care for him." },
  { verse:"13:7-14", place:"Amnon's House — Yerushalayim", heb:"בית אמנון",       lat:31.772, lng:35.232, color:"#8b1a1a", persons:["Amnon","Tamar"],              themes:["Sin","Violence","Trauma"],  source:"Radak: Tamar's speech — 'do not do this shameful thing' — is a desperate, rational plea. Amnon does not listen. His love turns immediately to hatred.", desc:"Tamar comes to Amnon's house. He violates her. His love turns to intense hatred. He casts her out. She lives desolate in her brother Avshalom's house." },
  { verse:"13:19-22",place:"Avshalom's House — Yerushalayim",heb:"בית אבשלום",   lat:31.770, lng:35.230, color:"#8b1a1a", persons:["Avshalom","Tamar","Dovid"],    themes:["Trauma","Silence","Justice"],source:"Malbim: Dovid was very angry but did not punish Amnon because he loved him — he was his firstborn. Avshalom said nothing to Amnon, good or bad, but hated him.", desc:"Avshalom takes Tamar in. Dovid hears and is angry but does nothing. Avshalom says nothing to Amnon — but hates him. He waits two full years." },
  { verse:"13:23-29",place:"Baal Chatzor — Avshalom's Farm",heb:"בעל חצור",       lat:31.970, lng:35.313, color:"#8b1a1a", persons:["Avshalom","Amnon","Dovid's Sons"],themes:["Murder","Revenge","Family"],source:"Radak: The sheep-shearing feast — a time of celebration and drinking — was the perfect cover for Avshalom's revenge. He waited two years for this moment.", desc:"Avshalom invites all the king's sons to his sheep-shearing at Baal Chatzor. He commands his servants to kill Amnon when he is drunk. Amnon is killed. The others flee." },
  { verse:"13:34-38",place:"Geshur",                        heb:"גשור",            lat:32.900, lng:35.680, color:"#6a4a8a", persons:["Avshalom"],                   themes:["Exile","Flight","Family"],  source:"Abarbanel: Avshalom fled to his maternal grandfather Talmai in Geshur — the one place he knew Dovid could not reach him politically.", desc:"Avshalom flees to Geshur, his mother's homeland, where his grandfather Talmai is king. He stays there three years. Dovid mourns for Amnon and longs for Avshalom." }
];

CHAPTERS['shmuel2_14'] = [
  { verse:"14:1-20", place:"Tekoa",                         heb:"תקוע",            lat:31.628, lng:35.197, color:"#6a4a8a", persons:["Yoav","Wise Woman of Tekoa","Dovid"], themes:["Diplomacy","Wisdom","Family"], source:"Malbim: Yoav's strategy — using a wise woman to tell a parable about her own 'sons' — mirrored Natan's approach with Dovid. Dovid recognized the parable immediately.", desc:"Yoav sends a wise woman from Tekoa with a parable about sons and fraternal killing. Dovid sees through it — Yoav is behind this. He summons Yoav and orders Avshalom recalled." },
  { verse:"14:21-24",place:"Yerushalayim — Partial Return", heb:"ירושלים",         lat:31.771, lng:35.231, color:"#6a4a8a", persons:["Avshalom","Dovid","Yoav"],    themes:["Reconciliation","Family"],  source:"Radak: Dovid allowed Avshalom to return but refused to see him — a half-reconciliation that pleased no one and left unresolved tensions to fester for two more years.", desc:"Avshalom returns to Yerushalayim but Dovid refuses to see his face. He lives in his own house for two years without seeing the king." },
  { verse:"14:28-33",place:"Yerushalayim — Reconciliation", heb:"ירושלים",         lat:31.771, lng:35.232, color:"#6a4a8a", persons:["Avshalom","Dovid","Yoav"],    themes:["Reconciliation","Family"],  source:"Abarbanel: Avshalom forced a meeting by burning Yoav's barley field. When Dovid finally kissed him — it was too late. The rebellion was already forming in his heart.", desc:"Avshalom burns Yoav's field to force contact. Yoav arranges a meeting. Dovid kisses Avshalom. But the reconciliation is hollow — the rebellion has already begun." }
];

CHAPTERS['shmuel2_15'] = [
  { verse:"15:1-6",  place:"Gate of Yerushalayim",          heb:"שער ירושלים",    lat:31.771, lng:35.229, color:"#6a4a8a", persons:["Avshalom","People"],          themes:["Rebellion","Conspiracy","Seduction"], source:"Radak: 'He rose early and stood by the gate' — Avshalom stole the hearts of Yisrael methodically, over four years, exploiting every grievance.", desc:"Avshalom stands at the city gate for four years, intercepting litigants and telling them their case is good but the king has no deputy to hear them. He steals the hearts of Yisrael." },
  { verse:"15:7-12", place:"Chevron — Rebellion Declared",  heb:"חברון",           lat:31.532, lng:35.095, color:"#8b1a1a", persons:["Avshalom","Achitophel"],      themes:["Rebellion","Betrayal","Conspiracy"], source:"Malbim: Avshalom's choice of Chevron — where Dovid was first anointed — was deliberate political theater. He sent secret agents throughout Yisrael.", desc:"Avshalom goes to Chevron under pretext of a vow. He sends agents through all Yisrael: 'When you hear the shofar, say Avshalom is king in Chevron!' Achitophel joins him." },
  { verse:"15:13-23",place:"Yerushalayim — Dovid Flees",    heb:"ירושלים",         lat:31.771, lng:35.231, color:"#6a4a8a", persons:["Dovid","Ittai","Tzadok"],     themes:["Flight","Exile","Loyalty"],  source:"Radak: Dovid left ten concubines to keep the palace and walked barefoot, his head covered, weeping — a deliberate act of mourning and humility.", desc:"A messenger arrives: all Yisrael follows Avshalom. Dovid flees Yerushalayim with his household. He crosses the Kidron brook barefoot, weeping, head covered." },
  { verse:"15:24-29",place:"Kidron Valley",                 heb:"נחל קדרון",       lat:31.774, lng:35.236, color:"#2a6a4a", persons:["Dovid","Tzadok","Evyatar","Ark"], themes:["Flight","Faith","Ark"],      source:"Abarbanel: Dovid sent the Ark back — a profound act of faith. He would not use God's presence as a political tool. 'If I find favor in His eyes, He will bring me back.'", desc:"Tzadok carries the Ark. Dovid tells him to return it to Yerushalayim: 'If Hashem wills it, He will bring me back. If not — let Him do what is good in His eyes.'" },
  { verse:"15:30-37",place:"Har HaZeitim — Mount of Olives",heb:"הר הזיתים",       lat:31.778, lng:35.243, color:"#6a4a8a", persons:["Dovid","Chushai","Achitophel"], themes:["Flight","Strategy","Prayer"], source:"Rashi: Dovid's prayer — 'please make Achitophel's counsel foolish' — was answered through Chushai, who appeared at the summit of the Mount of Olives as Dovid prayed.", desc:"Dovid weeps as he climbs the Mount of Olives. He prays that Achitophel's counsel be made foolish. At the summit Chushai appears — Dovid sends him back as a spy." }
];

CHAPTERS['shmuel2_16'] = [
  { verse:"16:1-4",  place:"Descent from Har HaZeitim",    heb:"הר הזיתים",       lat:31.776, lng:35.241, color:"#6a4a8a", persons:["Dovid","Tziva","Mephiboshet"], themes:["Flight","Betrayal","Loyalty"], source:"Radak: Tziva's accusation against Mephiboshet — that he hoped to reclaim Shaul's throne — was likely false. Dovid had no time to investigate and made a hasty judgment.", desc:"Tziva meets Dovid with provisions and claims Mephiboshet stayed behind hoping to recover his grandfather's kingdom. Dovid gives Tziva all Mephiboshet's land." },
  { verse:"16:5-14", place:"Bachurим",                      heb:"בחורים",           lat:31.792, lng:35.265, color:"#8b1a1a", persons:["Dovid","Shimei ben Gera"],    themes:["Cursing","Humility","Flight"],source:"Malbim: Dovid's response to Shimei's cursing — 'let him curse, for Hashem has told him' — is one of the most striking acts of acceptance in Tanach. He walked on in silence.", desc:"Shimei ben Gera of the house of Shaul comes out cursing Dovid and throwing stones. Dovid forbids his men from killing Shimei: 'Let him curse — perhaps Hashem will repay me good.'" },
  { verse:"16:15-23",place:"Yerushalayim — Avshalom Enters",heb:"ירושלים",          lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Avshalom","Achitophel","Chushai"], themes:["Rebellion","Betrayal","Strategy"], source:"Abarbanel: Achitophel's advice to take Dovid's concubines fulfilled Natan's prophecy — what was done in secret to Uriya would be done publicly to Dovid.", desc:"Avshalom enters Yerushalayim. Chushai pledges loyalty as a spy. Achitophel advises Avshalom to take Dovid's concubines publicly on the roof — to announce an irreversible break." }
];

CHAPTERS['shmuel2_17'] = [
  { verse:"17:1-14", place:"Yerushalayim — Battle of Counsel",heb:"ירושלים",        lat:31.771, lng:35.231, color:"#6a4a8a", persons:["Achitophel","Chushai","Avshalom"], themes:["Strategy","Betrayal","Providence"], source:"Radak: Achitophel's plan was brilliant — strike immediately, before Dovid regrouped. Chushai's counter-counsel was deliberately flawed but sounded impressive. Providence worked through the assembly's decision.", desc:"Achitophel advises striking Dovid immediately with 12,000 men. Chushai counters: wait, gather all Yisrael, strike in full force. Avshalom's council prefers Chushai's plan — Hashem has ordained the downfall of Achitophel." },
  { verse:"17:15-22",place:"Bahurim — Messengers Hidden",   heb:"בחורים",           lat:31.792, lng:35.265, color:"#2a6a4a", persons:["Yonatan","Achimaatz","Dovid"],  themes:["Escape","Loyalty","Providence"],source:"Rashi: The messengers hid in a well — a woman covered it with grain. The soldiers searched Bachurim and found nothing. A narrow escape that turned the war.", desc:"Yonatan and Achimaatz hide in a well in Bachurim to evade Avshalom's men. A woman covers the well with grain. They escape and warn Dovid to cross the Yarden immediately." },
  { verse:"17:22-26",place:"Machanayim — Dovid's Refuge",   heb:"מחניים",            lat:32.325, lng:35.617, color:"#2a6a4a", persons:["Dovid","Yisrael","Avshalom"],   themes:["Refuge","Flight","War"],     source:"Abarbanel: Machanayim — Dovid's refuge — was the same city where Ish-Boshet had been installed as rival king. A fitting irony of history.", desc:"Dovid crosses the Yarden and reaches Machanayim. Avshalom crosses the Yarden after him with all Yisrael, appointing Amasa over the army." },
  { verse:"17:27-29",place:"Machanayim — Provisions",       heb:"מחניים",            lat:32.325, lng:35.618, color:"#2a6a4a", persons:["Dovid","Barzilai","Shobi"],     themes:["Loyalty","Chesed","Exile"],  source:"Radak: Barzilai the Gileadite, Shobi of Ammon, and Machir of Lo-Devar all brought lavish provisions — men from unexpected regions who remained loyal to Dovid.", desc:"Barzilai the Gileadite, Shobi son of Nachash from Ammon, and Machir from Lo-Devar bring beds, food, and supplies to Dovid's exhausted people at Machanayim." }
];

CHAPTERS['shmuel2_18'] = [
  { verse:"18:1-8",  place:"Forest of Efraim — Battle",    heb:"יער אפרים",        lat:32.200, lng:35.600, color:"#6a4a8a", persons:["Dovid","Yoav","Avshalom","Yisrael"], themes:["War","Victory","Battle"],   source:"Radak: The forest devoured more men than the sword — the terrain itself was Dovid's ally. Twenty thousand fell, more to the wilderness than to battle.", desc:"Battle joins in the Forest of Efraim. Dovid's men rout Yisrael. The forest kills more men than the sword — twenty thousand fall. Dovid's commanders are victorious." },
  { verse:"18:9-15", place:"Forest of Efraim — Avshalom",  heb:"יער אפרים",        lat:32.200, lng:35.601, color:"#8b1a1a", persons:["Avshalom","Yoav"],               themes:["Death","Rebellion","End"],  source:"Abarbanel: Avshalom's hair — his pride and seduction — became the instrument of his death, caught in the terebinth. Yoav did what Dovid had commanded not to do.", desc:"Avshalom's mule passes under a great terebinth tree — his hair catches in the branches. He hangs there, alive. Yoav thrusts three darts into his heart. He is killed." },
  { verse:"18:19-33",place:"Machanayim — Dovid Mourns",    heb:"מחניים",            lat:32.325, lng:35.617, color:"#8b1a1a", persons:["Dovid","Avshalom","Achimatz"],   themes:["Mourning","Death","Family"],source:"Malbim: 'My son Avshalom, would that I had died instead of you' — Dovid's lament for Avshalom is more grief than for any other death in Tanach, even Yonatan.", desc:"Two runners race with news. Dovid asks only about Avshalom. He learns his son is dead. He goes to his room weeping: 'My son Avshalom! Would that I had died instead of you!'" }
];

CHAPTERS['shmuel2_19'] = [
  { verse:"19:1-9",  place:"Machanayim — Yoav's Rebuke",   heb:"מחניים",            lat:32.325, lng:35.617, color:"#2a6a4a", persons:["Dovid","Yoav"],               themes:["Mourning","Leadership","Rebuke"], source:"Radak: Yoav's rebuke was harsh but necessary — the army was demoralized by Dovid's public grief for their enemy. 'You have shamed all your servants today.'", desc:"Yoav rebukes Dovid: you have shamed your men who saved your life. If Avshalom had lived and all of us died, that would please you. Rise and speak to your servants." },
  { verse:"19:10-16",place:"Yarden Crossing — Return",      heb:"הירדן",             lat:31.834, lng:35.547, color:"#2a6a4a", persons:["Dovid","Yehuda","Shimei"],     themes:["Return","Reconciliation"],  source:"Abarbanel: Dovid sent specifically to Yehuda to lead the return — his own tribe had been last to come, their loyalty tested by the rebellion.", desc:"Dovid negotiates his return. He sends to Tzadok and Evyatar urging Yehuda to be first to bring him back. Shimei rushes to the Yarden to meet him and beg forgiveness." },
  { verse:"19:17-24",place:"Yarden — Shimei's Plea",        heb:"הירדן",             lat:31.834, lng:35.546, color:"#2a6a4a", persons:["Dovid","Shimei","Avishai"],    themes:["Forgiveness","Mercy","Return"],source:"Rashi: Dovid swore not to kill Shimei on the day of return — a day of grace. But he told Shlomo to deal with him wisely. The oath was temporal, not permanent.", desc:"Shimei falls before Dovid at the Yarden crossing, pleading forgiveness. Avishai urges execution. Dovid swears not to kill Shimei on this day of return." },
  { verse:"19:25-31",place:"Yerushalayim — Mephiboshet",    heb:"ירושלים",           lat:31.771, lng:35.231, color:"#2a6a4a", persons:["Dovid","Mephiboshet","Tziva"],  themes:["Loyalty","Justice","Return"],source:"Radak: Mephiboshet had not dressed, trimmed his beard or washed since Dovid left — a sign of genuine mourning, not political calculation. Dovid split the estate.", desc:"Mephiboshet meets Dovid, unkempt since the king's departure. He claims Tziva slandered him. Dovid, uncertain of the truth, splits the land between them." },
  { verse:"19:32-41",place:"Yarden — Barzilai's Farewell",  heb:"הירדן",             lat:31.834, lng:35.547, color:"#2a6a4a", persons:["Dovid","Barzilai"],            themes:["Loyalty","Chesed","Farewell"],source:"Abarbanel: Barzilai's refusal of the king's offer — 'I am eighty years old, how many years do I have left?' — is one of the most graceful exits in Tanach.", desc:"Barzilai accompanies Dovid to the Yarden. Dovid offers to bring him to Yerushalayim. Barzilai declines — he is 80, past pleasures. He sends his son Chimham instead." }
];

CHAPTERS['shmuel2_20'] = [
  { verse:"20:1-2",  place:"Gilgal — Sheva's Revolt",       heb:"גלגל",             lat:31.870, lng:35.444, color:"#4a7a2a", persons:["Sheva ben Bichri","Yisrael"],  themes:["Rebellion","Division"],     source:"Radak: 'We have no portion in Dovid' — Sheva's cry echoed the division that would split the kingdom after Shlomo. The seeds of schism were always present.", desc:"Sheva ben Bichri of Binyamin blows the shofar: 'No portion have we in Dovid!' Yisrael follows Sheva. Yehuda cleaves to Dovid from the Yarden to Yerushalayim." },
  { verse:"20:3",    place:"Yerushalayim — Concubines",      heb:"ירושלים",          lat:31.771, lng:35.231, color:"#8b1a1a", persons:["Dovid","Concubines"],          themes:["Return","Judgment","Sin"],  source:"Malbim: The ten concubines remained secluded for the rest of their lives — widows of a living man. The consequence of Achitophel's counsel outlasted the rebellion.", desc:"Dovid returns to his palace. He places the ten concubines who had lain with Avshalom in confinement — living as widows until their death. He does not go in to them." },
  { verse:"20:4-22", place:"Avel Beit Maakha",               heb:"אבל בית מעכה",    lat:33.249, lng:35.573, color:"#4a7a2a", persons:["Yoav","Sheva","Wise Woman"],   themes:["War","Wisdom","Siege"],     source:"Abarbanel: The wise woman of Avel negotiated Sheva's death to save her city — a practical wisdom that resolved a military crisis through diplomacy.", desc:"Yoav pursues Sheva to the northern city of Avel Beit Maakha and besieges it. A wise woman negotiates with Yoav — Sheva's head is thrown over the wall. The pursuit ends." }
];

CHAPTERS['shmuel2_21'] = [
  { verse:"21:1-9",  place:"Giva of Shaul — Famine Atonement",heb:"גבעת שאול",      lat:31.852, lng:35.228, color:"#8a7a3a", persons:["Dovid","Givonites","Shaul's Sons"],themes:["Famine","Justice","Atonement"], source:"Radak: A three-year famine prompted Dovid to ask the oracle. The cause: Shaul's killing of the Givonites, violating Yehoshua's oath. The land itself demanded justice.", desc:"Three years of famine. Dovid inquires — it is for Shaul's killing of the Givonites. Dovid hands seven of Shaul's descendants to the Givonites who hang them on a mountain." },
  { verse:"21:10-14",place:"Yavesh Gilad — Rizpa's Vigil",   heb:"יביש גלעד",        lat:32.456, lng:35.587, color:"#8a7a3a", persons:["Rizpa","Dovid"],               themes:["Mourning","Chesed","Loyalty"],source:"Malbim: Rizpa's vigil — guarding the bodies from birds and beasts from harvest through rain — moved Dovid to give all of Shaul's house proper burial.", desc:"Rizpa daughter of Ayah guards the bodies of Shaul's sons from harvest until rain falls — preventing birds and beasts from touching them. Dovid is moved to bury Shaul and Yonatan properly." },
  { verse:"21:15-22",place:"Gat — Philistine Giants",         heb:"גת",               lat:31.763, lng:34.853, color:"#4a7a2a", persons:["Dovid","Yisbi-Benov","Avishai","Elhanan"],themes:["War","Giants","Victory"],source:"Radak: Four giant sons of Harapha fell to Dovid's warriors — the last remnant of the giant clans that had terrified the spies and challenged Yisrael for generations.", desc:"Four battles with Philistine giants at Gat. Dovid nearly killed, saved by Avishai. His men swear he will not go to battle again. The last of the Refaim giants are killed." }
];

CHAPTERS['shmuel2_22'] = [
  { verse:"22:1",    place:"Yerushalayim — Song of Dovid",   heb:"ירושלים",          lat:31.771, lng:35.231, color:"#5a7a9a", persons:["Dovid"],                      themes:["Prayer","Thanksgiving","Poetry"], source:"Radak: This song appears also as Psalm 18 — composed when Dovid was saved from all his enemies and from Shaul. It is the theological autobiography of his life.", desc:"Dovid sings a great song of thanksgiving to Hashem on the day he was delivered from all his enemies and from the hand of Shaul. The song spans his entire life of warfare and faith." }
];

CHAPTERS['shmuel2_23'] = [
  { verse:"23:1-7",  place:"Yerushalayim — Last Words",      heb:"ירושלים",          lat:31.771, lng:35.231, color:"#5a7a9a", persons:["Dovid"],                      themes:["Poetry","Covenant","Kingship"],source:"Abarbanel: 'The sweet singer of Yisrael' — Dovid's last words are a meditation on righteous kingship and the eternal covenant. His final prophecy speaks of a ruler who is like morning light.", desc:"The last words of Dovid — a poetic oracle. 'The spirit of Hashem spoke through me.' He describes the righteous ruler as morning light without clouds, and affirms the eternal covenant." },
  { verse:"23:8-39", place:"Various Battlefields",           heb:"",                 lat:31.900, lng:35.100, color:"#4a7a2a", persons:["Yisbasham","Eleazar","Shamma","Avishai","Benayahu"], themes:["War","Loyalty","Heroism"], source:"Radak: The list of Dovid's mighty men — Giborim — is the honor roll of those who built the kingdom with their bodies. Each name carries a story.", desc:"The roll of Dovid's mighty men — the Giborim. Yisbasham who killed 800 men at once. Eleazar who fought until his hand cleaved to his sword. Benayahu who killed a lion in a pit on a snowy day." },
  { verse:"23:13-17",place:"Cave of Adullam — Water from Beit Lechem",heb:"מערת עדולם", lat:31.688, lng:34.975, color:"#2a6a4a", persons:["Dovid","Three Giborim"],     themes:["Loyalty","Chesed","Heroism"],source:"Malbim: Three men broke through a Philistine garrison to bring water from Beit Lechem's well — pure loyalty to their king. Dovid poured it out as an offering to Hashem.", desc:"Dovid at Adullam longs for water from Beit Lechem's well. Three Giborim break through Philistine lines to fetch it. Dovid refuses to drink it — pours it as an offering to Hashem." }
];

CHAPTERS['shmuel2_24'] = [
  { verse:"24:1-9",  place:"Census Route — All Yisrael",    heb:"ארץ ישראל",        lat:32.000, lng:35.200, color:"#5a7a9a", persons:["Dovid","Yoav"],               themes:["Sin","Pride","Census"],     source:"Radak: The census was sinful because it reflected pride in military strength rather than trust in Hashem. Yoav sensed this and protested — but Dovid insisted.", desc:"Dovid commands a census of all Yisrael. Yoav objects but obeys. The census takes nine months and twenty days, traversing the entire land. Yoav reports: 800,000 swords in Yisrael, 500,000 in Yehuda." },
  { verse:"24:10-14",place:"Yerushalayim — Dovid's Remorse", heb:"ירושלים",          lat:31.771, lng:35.231, color:"#8b3a3a", persons:["Dovid","Gad"],                themes:["Repentance","Judgment","Choice"],source:"Abarbanel: Dovid's choice — 'let me fall into the hands of Hashem whose mercies are great, rather than into the hands of man' — reflects his theology of divine mercy.", desc:"Dovid's heart smites him. Gad the prophet offers three punishments: seven years of famine, three months of flight, three days of plague. Dovid chooses plague — better to fall into Hashem's hands." },
  { verse:"24:15-16",place:"From Dan to Beer Sheva — Plague",heb:"מדן עד באר שבע",   lat:31.240, lng:34.800, color:"#8b1a1a", persons:["Dovid","Malach","Yisrael"],    themes:["Plague","Judgment","Mercy"],source:"Rashi: The angel stretched out his hand over Yerushalayim — and Hashem relented. 'Enough — now stay your hand.' The plague stopped at the threshing floor of Aravna.", desc:"Three days of plague from Dan to Beer Sheva — seventy thousand die. The angel reaches Yerushalayim. Hashem relents: 'Enough.' The plague stops at the threshing floor of Aravna the Yevusite." },
  { verse:"24:18-25",place:"Goren Aravna — Threshing Floor",heb:"גורן ארונה",        lat:31.778, lng:35.235, color:"#c8962a", persons:["Dovid","Aravna"],              themes:["Altar","Atonement","Temple"],source:"Radak: The threshing floor of Aravna — where the plague stopped — is identified with Har HaMoriya, where Avraham bound Yitzchak and where Shlomo would build the Temple.", desc:"Dovid buys Aravna's threshing floor for fifty silver shekels. He builds a mizbe'ach there. The plague stops. This is the site where Shlomo will build the Temple." }
];

  { id:'m1',  year:1882, period:'First Aliyah', place:'Rishon LeZion',       heb:'ראשון לציון',    lat:31.964, lng:34.804, desc:'First Aliyah pioneers from Russia establish Rishon LeZion — the first modern Jewish agricultural settlement south of Jaffa. Named for Isaiah 41:27.',        persons:['First Aliyah Pioneers'], source:'Founded July 31, 1882 by ten families from Kharkov. Rothschild support saved the struggling settlement in 1883.' },
  { id:'m2',  year:1882, period:'First Aliyah', place:'Rosh Pina',           heb:'ראש פינה',       lat:32.969, lng:35.544, desc:'Romanian pioneers establish Rosh Pina in the Galilee, naming it for Psalm 118:22 — "the stone the builders rejected has become the cornerstone."',              persons:['Romanian Pioneers'], source:'Founded 1882. One of the first settlements of the First Aliyah in the north. Sits above the Chula Valley.' },
  { id:'m3',  year:1882, period:'First Aliyah', place:'Zichron Yaakov',      heb:'זכרון יעקב',     lat:32.570, lng:34.951, desc:'Romanian pioneers settle on Mount Carmel and name the town Zichron Yaakov — in memory of James (Jacob) de Rothschild, whose son Edmond later saved the settlement.',  persons:['Romanian Pioneers','Rothschild'], source:'Founded 1882 on the southern Carmel ridge overlooking the Mediterranean. Baron Rothschild\'s financial support was critical.' },
  { id:'m4',  year:1878, period:'Pioneers',    place:'Petach Tikva',         heb:'פתח תקווה',      lat:32.087, lng:34.888, desc:'First attempt at modern Jewish agricultural settlement in the Land of Israel, founded by Orthodox Jews from Jerusalem on the site of ancient Gei HaArayot — mentioned in Shoftim.',  persons:['Jerusalem Pioneers'], source:'Founded 1878, abandoned due to malaria, refounded 1882. Called "Mother of the Moshavot." Hosea 2:17: "I will give her the Valley of Achor as a door of hope (petach tikva)."' },
  { id:'m5',  year:1890, period:'First Aliyah', place:'Rehovot',             heb:'רחובות',         lat:31.894, lng:34.812, desc:'Founded by independent settlers without Rothschild support — named for Bereishit 26:22, when Yitzchak finally found a well without dispute: "Now Hashem has made room for us."',  persons:['Independent Settlers'], source:'Founded 1890. Yitzchak Leib Goldberg led the founders. The independence from Rothschild set it apart from other moshavot.' },

  // ── SECOND ALIYAH 1904–1914 ──
  { id:'m6',  year:1904, period:'Second Aliyah', place:'Jaffa — Port Arrival', heb:'יפו',           lat:32.051, lng:34.751, desc:'David Ben-Gurion and thousands of Second Aliyah pioneers arrive at Jaffa port fleeing pogroms in Russia and Poland, beginning the labor Zionist transformation of the Yishuv.',  persons:['Ben-Gurion','Second Aliyah Pioneers'], source:'Ben-Gurion arrived 1906. The Second Aliyah (1904–1914) brought ~35,000 pioneers, most from Russia after the Kishinev pogrom and failed 1905 revolution.' },
  { id:'m7',  year:1909, period:'Second Aliyah', place:'Tel Aviv',            heb:'תל אביב',        lat:32.087, lng:34.789, desc:'66 Jewish families gather on the sand dunes north of Jaffa to hold a lottery for plots of a new Hebrew city — the first modern all-Jewish city in the world. Named Tel Aviv for Herzl\'s novel Altneuland.',  persons:['Meir Dizengoff','Akiva Aryeh Weiss'], source:'April 11, 1909. The famous photograph of families standing in the sand with numbered shells. Tel Aviv means "Hill of Spring" — Ezekiel 3:15.' },
  { id:'m8',  year:1909, period:'Second Aliyah', place:'Deganya',             heb:'דגניה',          lat:32.707, lng:35.575, desc:'First kibbutz founded at the southern tip of the Kinneret by twelve pioneers — a new form of collective Jewish settlement that would define the Zionist enterprise.',  persons:['Kibbutz Founders'], source:'Founded 1910 (planning began 1909). Sits at the point where the Yarden flows out of the Kinneret — ancient crossroads of the land.' },
  { id:'m9',  year:1907, period:'Second Aliyah', place:'Hashomer — Kfar Tavor',heb:'כפר תבור',     lat:32.686, lng:35.422, desc:'Hashomer (The Watchman) founded — the first Jewish self-defense organization in modern Palestine, established to protect settlements from attacks. Precursor to the Haganah.',  persons:['Bar-Giora','Hashomer Founders'], source:'Founded 1909 formally. Kfar Tavor (near Har Tavor) was a center of early Hashomer activity in the Lower Galilee.' },

  // ── BRITISH MANDATE 1917–1947 ──
  { id:'m10', year:1917, period:'British Mandate', place:'Yerushalayim — British Entry', heb:'ירושלים', lat:31.776, lng:35.229, desc:'General Allenby enters Yerushalayim on foot — refusing to ride as a conqueror — on December 11, 1917. 400 years of Ottoman rule ends. The city is taken without a shot.',  persons:['General Allenby'], source:'December 11, 1917. Allenby dismounted at the Jaffa Gate as a deliberate gesture of humility, contrasting with the Kaiser\'s entry in 1898. The Balfour Declaration had been issued one month earlier.' },
  { id:'m11', year:1920, period:'British Mandate', place:'Tel Chai',           heb:'תל חי',          lat:33.247, lng:35.568, desc:'Tel Chai falls after an Arab attack. Yosef Trumpeldor is mortally wounded defending the northern outpost. His last words — "It is good to die for our country" — become the founding myth of Zionist heroism.',  persons:['Trumpeldor'], source:'March 1, 1920. Tel Chai was an isolated settlement in the Upper Galilee. Trumpeldor\'s death galvanized the Yishuv and led to the founding of the Haganah.' },
  { id:'m12', year:1921, period:'British Mandate', place:'Haganah — Tel Aviv', heb:'ההגנה',          lat:32.080, lng:34.780, desc:'The Haganah (Defense) founded in Tel Aviv following Arab riots — a clandestine Jewish self-defense organization that would become the core of the IDF.',  persons:['Haganah Founders'], source:'Founded June 1921 after the May Day riots in Jaffa. Operated underground under the British Mandate for 27 years before becoming the IDF in 1948.' },
  { id:'m13', year:1929, period:'British Mandate', place:'Chevron — Massacre', heb:'חברון',          lat:31.532, lng:35.095, desc:'Arab rioters massacre 67 members of the ancient Jewish community of Chevron on August 24, 1929. The survivors are evacuated. The continuous Jewish presence in Chevron since biblical times is broken.',  persons:['Chevron Jewish Community'], source:'August 23-24, 1929. The Chevron massacre was part of the 1929 Palestine riots triggered by disputes over the Kotel. 435 Jews killed across the country. The Chevron community had existed since the time of Avraham.' },
  { id:'m14', year:1936, period:'British Mandate', place:'Tower and Stockade — Nir David', heb:'נִיר דָּוִד', lat:32.488, lng:35.432, desc:'The Tower and Stockade (Homa uMigdal) strategy begins — 57 new Jewish settlements established across Palestine in a single year, each built overnight with a watchtower and stockade to create facts on the ground.',  persons:['Jewish Agency','Haganah'], source:'October 1936 – 1939. The strategy was to establish settlements before the British could prohibit them under the proposed partition. Each settlement was built in a single night by hundreds of workers.' },
  { id:'m15', year:1947, period:'UN Partition',  place:'UN — Partition Plan',  heb:'תוכנית החלוקה', lat:31.700, lng:34.900, desc:'UN Resolution 181 — the Partition Plan — passes on November 29, 1947, dividing Mandatory Palestine into Jewish and Arab states. Jews celebrate in the streets. Arabs reject it.',  persons:['UN General Assembly'], source:'November 29, 1947. Resolution 181 passed 33-13. The Jewish state was to include coastal plain, Galilee, and Negev. Yerushalayim under international administration. Arab states declared war.' },

  // ── WAR OF INDEPENDENCE 1948 ──
  { id:'m16', year:1948, period:'War of Independence', place:'Tel Aviv — Declaration', heb:'תל אביב',  lat:32.066, lng:34.774, desc:'David Ben-Gurion declares the State of Israel at the Tel Aviv Museum on May 14, 1948 — 11 minutes before the British Mandate expires. The first Jewish state in 2,000 years.',  persons:['Ben-Gurion'], source:'May 14, 1948, 4pm. Ben-Gurion read the Declaration of Independence in 17 minutes. The US recognized Israel 11 minutes later. Five Arab armies invaded the following morning.' },
  { id:'m17', year:1948, period:'War of Independence', place:'Gush Etzion',     heb:'גוש עציון',     lat:31.651, lng:35.113, desc:'Gush Etzion falls to Jordanian forces and Arab irregulars on May 13, 1948 — one day before the Declaration of Independence. The last defenders are massacred. The bloc will not return to Israel until 1967.',  persons:['Gush Etzion Defenders'], source:'May 13, 1948. The bloc of four kibbutzim south of Yerushalayim had been under siege since the previous winter. 127 defenders killed after surrender.' },
  { id:'m18', year:1948, period:'War of Independence', place:'Deganya — Syrian Attack', heb:'דגניה',   lat:32.707, lng:35.575, desc:'Syrian tanks reach the gate of Deganya — the first kibbutz. Kibbutz members stop them with Molotov cocktails. The tank at the gate is left as a memorial. The northern front holds.',  persons:['Deganya Defenders','Syrian Army'], source:'May 20, 1948. A Syrian armored column advanced down the eastern shore of the Kinneret. The tank that reached Deganya\'s gate was disabled and remains there today.' },
  { id:'m19', year:1948, period:'War of Independence', place:'Latrun',          heb:'לטרון',          lat:31.840, lng:34.984, desc:'Three IDF attempts to capture the Latrun fortress guarding the road to besieged Yerushalayim fail with heavy casualties. The Burma Road — an alternate route — is carved through the hills instead.',  persons:['IDF','Mickey Marcus'], source:'May-July 1948. Colonel David "Mickey" Marcus was killed at Latrun the night before the first truce. The Burma Road, built in secret, broke the siege of Yerushalayim.' },
  { id:'m20', year:1948, period:'War of Independence', place:'Yerushalayim — Siege', heb:'ירושלים',   lat:31.771, lng:35.231, desc:'Yerushalayim under siege for months — food, water and ammunition rationed. The Jewish Quarter of the Old City falls to the Jordanian Legion on May 28. The Kotel passes to Jordanian control.',  persons:['Jewish Quarter Defenders','Jordanian Legion'], source:'The Jewish Quarter\'s last defenders surrendered May 28, 1948 after a week of intense fighting. Rabbi Mordechai Weingarten led the surrender delegation. 78 synagogues subsequently destroyed.' },
  { id:'m21', year:1948, period:'War of Independence', place:'Eilat — Ink Flag',heb:'אילת',           lat:29.558, lng:34.952, desc:'IDF soldiers reach Eilat on the Red Sea coast on March 10, 1949, raising a hand-drawn ink flag — the War of Independence ends. Israel now stretches from Dan to Eilat.',  persons:['IDF Negev Brigade'], source:'March 10, 1949. The soldiers had no proper flag — they painted one on a sheet with ink. Operation Uvda completed the conquest of the Negev without a battle. The Rhodes Armistice followed.' },

  // ── STATE OF ISRAEL 1948–1966 ──
  { id:'m22', year:1949, period:'State of Israel', place:'Yerushalayim — Capital', heb:'ירושלים',     lat:31.771, lng:35.229, desc:'Yerushalayim declared capital of the State of Israel. The Knesset and government ministries established in the western part of the divided city. The Old City remains under Jordanian control.',  persons:['Ben-Gurion','Knesset'], source:'December 1949. West Yerushalayim became Israel\'s capital despite US and UN pressure to internationalize the city. The Knesset moved from Tel Aviv in 1949.' },
  { id:'m23', year:1950, period:'State of Israel', place:'Law of Return — Knesset', heb:'חוק השבות',  lat:31.775, lng:35.198, desc:'The Law of Return enacted — every Jew has the right to immigrate to Israel. Within three years, the Jewish population doubles as survivors of the Holocaust and Jews from Arab countries arrive.',  persons:['Knesset'], source:'July 5, 1950. The Law of Return is the foundational immigration law of Israel. By 1951, over 600,000 immigrants had arrived — doubling the Jewish population.' },
  { id:'m24', year:1948, period:'State of Israel', place:'Beersheva',           heb:'באר שבע',        lat:31.252, lng:34.791, desc:'Beersheva captured by IDF on October 21, 1948 in Operation Yoav — opening the Negev. The city where Avraham and Yitzchak dug wells and made covenants becomes an Israeli city.',  persons:['IDF','Negev Brigade'], source:'October 21, 1948. The capture of Beersheva fulfilled Ben-Gurion\'s vision of developing the Negev. Avraham\'s well is traditionally identified here — Bereishit 21:31.' },

  // ── SIX DAY WAR 1967 ──
  { id:'m25', year:1967, period:'Six Day War', place:'Sinai — Air Strike',      heb:'סיני',           lat:30.500, lng:33.500, desc:'June 5, 1967 — 7:45am: Israeli Air Force destroys Egyptian air force on the ground in three hours, achieving total air superiority. The Six Day War begins. The wilderness of the Exodus is the first battlefield.',  persons:['IAF','Motti Hod'], source:'Operation Focus (Moked). 197 aircraft destroyed in the first wave. By end of day 1, Egypt, Jordan and Syria had lost 400 aircraft. Israel had lost 19. The war was decided in the first morning.' },
  { id:'m26', year:1967, period:'Six Day War', place:'Yerushalayim — Kotel',    heb:'הכותל המערבי',  lat:31.776, lng:35.234, desc:'June 7, 1967 — Israeli paratroopers reach the Western Wall. Rabbi Shlomo Goren blows the shofar. General Mordechai Gur radios: "The Temple Mount is in our hands." The first time Jews can pray at the Kotel since 1948.',  persons:['Motta Gur','Rabbi Goren','55th Paratroop Brigade'], source:'"Har HaBayit BeYadeinu" — June 7, 1967. The paratroopers were mostly secular kibbutzniks. Their tears at the Wall became one of the defining images of the 20th century.' },
  { id:'m27', year:1967, period:'Six Day War', place:'Chevron — 1967',          heb:'חברון',          lat:31.532, lng:35.096, desc:'June 7, 1967 — Israeli forces enter Chevron without resistance. Jewish soldiers touch the walls of Marat HaMachpela for the first time since 1929. The tomb of Avraham, Yitzchak and Yaakov returns to Jewish access.',  persons:['IDF Paratroopers'], source:'Taken June 7 by the 55th Paratroop Brigade. The local Arab population did not resist. Within a year, Rabbi Moshe Levinger led a Passover Seder at the Park Hotel — the first step of Jewish return to Chevron.' },
  { id:'m28', year:1967, period:'Six Day War', place:'Shchem — Nablus',         heb:'שכם',            lat:32.220, lng:35.260, desc:'June 7, 1967 — Shchem (Nablus) taken by IDF. The city where Avraham first entered Canaan, where Yaakov bought land, where Yosef was buried — returns to Israeli control for the first time since 1948.',  persons:['IDF'], source:'Avraham\'s first stop in Canaan was Shechem — Bereishit 12:6. Yaakov bought the field there — Bereishit 33:19. Yosef\'s bones are buried there — Yehoshua 24:32.' },
  { id:'m29', year:1967, period:'Six Day War', place:'Yericho — 1967',          heb:'יריחו',           lat:31.871, lng:35.444, desc:'June 7, 1967 — Yericho captured without resistance. The first city conquered by Yehoshua 3,200 years earlier falls again to Israeli forces within hours of the campaign beginning.',  persons:['IDF'], source:'Yehoshua 6 — the walls fell to shofar blasts. In 1967, the city fell without a shot. King Hussein had ordered Jordanian forces to withdraw westward.' },
  { id:'m30', year:1967, period:'Six Day War', place:'Golan Heights',           heb:'רמת הגולן',      lat:32.900, lng:35.750, desc:'June 9-10, 1967 — Israel captures the Golan Heights from Syria in a two-day assault up fortified escarpments. The ancient Bashan, where Og\'s kingdom stood, becomes Israeli-controlled territory.',  persons:['IDF Northern Command','David Elazar'], source:'The Golan assault was the most costly of the war — heavily fortified Syrian positions on steep terrain. 115 Israeli soldiers killed in two days. The ancient road from the Galilee to Damascus passed through here.' },
  { id:'m31', year:1967, period:'Six Day War', place:'Gaza — 1967',             heb:'עזה',             lat:31.507, lng:34.467, desc:'June 5-6, 1967 — Gaza Strip captured by IDF. Ancient territory of the Pelishtim, home of Shimshon\'s battles and death, the city where Avimelechs ruled — passes from Egyptian to Israeli control.',  persons:['IDF Southern Command'], source:'Shimshon\'s territory — Shoftim 13-16. The Gaza Strip had been under Egyptian administration since 1948. The ancient city of Aza appears dozens of times in Tanach.' },
  { id:'m32', year:1967, period:'Six Day War', place:'Sinai — Suez Canal',      heb:'תעלת סואץ',      lat:30.600, lng:32.350, desc:'June 8, 1967 — IDF reaches the Suez Canal. Israel now controls the entire Sinai Peninsula — the wilderness through which the Exodus travelled, from the Reed Sea to Kadesh Barnea.',  persons:['IDF Southern Command','Ariel Sharon'], source:'The Sinai campaign was completed in four days. 100 miles of wilderness traversed. Israel controlled 3x its pre-war territory. The Exodus route — through this very desert — is referenced throughout Tanach.' }
];


// ── MODERN ERA STATE & FUNCTIONS ─────────────────────────────

// ── TALMUDIC ERA DATA 70–500 CE ───────────────────────────────
var TALMUDIC_EVENTS = [
  { id:"t1",  year:66,  period:"Great Revolt",        place:"Masada — Sicarii Seizure",        heb:"מצדה",         lat:31.316, lng:35.354, desc:"Sicarii zealots seize the desert fortress of Masada from its Roman garrison — the opening act of the Great Revolt against Rome.",                                                                                   persons:["Sicarii","Menahem ben Yehuda"],    source:"Josephus, Wars 2:17. Masada had been fortified by Herod with enormous storehouses. Its capture gave the rebels a nearly impregnable base." },
  { id:"t2",  year:66,  period:"Great Revolt",        place:"Yerushalayim — Revolt Begins",    heb:"ירושלים",       lat:31.771, lng:35.231, desc:"The Great Revolt against Rome begins in Yerushalayim. Eleazar ben Ananias stops the daily Temple sacrifice for the Emperor. Roman troops are besieged and massacred.",                                               persons:["Eleazar ben Ananias","Cestius Gallus"], source:"Josephus, Wars 2:14-17. The cessation of sacrifice for Caesar was the point of no return. The Roman legate Cestius Gallus was repulsed at Beit Choron." },
  { id:"t3",  year:67,  period:"Great Revolt",        place:"Yodfat — Siege",                  heb:"יודפת",         lat:32.847, lng:35.302, desc:"Yosef ben Matityahu (Josephus) commands the defense of Yodfat in the Galilee. After 47 days the city falls to Vespasian. Josephus surrenders and predicts Vespasian will become Emperor.",                        persons:["Josephus","Vespasian"],            source:"Josephus, Wars 3:7-8. Josephus survived by surrendering. His prophecy about Vespasian secured his life and gave him the position to write his histories." },
  { id:"t4",  year:68,  period:"Great Revolt",        place:"Gamla — Battle",                  heb:"גמלא",          lat:32.888, lng:35.757, desc:"Roman forces storm Gamla on the Golan Heights — the Masada of the North. The city falls with enormous casualties. Those not killed in battle leap from the cliffs.",                                               persons:["Vespasian","Gamla Defenders"],     source:"Josephus, Wars 4:1. Gamla — camel in Aramaic for its hump shape — was a natural fortress on the Golan escarpment. Archaeological excavations have confirmed the battle." },
  { id:"t5",  year:70,  period:"Destruction",         place:"Yerushalayim — Siege",            heb:"ירושלים",       lat:31.776, lng:35.229, desc:"Titus besieges Yerushalayim. Famine inside. The three walls are breached one by one. The Antonia fortress falls. The city is surrounded.",                                                                        persons:["Titus","Jewish Defenders"],        source:"Josephus, Wars 5-6. The siege lasted five months. Josephus describes famine so severe that mothers ate their children. An estimated 1.1 million died." },
  { id:"t6",  year:70,  period:"Destruction",         place:"Beit HaMikdash — Destruction",   heb:"בית המקדש",    lat:31.778, lng:35.235, desc:"The Second Temple is destroyed on 9 Av, 70 CE — the same date as the First Temple destruction. Titus enters the Holy of Holies. The Menorah, the Shulchan, and the trumpets are taken to Rome.",                    persons:["Titus","Kohanim"],                 source:"Josephus, Wars 6:4. The Talmud records that the Romans planned to desecrate the Temple but fire broke out beyond their control. The date — 9 Av — becomes the great fast." },
  { id:"t7",  year:70,  period:"Destruction",         place:"Arch of Titus — Rome",            heb:"שער טיטוס",     lat:41.890, lng:12.490, desc:"The Arch of Titus in Rome depicts the Menorah and Temple vessels being carried in triumph — the most vivid archaeological record of the Temple destruction. Jews traditionally do not walk under it.",               persons:["Titus","Roman Senate"],            source:"Erected c. 82 CE. The menorah relief is the primary visual evidence for the Temple Menorah appearance. Yeshiva University digitally restored the original colours." },
  { id:"t8",  year:73,  period:"Destruction",         place:"Masada — Last Stand",             heb:"מצדה",          lat:31.316, lng:35.354, desc:"After a three-year siege the Roman X Legion breaches Masada walls. The 960 Sicarii defenders choose death over slavery. Eleazar ben Yair delivers his final speech: we were the first to revolt, we shall be the last to submit.", persons:["Eleazar ben Yair","Roman Legion X"], source:"Josephus, Wars 7:8-9. The historicity of the mass suicide is debated by scholars, but the siege ramp is clearly visible today." },
  { id:"t9",  year:70,  period:"Yavneh",              place:"Yavneh — Sanhedrin Reconvenes",   heb:"יבנה",          lat:31.878, lng:34.741, desc:"Rabban Yochanan ben Zakkai escapes besieged Yerushalayim in a coffin and obtains from Vespasian: Give me Yavneh and its sages. The Sanhedrin reconvenes. Judaism transforms from Temple to Torah.",                 persons:["Rabban Yochanan ben Zakkai","Vespasian"], source:"Gittin 56a. The famous escape is perhaps the most consequential act of Jewish leadership in history. Yavneh became the new center — prayer replaced sacrifice, rabbis replaced priests." },
  { id:"t10", year:90,  period:"Yavneh",              place:"Yavneh — Canonization of Tanach", heb:"יבנה",          lat:31.878, lng:34.741, desc:"The rabbis at Yavneh debate and confirm the canon of Tanach — including the status of Kohelet and Shir HaShirim. The Academy of Yavneh produces foundational halachic rulings that shape all subsequent Judaism.",    persons:["Rabbi Akiva","Rabbi Eliezer","Rabbi Yehoshua"], source:"Yadayim 3:5. Rabbi Akiva defended the holiness of Shir HaShirim. The Yavneh discussions are preserved in the Mishna." },
  { id:"t11", year:95,  period:"Yavneh",              place:"Rome — Rabbinic Delegation",      heb:"רומא",          lat:41.900, lng:12.500, desc:"Rabbi Akiva travels to Rome as part of a rabbinic delegation with Rabban Gamliel, Rabbi Eliezer, and Rabbi Yehoshua. Their encounter with Rome becomes the setting for famous Talmudic stories.",                 persons:["Rabbi Akiva","Rabban Gamliel"],     source:"Makkot 24b. The famous story of the four who entered Pardes. Also the rabbis laughing at ruins of Rome while weeping at ruins of Jerusalem — and Akiva reversing." },
  { id:"t12", year:115, period:"Yavneh",              place:"Alexandria — Diaspora Revolt",    heb:"אלכסנדריה",     lat:31.200, lng:29.920, desc:"The Kitos War — a massive Jewish revolt erupts across Egypt, Cyrene, and Cyprus. The Jewish community of Alexandria, once the largest in the world, is effectively destroyed.",                                          persons:["Lukuas-Andreas","Trajan"],         source:"Eusebius, Ecclesiastical History 4:2. The revolt was suppressed by General Lusius Quietus. The Alexandrian Jewish community never recovered." },
  { id:"t13", year:132, period:"Bar Kochba",          place:"Judean Hills — Revolt Begins",    heb:"יהודה",         lat:31.700, lng:35.050, desc:"Shimon Bar Kochba launches the last great Jewish revolt against Rome. Rabbi Akiva declares him the Messiah. The revolt initially succeeds — Yerushalayim may have been briefly recaptured.",                              persons:["Bar Kochba","Rabbi Akiva"],         source:"Yerushalmi Taanit 4:5. Rabbi Akiva applied Numbers 24:17 to Bar Kochba. Rabbi Yochanan ben Torta responded: Akiva, grass will grow from your cheeks before the son of David comes." },
  { id:"t14", year:132, period:"Bar Kochba",          place:"Beitar — Headquarters",           heb:"ביתר",          lat:31.697, lng:35.108, desc:"Beitar (modern Battir) serves as Bar Kochba headquarters and last fortress — a massive settlement on a ridge southwest of Yerushalayim, controlling the road to the coast.",                                         persons:["Bar Kochba","Roman Legions"],      source:"Gittin 57a. The Bar Kochba letters found at Nahal Hever address letters to Shimon bar Kosiba — Bar Kochba real name — at Beitar." },
  { id:"t15", year:132, period:"Bar Kochba",          place:"Nahal Hever — Dead Sea Caves",    heb:"נחל חבר",       lat:31.380, lng:35.370, desc:"Jewish refugees hide in desert caves above Nahal Hever near Ein Gedi. The Bar Kochba letters — actual documents from the revolt leader — are found here in 1960, along with the bones of those who never emerged.",      persons:["Bar Kochba","Refugees"],           source:"Discovered by Yigael Yadin, 1960-61. The Cave of Letters contained 15 letters from Bar Kochba, legal documents, and the remains of those who fled. A woman named Babatha hid her legal archive here." },
  { id:"t16", year:135, period:"Bar Kochba",          place:"Beitar — Falls",                  heb:"ביתר",          lat:31.697, lng:35.108, desc:"Beitar falls to Roman forces on 9 Av, 135 CE — the same date as the two Temple destructions. Bar Kochba is killed. Rabbi Akiva is arrested and executed. Judea is renamed Syria Palaestina.",                            persons:["Bar Kochba","Hadrian","Rabbi Akiva"], source:"Gittin 57b. The slain of Beitar were so numerous that the Romans did not give them burial. The Talmud adds a fourth blessing to Birkat HaMazon in their memory." },
  { id:"t17", year:135, period:"Bar Kochba",          place:"Caesarea — Rabbi Akiva Death",    heb:"קיסריה",        lat:32.500, lng:34.900, desc:"Rabbi Akiva is executed in Caesarea by the Romans — his flesh combed with iron combs. His last words are the Shema. His students — the Ten Martyrs — become the centerpiece of Yom Kippur liturgy.",                      persons:["Rabbi Akiva"],                     source:"Berakhot 61b. When they took Rabbi Akiva out to be executed it was time for Kri'at Shema. They were tearing his flesh with iron combs and he was accepting upon himself the yoke of Heaven." },
  { id:"t18", year:140, period:"Sanhedrin Wandering", place:"Usha — Sanhedrin Reconvenes",     heb:"אושא",          lat:32.756, lng:35.076, desc:"The Sanhedrin reconvenes at Usha in the western Galilee after the Bar Kochba devastation. The rabbis of the next generation — the Tannaim — gather to rebuild Torah life.",                                                persons:["Rabbi Shimon bar Yochai","Rabbi Yehuda bar Ilai"], source:"Rosh Hashana 31a — the ten stations of the Sanhedrin. Usha is the first Galilean station after Yavneh." },
  { id:"t19", year:150, period:"Sanhedrin Wandering", place:"Beit Shearim — Academy",         heb:"בית שערים",     lat:32.702, lng:35.133, desc:"Beit She'arim becomes a major center of Torah learning and the burial place of Rabbi Yehuda HaNasi. The catacombs here are one of the finest examples of Jewish art from antiquity.",                                        persons:["Rabbi Yehuda HaNasi","Rabban Shimon ben Gamliel"], source:"The Beit She'arim necropolis is a UNESCO World Heritage Site. Over 30 catacombs with inscriptions in Hebrew, Aramaic, and Greek." },

// ── TALMUDIC ERA STATE & FUNCTIONS ───────────────────────────
var showTalmudic = false;
var talmudicMarkers = [];
var talmudicCluster = null;
var activeTalmudicId = null;

var TALMUDIC_COLORS = {
  'Great Revolt':       '#7a3a2a',
  'Destruction':        '#6a2a1a',
  'Yavneh':             '#5a6a3a',
  'Bar Kochba':         '#7a4a2a',
  'Sanhedrin Wandering':'#4a5a7a',
  'Mishna & Talmud':    '#5a4a7a'
};

function getTalmudicColor(period) { return TALMUDIC_COLORS[period] || '#5a5a7a'; }

function toggleTalmudicEra() {
  showTalmudic = !showTalmudic;
  document.getElementById('era-talmudic-btn').className = 'pill-btn' + (showTalmudic ? ' era-on' : '');
  if (showTalmudic) renderTalmudicOverlay();
  else clearTalmudicOverlay();
  updateLegend();
  if (activeId !== null) {
    var activeEv = events.find(function(e) { return e.id === activeId; });
    if (activeEv) refreshPlaceTab(activeEv);
  }
}

function clearTalmudicOverlay() {
  if (talmudicCluster) { map.removeLayer(talmudicCluster); talmudicCluster = null; }
  talmudicMarkers.forEach(function(m) { if (map.hasLayer(m)) map.removeLayer(m); });
  talmudicMarkers = [];
  var list = document.getElementById('event-list');
  list.querySelectorAll('.talmudic-item').forEach(function(el) { el.remove(); });
  var thdr = document.getElementById('talmudic-sidebar-hdr');
  if (thdr) thdr.remove();
  document.querySelectorAll('.talmudic-item').forEach(function(el) { el.remove(); });
  activeTalmudicId = null;
}

function renderTalmudicOverlay() {
  clearTalmudicOverlay();
  var bounds = getMapPaddedBounds(1.0);
  var visible = TALMUDIC_EVENTS.filter(function(ev) { return inBounds(ev.lat, ev.lng, bounds); });
  if (visible.length === 0) { addTalmudicToSidebar(visible); return; }
  talmudicCluster = L.markerClusterGroup({
    maxClusterRadius: 35, showCoverageOnHover: false,
    iconCreateFunction: function(cluster) {
      return L.divIcon({
        html: '<div style="background:rgba(40,20,10,0.92);border:2px solid #9a7a5a;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:10px;font-weight:bold;color:#d4b890;box-shadow:0 2px 8px rgba(0,0,0,0.5);">' + cluster.getChildCount() + '</div>',
        className:'', iconSize:[30,30], iconAnchor:[15,15]
      });
    }
  });
  visible.forEach(function(ev) {
    var color = getTalmudicColor(ev.period);
    var m = L.circleMarker([ev.lat, ev.lng], { radius:7, color:'#d4c090', weight:1.5, fillColor:color, fillOpacity:0.9 });
    m.bindPopup(
      '<div class="pop-era">' + ev.period + ' · ' + ev.year + ' CE</div>' +
      '<div class="pop-place">' + ev.place + (ev.heb ? ' · ' + ev.heb : '') + '</div>' +
      '<div class="pop-desc">' + ev.desc + '</div>'

    m.on('click', function() { selectTalmudicEvent(ev.id); });
    talmudicMarkers.push(m);
    talmudicCluster.addLayer(m);
  });
  map.addLayer(talmudicCluster);
  addTalmudicToSidebar(visible);
}
function addTalmudicToSidebar(visible) {
  visible = visible || TALMUDIC_EVENTS;
  var list = document.getElementById('event-list');
  var hdr = document.createElement('div');
  hdr.id = 'talmudic-sidebar-hdr';
  hdr.className = 'talmudic-item';
  hdr.style.cssText = 'background:#1a1008;padding:8px 14px;border-bottom:1px solid rgba(154,122,90,0.3);border-top:2px solid #6a4a2a;';
  hdr.innerHTML = '<div style="font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#7a5a3a;">Talmudic Era · 70–500 CE</div><div style="font-size:9px;color:#3a2a10;margin-top:2px;">' + visible.length + ' events in view</div>';
  list.appendChild(hdr);

  var periods = []; var byPeriod = {};
  visible.forEach(function(ev) {
    if (periods.indexOf(ev.period) < 0) periods.push(ev.period);
    if (!byPeriod[ev.period]) byPeriod[ev.period] = [];
    byPeriod[ev.period].push(ev);
  });

  periods.forEach(function(period) {
    var evs = byPeriod[period];
    var color = getTalmudicColor(period);
    var grpHdr = document.createElement('div');
    grpHdr.className = 'talmudic-item ch-group-hdr';
    grpHdr.style.borderLeft = '3px solid ' + color;
    grpHdr.innerHTML = '<span class="ch-group-hdr-title">' + period + '</span><span class="ch-group-hdr-meta">' + evs.length + ' events</span><span class="ch-group-hdr-arrow">▶</span>';
    grpHdr.onclick = function() { grpHdr.classList.toggle('open'); };
    var grpBody = document.createElement('div');
    grpBody.className = 'talmudic-item ch-group-body';

    evs.forEach(function(ev) {
      var nearbyTanach = findNearbyTanachForEra(ev.lat, ev.lng);
      var d = document.createElement('div');
      d.className = 'ev-item talmudic-item';
      d.id = 'item-' + ev.id;
      var tabHTML = '';
      if (nearbyTanach.length > 0) {
        var eid = ev.id;
        tabHTML = '<div class="pat-toggle">' +
          '<button class="pat-tab active" id="tab-ev-' + eid + '" onclick="switchTab(' + JSON.stringify(eid) + ',\'ev\')">This Event</button>' +
          '<button class="pat-tab" id="tab-place-' + eid + '" onclick="switchTab(' + JSON.stringify(eid) + ',\'place\')">In Tanach (' + nearbyTanach.length + ')</button>' +
          '</div>';
      }
      var tanachRows = nearbyTanach.map(function(ne) {
        return '<div class="pat-event" onclick="jumpToPlace(' + ne.chapterNum + ',' + ne.eventId + ')">' +
          '<div class="pat-ch"><span class="pat-ch-dot" style="background:' + ne.color + '"></span>' + ne.book + ' Ch ' + ne.chapterNum + ' · ' + ne.verse + '</div>' +
          '<div class="pat-place">' + ne.place + '</div>' +
          '<div class="pat-d">' + ne.desc.substring(0,80) + '…</div></div>';
      }).join('');
      d.innerHTML =
        '<div class="ev-summary"><div class="ev-v">' + ev.year + ' CE · ' + ev.period + '</div>' +
        '<div class="ev-p">' + ev.place + (ev.heb ? ' <span class="ev-ph">' + ev.heb + '</span>' : '') + '</div>' +
        '<div class="ev-who" style="color:#7a5a3a;">' + (ev.persons||[]).join(', ') + '</div></div>' +
        '<div class="ev-detail">' + tabHTML +
          '<div class="pat-panel active" id="panel-ev-' + ev.id + '"><div class="ev-desc-text">' + ev.desc + '</div>' +
          (ev.source ? '<div class="ev-source-text">' + ev.source + '</div>' : '') + '</div>' +
          '<div class="pat-panel" id="panel-place-' + ev.id + '">' + (tanachRows || '<div class="pat-none">No Tanach events within 1km.</div>') + '</div>' +
        '</div>';
      d.querySelector('.ev-summary').onclick = function() {
        if (activeTalmudicId === ev.id) deselectTalmudicEvent();
        else selectTalmudicEvent(ev.id);
      };
      grpBody.appendChild(d);
    });
    list.appendChild(grpHdr);
    list.appendChild(grpBody);
  });

function selectTalmudicEvent(id) {
  if (activeTalmudicId !== null) {
    var pi = document.getElementById('item-' + activeTalmudicId);
    if (pi) pi.classList.remove('active');
  }
  if (activeId !== null) deselectEvent();
  if (activeModernId !== null) deselectModernEvent();
  activeTalmudicId = id;
  var item = document.getElementById('item-' + id);
  if (item) {
    item.classList.add('active');
    item.scrollIntoView({ behavior:'smooth', block:'nearest' });
    openDrawerIfMobile();
  }
  var ev = TALMUDIC_EVENTS.find(function(e) { return e.id === id; });
  if (ev) map.flyTo([ev.lat, ev.lng], 13, { duration:1.1 });
}

function deselectTalmudicEvent() {
  if (activeTalmudicId === null) return;
  var item = document.getElementById('item-' + activeTalmudicId);
  if (item) item.classList.remove('active');
  activeTalmudicId = null;
}

function getMapPaddedBounds(padDeg) {
  // Returns map bounds expanded by padDeg degrees in each direction
  var b = map.getBounds();
  var pad = padDeg || 1.5;
  return {
    minLat: b.getSouth() - pad, maxLat: b.getNorth() + pad,
    minLng: b.getWest()  - pad, maxLng: b.getEast()  + pad
  };
}

function inBounds(lat, lng, bounds) {
  return lat >= bounds.minLat && lat <= bounds.maxLat &&
         lng >= bounds.minLng && lng <= bounds.maxLng;
}

function findNearbyTanachForModern(lat, lng) {
  var results = [];
  ['bereishit','shemot','vayikra','bamidbar','devarim','yehoshua','shmuel1','shmuel2'].forEach(function(bookKey) {
    BOOKS[bookKey].chapters.forEach(function(ch) {
      var key = ch.key || (bookKey + '_' + ch.num);
      var data = CHAPTERS[key];
      if (!data) return;
      data.forEach(function(ev, i) {
        if (haversineKm(lat, lng, ev.lat, ev.lng) <= PROXIMITY_KM) {
          results.push({
            book: {bereishit:'Bereishit',shemot:'Shemot',vayikra:'Vayikra',
                    bamidbar:'Bamidbar',devarim:'Devarim',
                    yehoshua:'Yehoshua',shmuel1:'Shmuel I',shmuel2:'Shmuel II'}[bookKey] || bookKey,
            chapterNum: ch.num, verse: ev.verse, place: ev.place,
            desc: ev.desc, eventId: ch.num * 100 + i + 1,
            color: (bookKey === 'shmuel2' ? CHAPTER_COLORS_S2 : CHAPTER_COLORS)[ch.num] || '#8a7a5a'
          });
        }
      });
    });
  });
  return results.sort(function(a,b) { return a.chapterNum - b.chapterNum; });
}

function findNearbyModern(lat, lng) {
  if (!showModern) return [];
  return MODERN_EVENTS.filter(function(ev) {
    return haversineKm(lat, lng, ev.lat, ev.lng) <= PROXIMITY_KM;
  }).sort(function(a,b) { return a.year - b.year; });
}

  // Also deselect any tanach event
  if (activeId !== null) deselectEvent();
  activeModernId = id;
  var item = document.getElementById('item-' + id);
  if (item) {
    item.classList.add('active');
    item.scrollIntoView({ behavior:'smooth', block:'nearest' });
    openDrawerIfMobile();
  }
  var ev = MODERN_EVENTS.find(function(e) { return e.id === id; });
  if (ev) map.flyTo([ev.lat, ev.lng], 13, { duration:1.1 });
}

function deselectModernEvent() {
  if (activeModernId === null) return;
  var item = document.getElementById('item-' + activeModernId);
  if (item) item.classList.remove('active');
  activeModernId = null;
}

function getBookChapterColor(bookKey, chNum) {
  if (bookKey === 'shmuel2') return CHAPTER_COLORS_S2[chNum] || '#8a7a5a';
  if (bookKey === 'shmuel1') return CHAPTER_COLORS[chNum]    || '#8a7a5a';
  if (bookKey === 'bereishit') {
    if (chNum <= 11) return '#5a4a7a'; // primeval — purple
    if (chNum <= 25) return '#8a5a2a'; // Avraham — warm brown
    if (chNum <= 36) return '#7a4a3a'; // Yitzchak/Yaakov — terracotta
    return '#6a5a2a';                  // Yaakov's sons — olive
  }
  if (bookKey === 'shemot') {
    if (chNum <= 6)  return '#8a3a2a'; // Egypt / slavery
    if (chNum <= 14) return '#7a2a2a'; // Plagues / Exodus
    if (chNum <= 20) return '#c8962a'; // Sinai / Torah
    return '#6a5a3a';                  // Mishkan / aftermath
  }
  if (bookKey === 'yehoshua') {
    if (chNum <= 8)  return '#c8962a'; // Crossing / first battles
    if (chNum <= 12) return '#4a7a2a'; // Conquest campaigns
    if (chNum <= 21) return '#3a6a4a'; // Tribal allotments
    return '#5a7a9a';                  // Farewell / covenant
  }
  // Vayikra, Bamidbar, Devarim
  if (chNum <= 10) return '#5a6a3a';
  if (chNum <= 20) return '#8b3a3a';
  return '#4a5a7a';
}

function hebrewNumeral(n) {
  var nums = ['','א','ב','ג','ד','ה','ו','ז','ח','ט','י',
    'יא','יב','יג','יד','טו','טז','יז','יח','יט','כ',
    'כא','כב','כג','כד','כה','כו','כז','כח','כט','ל','לא',
    'לב','לג','לד','לה','לו','לז','לח','לח','לט','מ',
    'מא','מב','מג','מד','מה','מו','מז','מח','מט','נ'];
  return nums[n] || String(n);
}

function haversineKm(la1, lo1, la2, lo2) {
  var R = 6371, dL = (la2-la1)*Math.PI/180, dO = (lo2-lo1)*Math.PI/180;
  var a = Math.sin(dL/2)*Math.sin(dL/2) +
          Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)*Math.sin(dO/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── CHAPTER DROPDOWN ─────────────────────────────────────────
function buildChapterDropdown(bookKey) {
  var sel = document.getElementById('ch-sel');
  sel.innerHTML = '';

  var bk = document.getElementById('book-sel').value;
  currentBook = bk;
  buildChapterDropdown(bk);

function onChapterChange() {

// ── LOAD CHAPTER ─────────────────────────────────────────────
function loadChapter(bookKey, chNum) {
  var key = bookKey + '_' + chNum;
  var data = CHAPTERS[key];
  if (!data) { alert('Chapter ' + chNum + ' not yet available.'); return; }
  currentBook = bookKey; currentChapter = chNum;
  events = data.map(function(ev, i) {
    var c = JSON.parse(JSON.stringify(ev));
    c.id = i + 1;
    if (!c.color) c.color = getBookChapterColor(bookKey, chNum);
    return c;
  });
  activeId = null;
  renderSidebarChapter();
  renderMapChapter();
  updateHeader();
  updateLegend();
  document.getElementById('ch-sel').value    = chNum;
  document.getElementById('book-sel').value  = bookKey;
  var lls = events.map(function(e) { return [e.lat, e.lng]; });
  if (lls.length) map.fitBounds(L.latLngBounds(lls), { padding: [50,50], maxZoom: 13 });

  // Select pending event if set (from jumpToPlace cross-chapter navigation)
  if (pendingSelectId !== null) {
    var sid = pendingSelectId; pendingSelectId = null;
    selectEvent(sid);
  }
}

function makeEventItem(ev, isBookMode) {
  var nearby    = findNearby(ev.lat, ev.lng, ev.id);
  var nearbyMod = findNearbyModern(ev.lat, ev.lng);
  var nearbyTal = findNearbyTalmudic(ev.lat, ev.lng);
  var totalNearby = nearby.length + nearbyMod.length + nearbyTal.length;
  var d = document.createElement('div');
  d.className = 'ev-item';
  d.id = 'item-' + ev.id;
  // Summary row
  var sum = document.createElement('div');
  sum.className = 'ev-summary';
  sum.innerHTML =
    '<div class="ev-v">' + (isBookMode ? 'Ch ' + ev.chapterNum + ' · ' : '') + ev.verse + '</div>' +
    '<div class="ev-p">' + ev.place +
      (ev.heb ? ' <span class="ev-ph">' + ev.heb + '</span>' : '') + '</div>' +
    '<div class="ev-who">' + (ev.persons || []).join(', ') + '</div>';
  sum.onclick = function() {
    if (activeId === ev.id) { deselectEvent(); } else { selectEvent(ev.id); }
  };
  // Detail (hidden until active)
  var det = document.createElement('div');
  det.className = 'ev-detail';
  // Tabs: show place tab if nearby tanach OR modern events
  var tabHTML = '';
  if (totalNearby > 1 || nearbyMod.length > 0 || nearbyTal.length > 0) {
    var placeCount = (nearby.length > 1 ? nearby.length - 1 : 0) + nearbyMod.length;
    var placeLabel = placeCount > 0 ? 'This Place (' + (nearby.length + nearbyMod.length + nearbyTal.length) + ')' : 'This Place';
    tabHTML =
      '<div class="pat-toggle">' +
        '<button class="pat-tab active" id="tab-ev-' + ev.id + '" onclick="switchTab(' + ev.id + ',\'ev\')">This Event</button>' +
        '<button class="pat-tab" id="tab-place-' + ev.id + '" onclick="switchTab(' + ev.id + ',\'place\')">' + placeLabel + '</button>' +
      '</div>';
  }
  var evPanel =
    '<div class="pat-panel active" id="panel-ev-' + ev.id + '">' +
      '<div class="ev-desc-text">' + ev.desc + '</div>' +
      (ev.source ? '<div class="ev-source-text">' + ev.source + '</div>' : '') +
    '</div>';
  var placeRows = nearby.map(function(ne) {
    var isCurrent = (ne.eventId === ev.id || (ne.chapterNum === (ev.chapterNum || currentChapter) && ne.verse === ev.verse));
    return '<div class="pat-event' + (isCurrent ? ' current' : '') + '" onclick="' +
      (isCurrent ? '' : 'jumpToPlace(' + ne.chapterNum + ',' + ne.eventId + ')') + '">' +
      '<div class="pat-ch">' +
        '<span class="pat-ch-dot" style="background:' + (CHAPTER_COLORS[ne.chapterNum] || '#8a7a5a') + '"></span>' +
        'Ch ' + ne.chapterNum + ' · ' + ne.verse +
      '</div>' +
      '<div class="pat-place">' + ne.place + '</div>' +
      '<div class="pat-d">' + ne.desc.substring(0, 90) + '…</div>' +
    '</div>';
  }).join('');
  // Add modern rows if era is on
  var modernRows = nearbyMod.map(function(me) {
    return '<div class="pat-event" onclick="selectModernEvent(\'' + me.id + '\')" style="border-left:2px solid ' + getModernColor(me.period) + ';padding-left:8px;">' +
      '<div class="pat-ch" style="color:#4a7a9a;"><span class="pat-ch-dot" style="background:' + getModernColor(me.period) + '"></span>' + me.year + ' · ' + me.period + '</div>' +
      '<div class="pat-place">' + me.place + '</div>' +
      '<div class="pat-d">' + me.desc.substring(0,90) + '…</div>' +
    '</div>';
  }).join('');
    var talRows = nearbyTal.map(function(te) {
    return '<div class="pat-event" onclick="selectTalmudicEvent(\'' + te.id + '\')" style="border-left:2px solid ' + getTalmudicColor(te.period) + ';padding-left:8px;">' +
      '<div class="pat-ch" style="color:#9a7a5a;"><span class="pat-ch-dot" style="background:' + getTalmudicColor(te.period) + '"></span>' + te.year + ' CE · ' + te.period + '</div>' +
      '<div class="pat-place">' + te.place + '</div>' +
      '<div class="pat-d">' + te.desc.substring(0,90) + '\u2026</div></div>';
  }).join('');
var allRows = placeRows + modernRows;
  var placePanel =
    '<div class="pat-panel" id="panel-place-' + ev.id + '">' +
      (allRows ? allRows : '<div class="pat-none">No other events found nearby.</div>') +
    '</div>';
  det.innerHTML = tabHTML + evPanel + placePanel;
  d.appendChild(sum);
  d.appendChild(det);
  return d;
}

function switchTab(evId, tab) {
  document.getElementById('tab-ev-' + evId).className    = 'pat-tab' + (tab === 'ev'    ? ' active' : '');
  document.getElementById('tab-place-' + evId).className = 'pat-tab' + (tab === 'place' ? ' active' : '');
  document.getElementById('panel-ev-' + evId).className    = 'pat-panel' + (tab === 'ev'    ? ' active' : '');
  document.getElementById('panel-place-' + evId).className = 'pat-panel' + (tab === 'place' ? ' active' : '');
}

function jumpToPlace(chNum, evId) {
  if (currentMode === 'book') {
    // In book mode just select the event directly
    selectEvent(evId);
    return;
  }
  if (chNum === currentChapter) {
    selectEvent(evId);
  } else {
    // Load chapter then select — use pendingSelectId so loadChapter triggers it
    pendingSelectId = evId;
    loadChapter(currentBook, chNum);
  }
}

function renderSidebarBook() {
  resetSearch();

  var allP = [];

  });

function buildBookList() {
  var list = document.getElementById('event-list');
  list.innerHTML = '';
  var book = BOOKS[currentBook];
  var visible = 0;
  book.chapters.forEach(function(ch) {
    var chEvs = events.filter(function(e) { return e.chapterNum === ch.num && bookEventVisible(e); });
    if (!chEvs.length) return;
    visible += chEvs.length;
    var group = document.createElement('div');
    group.className = 'ch-group';
    var hdr = document.createElement('div');
    hdr.className = 'ch-group-hdr';
    hdr.innerHTML =
      '<span class="ch-group-hdr-title" style="border-left:3px solid ' + (CHAPTER_COLORS[ch.num] || '#8a7a5a') + ';padding-left:7px;">' + ch.label + '</span>' +
      '<span class="ch-group-hdr-meta">' + chEvs.length + ' events</span>' +
      '<span class="ch-group-hdr-arrow">▶</span>';
    hdr.onclick = function() { hdr.classList.toggle('open'); };
    var body = document.createElement('div');
    body.className = 'ch-group-body';
    chEvs.forEach(function(ev) { body.appendChild(makeEventItem(ev, true)); });
    group.appendChild(hdr); group.appendChild(body);
    list.appendChild(group);
  });
  document.getElementById('bc-count').textContent = visible + ' of ' + events.length + ' events shown';
  document.getElementById('ev-badge').textContent = visible + ' events';
}

function bookEventVisible(ev) {
  if (bookFilterPerson && (ev.persons || []).indexOf(bookFilterPerson) < 0) return false;
  if (bookFilterTheme  && (ev.themes  || []).indexOf(bookFilterTheme)  < 0) return false;
  if (ev.chapterNum > bookFilterMaxCh) return false;
  return true;
}

function applyBookFilters() {
  bookFilterPerson = document.getElementById('bc-person').value;
  bookFilterTheme  = document.getElementById('bc-theme').value;
  buildBookList();
  applyBookMarkerVisibility();
}

function onRangeInput(el) {
  bookFilterMaxCh = parseInt(el.value);
  var pct = ((bookFilterMaxCh - 1) / 30 * 100).toFixed(1);
  el.style.setProperty('--pct', pct + '%');
  document.getElementById('range-disp').textContent = bookFilterMaxCh;
  document.getElementById('range-end').textContent  = bookFilterMaxCh;
  buildBookList();
  applyBookMarkerVisibility();
}

function applyBookMarkerVisibility() {
  events.forEach(function(ev) {
    var show = bookEventVisible(ev);
    var m = leafletMarkers[ev.id];
    if (!m) return;
    if (clusterGroup) {
      if (show) { if (!clusterGroup.hasLayer(m)) clusterGroup.addLayer(m); }
      else      { if (clusterGroup.hasLayer(m))  clusterGroup.removeLayer(m); }
    }
  });
}

function renderMapBook() {
  clearMap();
  clusterGroup = L.markerClusterGroup({

        className: '', iconSize: [32,32], iconAnchor: [16,16]
      });

  });
