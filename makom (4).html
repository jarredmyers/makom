  var placePanel =
    '<div class="pat-panel" id="panel-place-' + ev.id + '">' +
      (allRows ? allRows : '<div class="pat-none">No other events found nearby.</div>') +
    '</div>';
  det.innerHTML = tabHTML + evPanel + placePanel;
  d.appendChild(sum);
  d.appendChild(det);
  return d;
}

function switchTab(evId, tab) {
  document.getElementById('tab-ev-' + evId).className    = 'pat-tab' + (tab === 'ev'    ? ' active' : '');
  document.getElementById('tab-place-' + evId).className = 'pat-tab' + (tab === 'place' ? ' active' : '');
  document.getElementById('panel-ev-' + evId).className    = 'pat-panel' + (tab === 'ev'    ? ' active' : '');
  document.getElementById('panel-place-' + evId).className = 'pat-panel' + (tab === 'place' ? ' active' : '');
}

function jumpToPlace(chNum, evId) {
  if (chNum === currentChapter && currentMode === 'chapter') {
    selectEvent(evId);
  } else {
    loadChapter(currentBook, chNum);
    // selectEvent after render
    setTimeout(function() { selectEvent(evId); }, 100);
  }
}

// ── RENDER SIDEBAR — BOOK ─────────────────────────────────────
function renderSidebarBook() {
  document.getElementById('sb-ch-hdr').style.display = 'none';
  document.getElementById('sb-book-ctrl').classList.add('on');
  // Populate person dropdown
  var allP = [];
  events.forEach(function(ev) {
    (ev.persons || []).forEach(function(p) { if (allP.indexOf(p) < 0) allP.push(p); });
  });
  var pSel = document.getElementById('bc-person');
  while (pSel.options.length > 1) pSel.remove(1);
  allP.sort().forEach(function(p) {
    var o = document.createElement('option'); o.value = p; o.textContent = p; pSel.appendChild(o);
  });
  buildBookList();
}

function buildBookList() {
  var list = document.getElementById('event-list');
  list.innerHTML = '';
  var book = BOOKS[currentBook];
  var visible = 0;
  book.chapters.forEach(function(ch) {
    var chEvs = events.filter(function(e) { return e.chapterNum === ch.num && bookEventVisible(e); });
    if (!chEvs.length) return;
    visible += chEvs.length;
    var group = document.createElement('div');
    group.className = 'ch-group';
    var hdr = document.createElement('div');
    hdr.className = 'ch-group-hdr';
    hdr.innerHTML =
      '<span class="ch-group-hdr-title" style="border-left:3px solid ' + (CHAPTER_COLORS[ch.num] || '#8a7a5a') + ';padding-left:7px;">' + ch.label + '</span>' +
      '<span class="ch-group-hdr-meta">' + chEvs.length + ' events</span>' +
      '<span class="ch-group-hdr-arrow">▶</span>';
    hdr.onclick = function() { hdr.classList.toggle('open'); };
    var body = document.createElement('div');
    body.className = 'ch-group-body';
    chEvs.forEach(function(ev) { body.appendChild(makeEventItem(ev, true)); });
    group.appendChild(hdr); group.appendChild(body);
    list.appendChild(group);
  });
  document.getElementById('bc-count').textContent = visible + ' of ' + events.length + ' events shown';
  document.getElementById('ev-badge').textContent = visible + ' events';
}

function bookEventVisible(ev) {
  if (bookFilterPerson && (ev.persons || []).indexOf(bookFilterPerson) < 0) return false;
  if (bookFilterTheme  && (ev.themes  || []).indexOf(bookFilterTheme)  < 0) return false;
  if (ev.chapterNum > bookFilterMaxCh) return false;
  return true;
}

function applyBookFilters() {
  bookFilterPerson = document.getElementById('bc-person').value;
  bookFilterTheme  = document.getElementById('bc-theme').value;
  buildBookList();
  applyBookMarkerVisibility();
}

function onRangeInput(el) {
  bookFilterMaxCh = parseInt(el.value);
  var pct = ((bookFilterMaxCh - 1) / 30 * 100).toFixed(1);
  el.style.setProperty('--pct', pct + '%');
  document.getElementById('range-disp').textContent = bookFilterMaxCh;
  document.getElementById('range-end').textContent  = bookFilterMaxCh;
  buildBookList();
  applyBookMarkerVisibility();
}

function applyBookMarkerVisibility() {
  events.forEach(function(ev) {
    var show = bookEventVisible(ev);
    var m = leafletMarkers[ev.id];
    if (!m) return;
    if (clusterGroup) {
      if (show) { if (!clusterGroup.hasLayer(m)) clusterGroup.addLayer(m); }
      else      { if (clusterGroup.hasLayer(m))  clusterGroup.removeLayer(m); }
    }
  });
}

// ── RENDER MAP — CHAPTER ──────────────────────────────────────
function renderMapChapter() {
  clearMap();
  var lls = events.map(function(e) { return [e.lat, e.lng]; });
  pathLine = L.polyline(lls, { color:'#8a6a00', weight:1.5, dashArray:'4,7', opacity:0.5 }).addTo(map);
  events.forEach(function(ev) {
    var m = L.circleMarker([ev.lat, ev.lng], {
      radius: 8, color: '#f5eed8', weight: 2, fillColor: ev.color, fillOpacity: 1
    }).addTo(map);
    m.bindPopup(
      '<div class="pop-place">' + ev.place + (ev.heb ? ' · ' + ev.heb : '') + '</div>' +
      '<div class="pop-verse">' + ev.verse + ' · ' + (ev.persons||[]).join(', ') + '</div>' +
      '<div class="pop-desc">' + ev.desc + '</div>'
    );
    m.on('click', function() { selectEvent(ev.id); });
    leafletMarkers[ev.id] = m;
  });
}

// ── RENDER MAP — BOOK ─────────────────────────────────────────
function renderMapBook() {
  clearMap();
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40, showCoverageOnHover: false,
    iconCreateFunction: function(cluster) {
      return L.divIcon({
        html: '<div style="background:rgba(12,9,3,0.9);border:2px solid #c8962a;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:11px;font-weight:bold;color:#e8c76a;box-shadow:0 2px 8px rgba(0,0,0,0.5);">' + cluster.getChildCount() + '</div>',
        className: '', iconSize: [32,32], iconAnchor: [16,16]
      });
    }
  });
  events.forEach(function(ev) {
    var m = L.circleMarker([ev.lat, ev.lng], {
      radius: 7, color: '#f5eed8', weight: 1.5, fillColor: ev.color, fillOpacity: 0.9
    });
    m.bindPopup(
      '<div class="pop-place">' + ev.place + '</div>' +
      '<div class="pop-verse">Ch.' + ev.chapterNum + ' · ' + ev.verse + '</div>' +
      '<div class="pop-desc">' + ev.desc + '</div>'
    );
    m.on('click', function() { selectEvent(ev.id); });
    leafletMarkers[ev.id] = m;
    clusterGroup.addLayer(m);
  });
  map.addLayer(clusterGroup);
}

function clearMap() {
  if (clusterGroup) { map.removeLayer(clusterGroup); clusterGroup = null; }
  Object.keys(leafletMarkers).forEach(function(k) { map.removeLayer(leafletMarkers[k]); });
  leafletMarkers = {};
  if (pathLine) { map.removeLayer(pathLine); pathLine = null; }
}

// ── DESELECT ─────────────────────────────────────────────────
function deselectEvent() {
  if (activeId === null) return;
  var item = document.getElementById('item-' + activeId);
  if (item) item.classList.remove('active');
  var m = leafletMarkers[activeId];
  if (m) {
    var ev = events.find(function(e) { return e.id === activeId; });
    if (ev) m.setStyle({ radius: currentMode === 'book' ? 7 : 8, color: '#f5eed8', weight: currentMode === 'book' ? 1.5 : 2 });
    m.closePopup();
  }
  activeId = null;
}

// ── SELECT EVENT ─────────────────────────────────────────────
function selectEvent(id) {
  // Deactivate previous
  if (activeId !== null) {
    var pi = document.getElementById('item-' + activeId);
    if (pi) pi.classList.remove('active');
    var pm = leafletMarkers[activeId];
    if (pm) {
      var prevEv = events.find(function(e) { return e.id === activeId; });
      if (prevEv) pm.setStyle({ radius: currentMode === 'book' ? 7 : 8, color: '#f5eed8', weight: currentMode === 'book' ? 1.5 : 2 });
    }
  }
  activeId = id;
  // Activate sidebar item
  var item = document.getElementById('item-' + id);
  if (item) {
    item.classList.add('active');
    if (currentMode === 'book') {
      var grp = item.closest('.ch-group');
      if (grp) { var h = grp.querySelector('.ch-group-hdr'); if (h && !h.classList.contains('open')) h.classList.add('open'); }
    }
    item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    openDrawerIfMobile();
  }
  // Activate marker
  var m = leafletMarkers[id];
  if (m) { m.setStyle({ radius: 11, color: '#e8c76a', weight: 3 }); m.openPopup(); }
  // flyTo
  var ev = events.find(function(e) { return e.id === id; });
  if (ev) {
    map.flyTo([ev.lat, ev.lng], 13, { duration: 1.1 });
    refreshPlaceTab(ev);
  }
}

// ── PLACE ACROSS TIME ────────────────────────────────────────
var PROXIMITY_KM = 1.0;

// Refreshes the place tab on the active sidebar item — called on select
// so it always reflects current era state
function refreshPlaceTab(ev) {
  var item = document.getElementById('item-' + ev.id);
  if (!item) return;
  var det = item.querySelector('.ev-detail');
  if (!det) return;

  var nearby    = findNearby(ev.lat, ev.lng, ev.id);
  var nearbyMod = findNearbyModern(ev.lat, ev.lng);
  var total     = nearby.length + nearbyMod.length;

  // Remove existing toggle + place panel, leave event panel alone
  var existingToggle = det.querySelector('.pat-toggle');
  if (existingToggle) existingToggle.remove();
  var existingPlace = document.getElementById('panel-place-' + ev.id);
  if (existingPlace) existingPlace.remove();

  if (total <= 1 && nearbyMod.length === 0) return; // nothing to show

  var placeLabel = 'This Place (' + (nearby.length + nearbyMod.length) + ')';

  // Re-insert toggle before the event panel
  var evPanel = document.getElementById('panel-ev-' + ev.id);
  var toggleDiv = document.createElement('div');
  toggleDiv.className = 'pat-toggle';
  toggleDiv.innerHTML =
    '<button class="pat-tab active" id="tab-ev-' + ev.id + '" onclick="switchTab(' + ev.id + ',\'ev\')">This Event</button>' +
    '<button class="pat-tab" id="tab-place-' + ev.id + '" onclick="switchTab(' + ev.id + ',\'place\')">' + placeLabel + '</button>';
  det.insertBefore(toggleDiv, evPanel);

  // Build place rows — Tanach
  var tanachRows = nearby.map(function(ne) {
    var isCurrent = (ne.eventId === ev.id || (ne.chapterNum === (ev.chapterNum || currentChapter) && ne.verse === ev.verse));
    return '<div class="pat-event' + (isCurrent ? ' current' : '') + '" onclick="' +
      (isCurrent ? '' : 'jumpToPlace(' + ne.chapterNum + ',' + ne.eventId + ')') + '">' +
      '<div class="pat-ch"><span class="pat-ch-dot" style="background:' + (CHAPTER_COLORS[ne.chapterNum] || '#8a7a5a') + '"></span>Ch ' + ne.chapterNum + ' · ' + ne.verse + '</div>' +
      '<div class="pat-place">' + ne.place + '</div>' +
      '<div class="pat-d">' + ne.desc.substring(0,90) + '…</div></div>';
  }).join('');

  // Build place rows — Modern
  var modernRows = nearbyMod.map(function(me) {
    return '<div class="pat-event" onclick="selectModernEvent(\'' + me.id + '\')" style="border-left:2px solid ' + getModernColor(me.period) + ';padding-left:8px;">' +
      '<div class="pat-ch" style="color:#4a7a9a;"><span class="pat-ch-dot" style="background:' + getModernColor(me.period) + '"></span>' + me.year + ' · ' + me.period + '</div>' +
      '<div class="pat-place">' + me.place + '</div>' +
      '<div class="pat-d">' + me.desc.substring(0,90) + '…</div></div>';
  }).join('');

  var placePanel = document.createElement('div');
  placePanel.className = 'pat-panel';
  placePanel.id = 'panel-place-' + ev.id;
  placePanel.innerHTML = (tanachRows + modernRows) || '<div class="pat-none">No other events found nearby.</div>';
  det.appendChild(placePanel);
}

function findNearby(lat, lng, excludeId) {
  var book = BOOKS[currentBook];
  var nearby = []; var seen = {};
  book.chapters.forEach(function(ch) {
    var key = ch.key || (currentBook + '_' + ch.num);
    var data = CHAPTERS[key];
    if (!data) return;
    data.forEach(function(ev, i) {
      if (haversineKm(lat, lng, ev.lat, ev.lng) <= PROXIMITY_KM) {
        var uid = ch.num + '_' + i;
        if (!seen[uid]) {
          seen[uid] = true;
          var chColor = (currentBook === 'shmuel2' ? CHAPTER_COLORS_S2 : CHAPTER_COLORS)[ch.num] || '#8a7a5a';
          nearby.push({ chapterNum: ch.num, verse: ev.verse, place: ev.place, heb: ev.heb || '',
            desc: ev.desc, source: ev.source || '', persons: ev.persons || [],
            eventId: ch.num * 100 + i + 1, color: chColor });
        }
      }
    });
  });
  nearby.sort(function(a, b) { return a.chapterNum !== b.chapterNum ? a.chapterNum - b.chapterNum : a.verse.localeCompare(b.verse); });
  return nearby;
}

// ── MODE ─────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-chapter').className = 'pill-btn' + (mode === 'chapter' ? ' active' : '');
  document.getElementById('btn-book').className    = 'pill-btn' + (mode === 'book'    ? ' active' : '');
  var chCtrl = document.getElementById('ch-controls');
  chCtrl.style.opacity = mode === 'book' ? '0.3' : '1';
  chCtrl.style.pointerEvents = mode === 'book' ? 'none' : '';
  if (mode === 'book') loadBookView();
  else loadChapter(currentBook, currentChapter);
}

function loadBookView() {
  var book = BOOKS[currentBook];
  var all = [];
  book.chapters.forEach(function(ch) {
    var key = ch.key || (currentBook + '_' + ch.num);
    var data = CHAPTERS[key];
    if (!data) return;
    data.forEach(function(ev, i) {
      var c = JSON.parse(JSON.stringify(ev));
      c.id = ch.num * 100 + i + 1;
      c.chapterNum = ch.num; c.chapterLabel = ch.label;
      c.color = (currentBook === 'shmuel2' ? CHAPTER_COLORS_S2 : CHAPTER_COLORS)[ch.num] || '#8a7a5a';
      all.push(c);
    });
  });
  events = all; activeId = null;
  // Reset filters
  bookFilterPerson = ''; bookFilterTheme = ''; bookFilterMaxCh = 31;
  document.getElementById('bc-person').value = '';
  document.getElementById('bc-theme').value  = '';
  var rng = document.getElementById('bc-range');
  rng.value = 31; rng.style.setProperty('--pct','100%');
  document.getElementById('range-disp').textContent = '31';
  document.getElementById('range-end').textContent  = '31';
  renderSidebarBook();
  renderMapBook();
  updateHeader();
  updateLegend();
  var lls = events.map(function(e) { return [e.lat, e.lng]; });
  if (lls.length) map.fitBounds(L.latLngBounds(lls), { padding: [40,40], maxZoom: 10 });
}

// ── HEADER + LEGEND ──────────────────────────────────────────
function updateHeader() {
  if (currentMode === 'book') {
    var book = BOOKS[currentBook];
    document.getElementById('h-heb').textContent = book.hebrewLabel + ' — כל הספר';
    document.getElementById('h-sub').textContent = book.label + ' — Full Book';
    document.getElementById('ev-badge').textContent = events.length + ' events';
  } else {
    var bk = BOOKS[currentBook];
    var chObj = bk.chapters.find(function(c) { return c.num === currentChapter; });
    document.getElementById('h-heb').textContent = bk.hebrewLabel + ' · פרק ' + hebrewNumeral(currentChapter);
    document.getElementById('h-sub').textContent = bk.label + ' · ' + (chObj ? chObj.label.split('—')[1].trim() : 'Chapter ' + currentChapter);
    document.getElementById('ev-badge').textContent = events.length + ' events';
  }
  // Mobile drawer label
  var dl = document.getElementById('drawer-label');
  if (dl && !document.getElementById('sidebar').classList.contains('open')) {
    dl.textContent = events.length + ' Events';
  }
}

function updateLegend() {
  var el = document.getElementById('legend');
  if (!el) return;
  if (currentMode === 'chapter') {
    var seen = {}; var rows = '';
    events.forEach(function(ev) {
      if (!seen[ev.color]) {
        seen[ev.color] = (ev.persons || []).join(' / ') || ev.place;
        rows += '<div><span class="ldot" style="background:' + ev.color + '"></span>' + seen[ev.color] + '</div>';
      }
    });
    el.innerHTML = '<div class="legend-title">Color Key</div>' + rows;
  } else {
    if (currentBook === 'shmuel2') {
      el.innerHTML = '<div class="legend-title">Narrative Arc</div>' +
        '<div><span class="ldot" style="background:#2a4a8a"></span>Ch 1–2 · Mourning &amp; Chevron</div>' +
        '<div><span class="ldot" style="background:#c8962a"></span>Yerushalayim &amp; Covenant</div>' +
        '<div><span class="ldot" style="background:#4a7a2a"></span>Empire &amp; Victory</div>' +
        '<div><span class="ldot" style="background:#8b1a1a"></span>Sin &amp; Judgment</div>' +
        '<div><span class="ldot" style="background:#6a4a8a"></span>Avshalom\'s Revolt</div>' +
        '<div><span class="ldot" style="background:#5a7a9a"></span>Ch 24 · Epilogue</div>';
    } else {
      el.innerHTML = '<div class="legend-title">Narrative Arc</div>' +
        '<div><span class="ldot" style="background:#5a7a9a"></span>Ch 1–3 · Shmuel</div>' +
        '<div><span class="ldot" style="background:#8b3a3a"></span>Crisis &amp; War</div>' +
        '<div><span class="ldot" style="background:#c8962a"></span>Key Moments</div>' +
        '<div><span class="ldot" style="background:#2a6a4a"></span>Dovid Rises</div>' +
        '<div><span class="ldot" style="background:#6a4a8a"></span>Wilderness</div>' +
        '<div><span class="ldot" style="background:#8b1a1a"></span>Ch 31 · Gilboa</div>';
    }
  }
  if (showModern) {
    el.innerHTML += '<div style="margin-top:5px;padding-top:5px;border-top:1px solid rgba(106,154,186,0.2);"><div class="legend-title" style="color:#3a6a8a;">Modern 1882–1967</div>' +
      '<div><span class="ldot" style="background:#5a8a6a"></span>First Aliyah</div>' +
      '<div><span class="ldot" style="background:#3a7a8a"></span>Second Aliyah</div>' +
      '<div><span class="ldot" style="background:#5a6a8a"></span>British Mandate</div>' +
      '<div><span class="ldot" style="background:#8a4a3a"></span>War of Independence</div>' +
      '<div><span class="ldot" style="background:#2a5a8a"></span>Six Day War</div></div>';
  }
}
function toggleDrawer() {
  var sb = document.getElementById('sidebar');
  var btn = document.getElementById('drawer-toggle');
  var isOpen = sb.classList.toggle('open');
  btn.classList.toggle('open', isOpen);
  document.getElementById('drawer-label').textContent = isOpen ? 'Map' : 'Events';
}

function openDrawerIfMobile() {
  if (window.innerWidth <= 680) {
    var sb = document.getElementById('sidebar');
    var btn = document.getElementById('drawer-toggle');
    sb.classList.add('open');
    btn.classList.add('open');
    document.getElementById('drawer-label').textContent = 'Map';
  }
}

// ── INIT ─────────────────────────────────────────────────────
buildChapterDropdown('shmuel1');
document.getElementById('ch-sel').value = 17;
loadChapter('shmuel1', 17);
</script>
